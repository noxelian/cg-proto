syntax = "proto3";

package agents.agent.v1;

option go_package = "github.com/4ubak/cg-proto/gen/go/agents/agent;agentv1";

import "google/protobuf/timestamp.proto";

// AgentRunStatus represents the execution state of an agent run.
enum AgentRunStatus {
  AGENT_RUN_STATUS_UNSPECIFIED = 0;
  AGENT_RUN_STATUS_PENDING = 1;
  AGENT_RUN_STATUS_RUNNING = 2;
  AGENT_RUN_STATUS_PAUSED = 3;
  AGENT_RUN_STATUS_COMPLETED = 4;
  AGENT_RUN_STATUS_FAILED = 5;
  AGENT_RUN_STATUS_CANCELLED = 6;
}

// AgentRun represents a single execution of an agent for a task.
message AgentRun {
  string id = 1;
  string task_id = 2;
  string role = 3;
  AgentRunStatus status = 4;
  int32 iteration_count = 5;
  int32 max_iterations = 6;
  int64 input_tokens = 7;
  int64 output_tokens = 8;
  double cost_usd = 9;
  optional string error_message = 10;
  optional google.protobuf.Timestamp started_at = 11;
  optional google.protobuf.Timestamp completed_at = 12;
  google.protobuf.Timestamp created_at = 13;
  google.protobuf.Timestamp updated_at = 14;
}

// AgentRoleConfig defines the configuration for an agent role.
message AgentRoleConfig {
  string id = 1;
  string name = 2;
  string display_name = 3;
  string system_prompt = 4;
  repeated string tool_whitelist = 5;
  optional string output_schema = 6; // JSON string
  int32 max_iterations = 7;
  int32 timeout_seconds = 8;
  bool is_active = 9;
  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Timestamp updated_at = 11;
}

// AgentOutputEvent represents a streaming output event from an agent run.
message AgentOutputEvent {
  string content = 1;
  optional string tool_use = 2;
  google.protobuf.Timestamp timestamp = 3;
  optional string tool_result = 4;
  string event_type = 5; // content, tool_use, tool_result, status
}

// AgentService provides agent run management, role configuration, and output streaming.
service AgentService {
  // StartAgentRun initiates a new agent run for a task.
  rpc StartAgentRun(StartAgentRunRequest) returns (StartAgentRunResponse);

  // GetAgentRun returns an agent run by ID.
  rpc GetAgentRun(GetAgentRunRequest) returns (GetAgentRunResponse);

  // ListAgentRuns returns a filtered, paginated list of agent runs.
  rpc ListAgentRuns(ListAgentRunsRequest) returns (ListAgentRunsResponse);

  // PauseAgentRun pauses a running agent.
  rpc PauseAgentRun(PauseAgentRunRequest) returns (PauseAgentRunResponse);

  // ResumeAgentRun resumes a paused agent.
  rpc ResumeAgentRun(ResumeAgentRunRequest) returns (ResumeAgentRunResponse);

  // StopAgentRun stops a running or paused agent.
  rpc StopAgentRun(StopAgentRunRequest) returns (StopAgentRunResponse);

  // RetryAgentRun creates a new run retrying a failed agent run.
  rpc RetryAgentRun(RetryAgentRunRequest) returns (RetryAgentRunResponse);

  // ListRoleConfigs returns available agent role configurations.
  rpc ListRoleConfigs(ListRoleConfigsRequest) returns (ListRoleConfigsResponse);

  // GetRoleConfig returns a role configuration by name.
  rpc GetRoleConfig(GetRoleConfigRequest) returns (GetRoleConfigResponse);

  // StreamAgentOutput streams real-time output from an agent run.
  rpc StreamAgentOutput(StreamAgentOutputRequest) returns (stream AgentOutputEvent);

  // GetAnalytics returns cost analytics aggregations for a date range.
  rpc GetAnalytics(GetAnalyticsRequest) returns (GetAnalyticsResponse);

  // GetDashboard returns per-role agent status summary.
  rpc GetDashboard(GetDashboardRequest) returns (GetDashboardResponse);

  // ListRepos returns available git repositories that agents can work with.
  rpc ListRepos(ListReposRequest) returns (ListReposResponse);
}

// StartAgentRun
message StartAgentRunRequest {
  string task_id = 1;
  string role = 2;
}

message StartAgentRunResponse {
  AgentRun agent_run = 1;
}

// GetAgentRun
message GetAgentRunRequest {
  string id = 1;
}

message GetAgentRunResponse {
  AgentRun agent_run = 1;
}

// ListAgentRuns
message ListAgentRunsRequest {
  optional string task_id = 1;
  optional AgentRunStatus status = 2;
  int32 page_size = 3;
  string page_token = 4;
}

message ListAgentRunsResponse {
  repeated AgentRun agent_runs = 1;
  string next_page_token = 2;
  int32 total_count = 3;
}

// PauseAgentRun
message PauseAgentRunRequest {
  string id = 1;
}

message PauseAgentRunResponse {
  AgentRun agent_run = 1;
}

// ResumeAgentRun
message ResumeAgentRunRequest {
  string id = 1;
}

message ResumeAgentRunResponse {
  AgentRun agent_run = 1;
}

// StopAgentRun
message StopAgentRunRequest {
  string id = 1;
}

message StopAgentRunResponse {
  AgentRun agent_run = 1;
}

// RetryAgentRun
message RetryAgentRunRequest {
  string id = 1;
}

message RetryAgentRunResponse {
  AgentRun agent_run = 1;
}

// ListRoleConfigs
message ListRoleConfigsRequest {
  optional bool active_only = 1;
}

message ListRoleConfigsResponse {
  repeated AgentRoleConfig configs = 1;
}

// GetRoleConfig
message GetRoleConfigRequest {
  string name = 1;
}

message GetRoleConfigResponse {
  AgentRoleConfig config = 1;
}

// StreamAgentOutput
message StreamAgentOutputRequest {
  string agent_run_id = 1;
}

// GetAnalytics
message GetAnalyticsRequest {
  google.protobuf.Timestamp from_time = 1;
  google.protobuf.Timestamp to_time = 2;
}

message GetAnalyticsResponse {
  repeated CostByDay daily_costs = 1;
  repeated CostByRole role_costs = 2;
  repeated TaskCostSummary task_costs = 3;
  AnalyticsSummary summary = 4;
}

// CostByDay represents daily cost aggregation.
message CostByDay {
  string date = 1;
  double cost_usd = 2;
  int32 run_count = 3;
  int64 input_tokens = 4;
  int64 output_tokens = 5;
}

// CostByRole represents per-role cost aggregation.
message CostByRole {
  string role = 1;
  double cost_usd = 2;
  int32 run_count = 3;
  double avg_cost_usd = 4;
}

// TaskCostSummary represents per-task cost breakdown.
message TaskCostSummary {
  string task_id = 1;
  string task_title = 2;
  double total_cost_usd = 3;
  int32 run_count = 4;
}

// AnalyticsSummary represents overall analytics summary.
message AnalyticsSummary {
  double total_cost_usd = 1;
  int32 total_runs = 2;
  double avg_cost_per_task = 3;
  double avg_cost_per_run = 4;
}

// GetDashboard
message GetDashboardRequest {}

message GetDashboardResponse {
  repeated AgentDashboardEntry entries = 1;
}

// AgentDashboardEntry represents a single role's dashboard status.
message AgentDashboardEntry {
  string role = 1;
  string status = 2;
  string current_task_id = 3;
  int32 queue_depth = 4;
  double success_rate = 5;
  string circuit_state = 6;
  int32 active_runs = 7;
}

// ListRepos
message ListReposRequest {
  bool active_only = 1;
}

message ListReposResponse {
  repeated AgentRepo repos = 1;
}

// AgentRepo represents a git repository available to agents.
message AgentRepo {
  string id = 1;
  string name = 2;
  string display_name = 3;
  string description = 4;
  string git_url = 5;
  string default_branch = 6;
  bool is_active = 7;
}
