}

message DailyReportEntry {
  google.protobuf.Timestamp date = 1;
  int32 orders_received = 2;
  int32 orders_delivered = 3;
  int32 orders_in_progress = 4;
  int64 revenue = 5;
  repeated StatusCount status_breakdown = 6;
}

message GetDailyReportResponse {
  int32 orders_received = 1 [deprecated = true];
  int32 orders_delivered = 2 [deprecated = true];
  int32 orders_in_progress = 3 [deprecated = true];
  int64 revenue = 4 [deprecated = true];
  repeated StatusCount status_breakdown = 5 [deprecated = true];
  repeated DailyReportEntry entries = 6;
}

