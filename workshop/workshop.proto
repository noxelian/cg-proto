// =============================================================================
// Salary RPCs
// =============================================================================

message CalculateSalaryRequest {
  int64 workshop_id = 1;
  int32 year = 2;
  int32 month = 3;
  int32 period = 4;
}

message CalculateSalaryResponse {
  repeated SalaryBreakdown breakdowns = 1;
  int64 total_payout = 2;
}

message GetSalaryBreakdownRequest {
  int64 master_id = 1;
  int32 year = 2;
  int32 month = 3;
  int32 period = 4;
}

message GetSalaryBreakdownResponse {
  SalaryBreakdown breakdown = 1;
}

message CreateBonusRequest {
  int64 master_id = 1;
  int64 amount = 2;
  string reason = 3;
  int32 year = 4;
  int32 month = 5;
}

message CreateBonusResponse {
  SalaryAdjustment bonus = 1;
}

message CreateFineRequest {
  int64 master_id = 1;
  int64 amount = 2;
  string reason = 3;
  int32 year = 4;
  int32 month = 5;
}

message CreateFineResponse {
  SalaryAdjustment fine = 1;
}

message CreateAdvanceRequest {
  int64 master_id = 1;
  int64 amount = 2;
  string reason = 3;
  int32 year = 4;
  int32 month = 5;
