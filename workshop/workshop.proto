syntax = "proto3";

package workshop.v1;

option go_package = "gitlab.com/xakpro/cg-proto/gen/go/workshop;workshopv1";

import "google/protobuf/timestamp.proto";

// =============================================================================
// Services
// =============================================================================

service WorkshopService {
  // --- Workshop CRUD ---
  rpc CreateWorkshop(CreateWorkshopRequest) returns (CreateWorkshopResponse);
  rpc GetWorkshop(GetWorkshopRequest) returns (GetWorkshopResponse);
  rpc UpdateWorkshop(UpdateWorkshopRequest) returns (UpdateWorkshopResponse);
  rpc ListWorkshops(ListWorkshopsRequest) returns (ListWorkshopsResponse);

  // --- Repair Order ---
  rpc CreateRepairOrder(CreateRepairOrderRequest) returns (CreateRepairOrderResponse);
  rpc GetRepairOrder(GetRepairOrderRequest) returns (GetRepairOrderResponse);
  rpc UpdateRepairOrder(UpdateRepairOrderRequest) returns (UpdateRepairOrderResponse);
  rpc UpdateRepairOrderStatus(UpdateRepairOrderStatusRequest) returns (UpdateRepairOrderStatusResponse);
  rpc ListRepairOrders(ListRepairOrdersRequest) returns (ListRepairOrdersResponse);
  rpc GetKanban(GetKanbanRequest) returns (GetKanbanResponse);

  // --- Car Work ---
  rpc CreateCarWork(CreateCarWorkRequest) returns (CreateCarWorkResponse);
  rpc UpdateCarWork(UpdateCarWorkRequest) returns (UpdateCarWorkResponse);
  rpc DeleteCarWork(DeleteCarWorkRequest) returns (DeleteCarWorkResponse);
  rpc ListCarWorks(ListCarWorksRequest) returns (ListCarWorksResponse);
  rpc MarkCarWorkDone(MarkCarWorkDoneRequest) returns (MarkCarWorkDoneResponse);
  rpc ClockIn(ClockInRequest) returns (ClockInResponse);
  rpc ClockOut(ClockOutRequest) returns (ClockOutResponse);

  // --- Master ---
  rpc CreateMaster(CreateMasterRequest) returns (CreateMasterResponse);
  rpc GetMaster(GetMasterRequest) returns (GetMasterResponse);
  rpc UpdateMaster(UpdateMasterRequest) returns (UpdateMasterResponse);
  rpc FireMaster(FireMasterRequest) returns (FireMasterResponse);
  rpc ListMasters(ListMastersRequest) returns (ListMastersResponse);

  // --- Salary ---
  rpc CalculateSalary(CalculateSalaryRequest) returns (CalculateSalaryResponse);
  rpc GetSalaryBreakdown(GetSalaryBreakdownRequest) returns (GetSalaryBreakdownResponse);
  rpc CreateBonus(CreateBonusRequest) returns (CreateBonusResponse);
  rpc CreateFine(CreateFineRequest) returns (CreateFineResponse);
  rpc CreateAdvance(CreateAdvanceRequest) returns (CreateAdvanceResponse);
  rpc DeleteBonus(DeleteBonusRequest) returns (DeleteBonusResponse);
  rpc DeleteFine(DeleteFineRequest) returns (DeleteFineResponse);

  // --- Outsource ---
  rpc PublishOutsource(PublishOutsourceRequest) returns (PublishOutsourceResponse);
  rpc AcceptOutsource(AcceptOutsourceRequest) returns (AcceptOutsourceResponse);
  rpc ListOutsourceRequests(ListOutsourceRequestsRequest) returns (ListOutsourceRequestsResponse);
  rpc GetOutsourceKanban(GetOutsourceKanbanRequest) returns (GetOutsourceKanbanResponse);
  rpc UpdateOutsourceStatus(UpdateOutsourceStatusRequest) returns (UpdateOutsourceStatusResponse);

  // --- Analytics ---
  rpc GetWorkshopStats(GetWorkshopStatsRequest) returns (GetWorkshopStatsResponse);
  rpc GetMasterPerformance(GetMasterPerformanceRequest) returns (GetMasterPerformanceResponse);
  rpc GetDailyReport(GetDailyReportRequest) returns (GetDailyReportResponse);

  // --- Comments ---
  rpc AddComment(AddCommentRequest) returns (AddCommentResponse);
  rpc ListComments(ListCommentsRequest) returns (ListCommentsResponse);

  // --- Photos ---
  rpc UploadPhoto(UploadPhotoRequest) returns (UploadPhotoResponse);
  rpc ListPhotos(ListPhotosRequest) returns (ListPhotosResponse);
  rpc DeletePhoto(DeletePhotoRequest) returns (DeletePhotoResponse);

  // --- QC Checklist ---
  rpc GetQCChecklist(GetQCChecklistRequest) returns (GetQCChecklistResponse);
  rpc SubmitQCChecklist(SubmitQCChecklistRequest) returns (SubmitQCChecklistResponse);
  rpc RejectQCItem(RejectQCItemRequest) returns (RejectQCItemResponse);

  // --- Status History ---
  rpc ListStatusHistory(ListStatusHistoryRequest) returns (ListStatusHistoryResponse);

  // --- Client API (for mobile app) ---
  rpc GetClientOrderStatus(GetClientOrderStatusRequest) returns (GetClientOrderStatusResponse);
  rpc GetClientOrderPhotos(GetClientOrderPhotosRequest) returns (GetClientOrderPhotosResponse);
  rpc GetClientOrderTimeline(GetClientOrderTimelineRequest) returns (GetClientOrderTimelineResponse);
}

// =============================================================================
// Enums
// =============================================================================

enum RepairStatus {
  REPAIR_STATUS_UNSPECIFIED = 0;
  REPAIR_STATUS_QUEUE = 1;
  REPAIR_STATUS_WAITING_PARTS = 2;
  REPAIR_STATUS_DISASSEMBLY = 3;
  REPAIR_STATUS_BODYWORK = 4;
  REPAIR_STATUS_PREPARATION = 5;
  REPAIR_STATUS_PAINTING = 6;
  REPAIR_STATUS_ASSEMBLY = 7;
  REPAIR_STATUS_POLISHING = 8;
  REPAIR_STATUS_READY = 9;
  REPAIR_STATUS_DELIVERED = 10;
}

enum MasterRole {
  MASTER_ROLE_UNSPECIFIED = 0;
  MASTER_ROLE_FOREMAN = 1;
  MASTER_ROLE_TECH = 2;
}

enum FixSalaryType {
  FIX_SALARY_TYPE_UNSPECIFIED = 0;
  FIX_SALARY_TYPE_PAINTER = 1;
  FIX_SALARY_TYPE_DEFAULT = 2;
}

enum OutsourceStatus {
  OUTSOURCE_STATUS_UNSPECIFIED = 0;
  OUTSOURCE_STATUS_PUBLISHED = 1;
  OUTSOURCE_STATUS_ACCEPTED = 2;
  OUTSOURCE_STATUS_IN_PROGRESS = 3;
  OUTSOURCE_STATUS_COMPLETED = 4;
  OUTSOURCE_STATUS_CANCELLED = 5;
}

enum PhotoAlbum {
  PHOTO_ALBUM_UNSPECIFIED = 0;
  PHOTO_ALBUM_INTAKE = 1;
  PHOTO_ALBUM_PROCESS = 2;
  PHOTO_ALBUM_READY = 3;
}

enum CommentType {
  COMMENT_TYPE_UNSPECIFIED = 0;
  COMMENT_TYPE_INTERNAL = 1;
  COMMENT_TYPE_CLIENT_VISIBLE = 2;
}

// =============================================================================
// Core Messages
// =============================================================================

message Workshop {
  int64 id = 1;
  string org_id = 2;
  string name = 3;
  string address = 4;
  int64 city_id = 5;
  bool is_active = 6;
  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp updated_at = 8;
}

message RepairOrder {
  int64 id = 1;
  int64 workshop_id = 2;
  string order_number = 3;
  string license_plate = 4;
  string vin = 5;
  string car_model = 6;
  string car_color = 7;
  int32 car_year = 8;
  RepairStatus status = 9;
  int64 price = 10;
  int64 cost = 11;
  string bay_number = 12;
  int64 client_id = 13;
  string client_name = 14;
  string client_phone = 15;
  google.protobuf.Timestamp intake_date = 16;
  google.protobuf.Timestamp promised_date = 17;
  google.protobuf.Timestamp completion_date = 18;
  repeated CarWork works = 19;
  repeated MasterSummary masters = 20;
  int32 days_in_shop = 21;
  bool has_remake = 22;
  bool has_outsource = 23;
  google.protobuf.Timestamp created_at = 24;
  google.protobuf.Timestamp updated_at = 25;
}

message MasterSummary {
  int64 id = 1;
  string name = 2;
  MasterRole role = 3;
}

message CarWork {
  int64 id = 1;
  int64 repair_order_id = 2;
  int64 master_id = 3;
  string master_name = 4;
  string work_name = 5;
  double hour_rate = 6;
  int64 hour_price = 7;
  int64 amount = 8;
  bool is_done = 9;
  bool is_remake = 10;
  google.protobuf.Timestamp clock_in_at = 11;
  google.protobuf.Timestamp clock_out_at = 12;
  google.protobuf.Timestamp done_at = 13;
  google.protobuf.Timestamp created_at = 14;
  google.protobuf.Timestamp updated_at = 15;
}

message Master {
  int64 id = 1;
  int64 workshop_id = 2;
  int64 user_id = 3;
  string name = 4;
  string phone = 5;
  string position = 6;
  MasterRole role = 7;
  FixSalaryType fix_salary_type = 8;
  bool is_active = 9;
  google.protobuf.Timestamp hired_at = 10;
  google.protobuf.Timestamp fired_at = 11;
  google.protobuf.Timestamp created_at = 12;
  google.protobuf.Timestamp updated_at = 13;
}

message Client {
  int64 id = 1;
  int64 workshop_id = 2;
  string name = 3;
  string phone = 4;
  string notes = 5;
  int32 order_count = 6;
  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp updated_at = 8;
}

message RepairPhoto {
  int64 id = 1;
  int64 repair_order_id = 2;
  PhotoAlbum album = 3;
  string url = 4;
  string thumbnail_url = 5;
  int64 uploaded_by = 6;
  RepairStatus stage_at_upload = 7;
  google.protobuf.Timestamp created_at = 8;
}

message RepairComment {
  int64 id = 1;
  int64 repair_order_id = 2;
  int64 user_id = 3;
  string user_name = 4;
  string text = 5;
  CommentType type = 6;
  google.protobuf.Timestamp created_at = 7;
}

message StatusHistoryEntry {
  int64 id = 1;
  int64 repair_order_id = 2;
  int64 user_id = 3;
  string user_name = 4;
  RepairStatus old_status = 5;
  RepairStatus new_status = 6;
  string comment = 7;
  google.protobuf.Timestamp created_at = 8;
}

message QCChecklist {
  int64 id = 1;
  int64 repair_order_id = 2;
  int64 inspector_id = 3;
  string inspector_name = 4;
  repeated QCItem items = 5;
  bool passed = 6;
  google.protobuf.Timestamp completed_at = 7;
  google.protobuf.Timestamp created_at = 8;
}

message QCItem {
  string key = 1;
  string label = 2;
  bool passed = 3;
  string comment = 4;
}

message OutsourceRequest {
  int64 id = 1;
  int64 repair_order_id = 2;
  string source_org_id = 3;
  string target_org_id = 4;
  OutsourceStatus status = 5;
  int64 budget = 6;
  string description = 7;
  string source_org_name = 8;
  string target_org_name = 9;
  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Timestamp updated_at = 11;
}

message SalaryBreakdown {
  int64 master_id = 1;
  string master_name = 2;
  string position = 3;
  FixSalaryType fix_salary_type = 4;
  int64 fix_salary = 5;
  double total_hour_rate = 6;
  int64 hour_price = 7;
  int64 hour_salary = 8;
  int64 bonuses = 9;
  int64 fines = 10;
  int64 advances = 11;
  int64 taxes = 12;
  int64 debts = 13;
  int64 total = 14;
  repeated SalaryAdjustment adjustments = 15;
}

message SalaryAdjustment {
  int64 id = 1;
  string type = 2;
  int64 amount = 3;
  string reason = 4;
  google.protobuf.Timestamp created_at = 5;
}

// =============================================================================
// Kanban
// =============================================================================

message KanbanColumn {
  RepairStatus status = 1;
  string label = 2;
  int32 count = 3;
  repeated RepairOrder orders = 4;
}

message OutsourceKanbanColumn {
  OutsourceStatus status = 1;
  string label = 2;
  int32 count = 3;
  repeated OutsourceRequest requests = 4;
}

// =============================================================================
// Workshop RPCs
// =============================================================================

message CreateWorkshopRequest {
  string org_id = 1;
  string name = 2;
  string address = 3;
  int64 city_id = 4;
}

message CreateWorkshopResponse {
  Workshop workshop = 1;
}

message GetWorkshopRequest {
  int64 workshop_id = 1;
}

message GetWorkshopResponse {
  Workshop workshop = 1;
}

message UpdateWorkshopRequest {
  int64 workshop_id = 1;
  optional string name = 2;
  optional string address = 3;
  optional int64 city_id = 4;
  optional bool is_active = 5;
}

message UpdateWorkshopResponse {
  Workshop workshop = 1;
}

message ListWorkshopsRequest {
  string org_id = 1;
  bool active_only = 2;
  int32 page = 3;
  int32 page_size = 4;
}

message ListWorkshopsResponse {
  repeated Workshop workshops = 1;
  int32 total = 2;
}

// =============================================================================
// Repair Order RPCs
// =============================================================================

message CreateRepairOrderRequest {
  int64 workshop_id = 1;
  string license_plate = 2;
  string vin = 3;
  string car_model = 4;
  string car_color = 5;
  int32 car_year = 6;
  int64 price = 7;
  string bay_number = 8;
  int64 client_id = 9;
  string client_name = 10;
  string client_phone = 11;
  google.protobuf.Timestamp promised_date = 12;
}

message CreateRepairOrderResponse {
  RepairOrder order = 1;
}

message GetRepairOrderRequest {
  int64 order_id = 1;
}

message GetRepairOrderResponse {
  RepairOrder order = 1;
}

message UpdateRepairOrderRequest {
  int64 order_id = 1;
  optional string license_plate = 2;
  optional string vin = 3;
  optional string car_model = 4;
  optional string car_color = 5;
  optional int32 car_year = 6;
  optional int64 price = 7;
  optional string bay_number = 8;
  optional int64 client_id = 9;
  optional string client_name = 10;
  optional string client_phone = 11;
  optional string promised_date_str = 12;
}

message UpdateRepairOrderResponse {
  RepairOrder order = 1;
}

message UpdateRepairOrderStatusRequest {
  int64 order_id = 1;
  RepairStatus new_status = 2;
  string comment = 3;
}

message UpdateRepairOrderStatusResponse {
  RepairOrder order = 1;
}

message ListRepairOrdersRequest {
  int64 workshop_id = 1;
  RepairStatus status = 2;
  int64 master_id = 3;
  string search = 4;
  int32 page = 5;
  int32 page_size = 6;
}

message ListRepairOrdersResponse {
  repeated RepairOrder orders = 1;
  int32 total = 2;
}

message GetKanbanRequest {
  int64 workshop_id = 1;
}

message GetKanbanResponse {
  repeated KanbanColumn columns = 1;
  int32 total_orders = 2;
  int64 total_revenue = 3;
}

// =============================================================================
// Car Work RPCs
// =============================================================================

message CreateCarWorkRequest {
  int64 repair_order_id = 1;
  int64 master_id = 2;
  string work_name = 3;
  double hour_rate = 4;
  int64 hour_price = 5;
}

message CreateCarWorkResponse {
  CarWork work = 1;
}

message UpdateCarWorkRequest {
  int64 work_id = 1;
  optional int64 master_id = 2;
  optional string work_name = 3;
  optional double hour_rate = 4;
  optional int64 hour_price = 5;
  optional bool is_remake = 6;
}

message UpdateCarWorkResponse {
  CarWork work = 1;
}

message DeleteCarWorkRequest {
  int64 work_id = 1;
}

message DeleteCarWorkResponse {}

message ListCarWorksRequest {
  int64 repair_order_id = 1;
  int64 master_id = 2;
}

message ListCarWorksResponse {
  repeated CarWork works = 1;
}

message MarkCarWorkDoneRequest {
  int64 work_id = 1;
}

message MarkCarWorkDoneResponse {
  CarWork work = 1;
}

message ClockInRequest {
  int64 work_id = 1;
}

message ClockInResponse {
  CarWork work = 1;
}

message ClockOutRequest {
  int64 work_id = 1;
}

message ClockOutResponse {
  CarWork work = 1;
}

// =============================================================================
// Master RPCs
// =============================================================================

message CreateMasterRequest {
  int64 workshop_id = 1;
  int64 user_id = 2;
  string name = 3;
  string phone = 4;
  string position = 5;
  MasterRole role = 6;
  FixSalaryType fix_salary_type = 7;
}

message CreateMasterResponse {
  Master master = 1;
}

message GetMasterRequest {
  int64 master_id = 1;
}

message GetMasterResponse {
  Master master = 1;
}

message UpdateMasterRequest {
  int64 master_id = 1;
  optional string name = 2;
  optional string phone = 3;
  optional string position = 4;
  optional MasterRole role = 5;
  optional FixSalaryType fix_salary_type = 6;
}

message UpdateMasterResponse {
  Master master = 1;
}

message FireMasterRequest {
  int64 master_id = 1;
}

message FireMasterResponse {
  Master master = 1;
}

message ListMastersRequest {
  int64 workshop_id = 1;
  bool active_only = 2;
  MasterRole role = 3;
}

message ListMastersResponse {
  repeated Master masters = 1;
}

// =============================================================================
// Salary RPCs
// =============================================================================

message CalculateSalaryRequest {
  int64 workshop_id = 1;
  int32 year = 2;
  int32 month = 3;
  int32 period = 4;
}

message CalculateSalaryResponse {
  repeated SalaryBreakdown breakdowns = 1;
  int64 total_payout = 2;
}

message GetSalaryBreakdownRequest {
  int64 master_id = 1;
  int32 year = 2;
  int32 month = 3;
  int32 period = 4;
}

message GetSalaryBreakdownResponse {
  SalaryBreakdown breakdown = 1;
}

message CreateBonusRequest {
  int64 master_id = 1;
  int64 amount = 2;
  string reason = 3;
  int32 year = 4;
  int32 month = 5;
}

message CreateBonusResponse {
  SalaryAdjustment bonus = 1;
}

message CreateFineRequest {
  int64 master_id = 1;
  int64 amount = 2;
  string reason = 3;
  int32 year = 4;
  int32 month = 5;
}

message CreateFineResponse {
  SalaryAdjustment fine = 1;
}

message CreateAdvanceRequest {
  int64 master_id = 1;
  int64 amount = 2;
  string reason = 3;
  int32 year = 4;
  int32 month = 5;
}

message CreateAdvanceResponse {
  SalaryAdjustment advance = 1;
}

message DeleteBonusRequest {
  int64 bonus_id = 1;
}

message DeleteBonusResponse {}

message DeleteFineRequest {
  int64 fine_id = 1;
}

message DeleteFineResponse {}

// =============================================================================
// Outsource RPCs
// =============================================================================

message PublishOutsourceRequest {
  int64 repair_order_id = 1;
  string source_org_id = 2;
  int64 budget = 3;
  string description = 4;
}

message PublishOutsourceResponse {
  OutsourceRequest request = 1;
}

message AcceptOutsourceRequest {
  int64 outsource_id = 1;
  string target_org_id = 2;
}

message AcceptOutsourceResponse {
  OutsourceRequest request = 1;
}

message ListOutsourceRequestsRequest {
  string org_id = 1;
  OutsourceStatus status = 2;
  bool as_source = 3;
  int32 page = 4;
  int32 page_size = 5;
}

message ListOutsourceRequestsResponse {
  repeated OutsourceRequest requests = 1;
  int32 total = 2;
}

message GetOutsourceKanbanRequest {
  string org_id = 1;
}

message GetOutsourceKanbanResponse {
  repeated OutsourceKanbanColumn columns = 1;
}

message UpdateOutsourceStatusRequest {
  int64 outsource_id = 1;
  OutsourceStatus new_status = 2;
}

message UpdateOutsourceStatusResponse {
  OutsourceRequest request = 1;
}

// =============================================================================
// Analytics RPCs
// =============================================================================

message GetWorkshopStatsRequest {
  int64 workshop_id = 1;
  google.protobuf.Timestamp from = 2;
  google.protobuf.Timestamp to = 3;
}

message GetWorkshopStatsResponse {
  int32 orders_in_progress = 1;
  int32 orders_completed = 2;
  int64 total_revenue = 3;
  int64 total_cost = 4;
  int64 margin = 5;
  double avg_cycle_days = 6;
  double avg_check = 7;
  double master_utilization = 8;
}

message GetMasterPerformanceRequest {
  int64 workshop_id = 1;
  int32 year = 2;
  int32 month = 3;
}

message GetMasterPerformanceResponse {
  repeated MasterPerformanceEntry entries = 1;
}

message MasterPerformanceEntry {
  int64 master_id = 1;
  string master_name = 2;
  int32 works_completed = 3;
  double total_hour_rate = 4;
  int32 remakes = 5;
  double avg_completion_hours = 6;
}

message GetDailyReportRequest {
  int64 workshop_id = 1;
  google.protobuf.Timestamp date = 2;
}

message GetDailyReportResponse {
  int32 orders_received = 1;
  int32 orders_delivered = 2;
  int32 orders_in_progress = 3;
  int64 revenue = 4;
  repeated StatusCount status_breakdown = 5;
}

message StatusCount {
  RepairStatus status = 1;
  int32 count = 2;
}

// =============================================================================
// Comment RPCs
// =============================================================================

message AddCommentRequest {
  int64 repair_order_id = 1;
  string text = 2;
  CommentType type = 3;
}

message AddCommentResponse {
  RepairComment comment = 1;
}

message ListCommentsRequest {
  int64 repair_order_id = 1;
  CommentType type = 2;
}

message ListCommentsResponse {
  repeated RepairComment comments = 1;
}

// =============================================================================
// Photo RPCs
// =============================================================================

message UploadPhotoRequest {
  int64 repair_order_id = 1;
  PhotoAlbum album = 2;
  bytes data = 3;
  string filename = 4;
  string content_type = 5;
}

message UploadPhotoResponse {
  RepairPhoto photo = 1;
}

message ListPhotosRequest {
  int64 repair_order_id = 1;
  PhotoAlbum album = 2;
}

message ListPhotosResponse {
  repeated RepairPhoto photos = 1;
}

message DeletePhotoRequest {
  int64 photo_id = 1;
}

message DeletePhotoResponse {}

// =============================================================================
// QC Checklist RPCs
// =============================================================================

message GetQCChecklistRequest {
  int64 repair_order_id = 1;
}

message GetQCChecklistResponse {
  QCChecklist checklist = 1;
}

message SubmitQCChecklistRequest {
  int64 repair_order_id = 1;
  repeated QCItem items = 2;
}

message SubmitQCChecklistResponse {
  QCChecklist checklist = 1;
}

message RejectQCItemRequest {
  int64 checklist_id = 1;
  string item_key = 2;
  string comment = 3;
  RepairStatus return_to_status = 4;
}

message RejectQCItemResponse {
  QCChecklist checklist = 1;
}

// =============================================================================
// Status History RPCs
// =============================================================================

message ListStatusHistoryRequest {
  int64 repair_order_id = 1;
}

message ListStatusHistoryResponse {
  repeated StatusHistoryEntry entries = 1;
}

// =============================================================================
// Client API RPCs (mobile app)
// =============================================================================

message GetClientOrderStatusRequest {
  int64 order_id = 1;
  string phone = 2;
}

message GetClientOrderStatusResponse {
  RepairOrder order = 1;
  int32 progress_percent = 2;
  string estimated_completion = 3;
}

message GetClientOrderPhotosRequest {
  int64 order_id = 1;
  string phone = 2;
  PhotoAlbum album = 3;
}

message GetClientOrderPhotosResponse {
  repeated RepairPhoto photos = 1;
}

message GetClientOrderTimelineRequest {
  int64 order_id = 1;
  string phone = 2;
}

message GetClientOrderTimelineResponse {
  repeated TimelineEntry entries = 1;
}

message TimelineEntry {
  string type = 1;
  string title = 2;
  string description = 3;
  google.protobuf.Timestamp timestamp = 4;
}
