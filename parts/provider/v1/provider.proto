syntax = "proto3";

package parts.provider.v1;

option go_package = "github.com/4ubak/cg-proto/gen/go/parts/provider;providerv1";

import "google/protobuf/timestamp.proto";

// PartsProviderService aggregates auto parts search across multiple external suppliers.
service PartsProviderService {
  // SearchParts performs a fan-out search across all enabled providers.
  rpc SearchParts(SearchPartsRequest) returns (SearchPartsResponse);

  // ListSearchHistory returns paginated search history for the authenticated user.
  rpc ListSearchHistory(ListSearchHistoryRequest) returns (ListSearchHistoryResponse);

  // GetSearchResult returns raw provider results for a given search.
  rpc GetSearchResult(GetSearchResultRequest) returns (GetSearchResultResponse);

  // SearchByProvider performs a search via a single named provider.
  rpc SearchByProvider(SearchByProviderRequest) returns (SearchByProviderResponse);

  // StreamSearchParts performs a fan-out search and streams results as each provider completes.
  rpc StreamSearchParts(SearchPartsRequest) returns (stream StreamSearchPartsResponse);

  // ResolveCatalogQuote verifies a signed price_quote token minted by
  // SearchParts/SearchByProvider and returns the AUTHORITATIVE price for a
  // CATALOG-sourced cart line. This service is the price authority for catalog
  // items: consumers (e.g. order-service) must present the token and use the
  // returned unit_price_minor instead of trusting any client-supplied amount.
  // The token is self-contained and signed, so no server-side search cache is
  // required to resolve it.
  rpc ResolveCatalogQuote(ResolveCatalogQuoteRequest) returns (ResolveCatalogQuoteResponse);
}

// ResolveCatalogQuoteRequest carries the signed price_quote token taken from a
// Part in a prior search response.
message ResolveCatalogQuoteRequest {
  string price_quote = 1;
}

// ResolveCatalogQuoteResponse is the authoritative price for a catalog item.
message ResolveCatalogQuoteResponse {
  // unit_price_minor is the authoritative unit price in minor currency units
  // (tiyn for KZT), matching the order/cart money contract (int64 minor units).
  int64 unit_price_minor = 1;
  // currency is the ISO 4217 code, e.g. "KZT".
  string currency = 2;
  // seller_org_id is the authoritative seller organization UUID. Non-empty only
  // for internal-warehouse parts; empty for external-supplier offers (which are
  // not CTOgram organizations and are purchased through the bid flow instead).
  string seller_org_id = 3;
  bool available = 4;
  int32 quantity = 5;
  // valid is false when the token is malformed, expired, or tampered with.
  bool valid = 6;
  string invalid_reason = 7;
}

// SearchPartsRequest is the input for searching parts across providers.
message SearchPartsRequest {
  repeated string part_nums = 1;
  string search_cross = 2;   // "all", "original", "replica"
  string city = 3;
  int32 currency = 4;
  string detail_name = 5;
  string vin = 6;
}

// SearchByProviderRequest is the input for searching via a single provider.
message SearchByProviderRequest {
  string provider = 1;        // e.g. "autotrade", "emex", "rossko"
  repeated string part_nums = 2;
  string search_cross = 3;
  string city = 4;
  int32 currency = 5;
  string detail_name = 6;
  string vin = 7;
}

// SearchByProviderResponse contains result from a single provider.
message SearchByProviderResponse {
  ProviderResult result = 1;
}

// SearchPartsResponse contains aggregated results from all providers.
message SearchPartsResponse {
  int64 search_id = 1;
  repeated ProviderResult results = 2;
}

// ProviderResult holds the result from a single provider.
message ProviderResult {
  string provider = 1;
  int32 service_id = 2;
  repeated Part parts = 3;
  string error = 4;
  int32 status_code = 5;
  int64 duration_ms = 6;
}

// Part represents a single auto part from a provider.
message Part {
  string id = 1;
  string oem = 2;
  string part_num = 3;
  string brand = 4;
  string name = 5;
  int32 price = 6;
  int32 extra_price = 7;
  int32 quantity = 8;
  string delivery_date = 9;
  int32 delivery_cost = 10;
  int32 service_id = 11;
  string service_name = 12;
  string stock = 13;
  bool is_new = 14;
  bool is_original = 15;
  bool is_chosen = 16;
  repeated string photo = 17;
  string manufacturer = 18;
  bool available = 19;
  string note = 20;
  bool top = 21;
  int32 kind_id = 22;
  CurrencyInfo currency_info = 23;
  string close_notify_at = 24;
  int32 user_city_id = 25;
  int32 delivery_probability = 26;
  Installment installment = 27;
  // warehouse_id is the numeric string representation of warehouses.id (int64).
  // Non-empty only for parts from the internal warehouse provider.
  string warehouse_id  = 28;
  // seller_org_id is the UUID string of the organization that owns the warehouse.
  // Non-empty only for parts from the internal warehouse provider.
  string seller_org_id = 29;
  // price_quote is a signed, time-boxed authoritative price token minted by
  // parts-provider for this exact offer (price in minor units, seller, TTL).
  // A consumer presents it to ResolveCatalogQuote to obtain the authoritative
  // price for a catalog cart line instead of trusting a client-supplied amount.
  // Empty for providers/offers that cannot mint an authoritative quote.
  string price_quote = 30;
}

// Installment holds installment payment details.
message Installment {
  string text = 1;
  int32 price = 2;
  int32 months = 3;
}

// CurrencyInfo holds currency conversion details.
message CurrencyInfo {
  int32 from_currency = 1;
  int32 to_currency = 2;
  int32 currency = 3;
  double value = 4;
}

// ListSearchHistoryRequest is the input for listing search history.
message ListSearchHistoryRequest {
  int32 page = 1;
  int32 page_size = 2;
}

// ListSearchHistoryResponse contains paginated search history items.
message ListSearchHistoryResponse {
  repeated SearchHistoryItem items = 1;
  int32 total = 2;
}

// SearchHistoryItem represents a single search in the history.
message SearchHistoryItem {
  int64 id = 1;
  int64 user_id = 2;
  repeated string part_nums = 3;
  string detail_name = 4;
  string vin = 5;
  string city = 6;
  google.protobuf.Timestamp created_at = 7;
}

// GetSearchResultRequest is the input for retrieving stored search results.
message GetSearchResultRequest {
  int64 search_id = 1;
}

// GetSearchResultResponse contains raw provider results for a search.
message GetSearchResultResponse {
  repeated SearchResultRecord results = 1;
}

// SearchResultRecord stores the raw result from a single provider for a search.
message SearchResultRecord {
  int64 id = 1;
  int64 search_id = 2;
  string provider_name = 3;
  int32 provider_id = 4;
  bytes payload = 5;
  int32 status_code = 6;
  string error_msg = 7;
  int32 duration_ms = 8;
  google.protobuf.Timestamp created_at = 9;
}

// StreamSearchPartsResponse is sent for each provider as it completes.
message StreamSearchPartsResponse {
  int64 search_id = 1;
  ProviderResult result = 2;
  int32 total_providers = 3;
  int32 completed_providers = 4;
}

// ─── Supplier Management ─────────────────────────────────────────────

// SupplierService manages parts suppliers (both API and Excel-based).
service SupplierService {
  rpc CreateSupplier(CreateSupplierRequest) returns (CreateSupplierResponse);
  rpc UpdateSupplier(UpdateSupplierRequest) returns (UpdateSupplierResponse);
  rpc DeleteSupplier(DeleteSupplierRequest) returns (DeleteSupplierResponse);
  rpc GetSupplier(GetSupplierRequest) returns (GetSupplierResponse);
  rpc ListSuppliers(ListSuppliersRequest) returns (ListSuppliersResponse);

  // Excel catalog import
  rpc ImportCatalog(ImportCatalogRequest) returns (ImportCatalogResponse);
  rpc GetImportStatus(GetImportStatusRequest) returns (GetImportStatusResponse);

  // Catalog browsing
  rpc ListCatalogItems(ListCatalogItemsRequest) returns (ListCatalogItemsResponse);
  rpc DeleteCatalogItems(DeleteCatalogItemsRequest) returns (DeleteCatalogItemsResponse);
}

enum IntegrationType {
  INTEGRATION_TYPE_UNSPECIFIED = 0;
  INTEGRATION_TYPE_API = 1;
  INTEGRATION_TYPE_EXCEL = 2;
}

enum ImportMode {
  IMPORT_MODE_UNSPECIFIED = 0;
  IMPORT_MODE_FULL_REPLACE = 1;
  IMPORT_MODE_APPEND_UPDATE = 2;
}

message Supplier {
  int64 id = 1;
  int64 org_id = 2;
  string name = 3;
  IntegrationType integration_type = 4;
  int32 service_id = 5;
  string city = 6;
  bool enabled = 7;
  string api_provider = 8;
  int32 catalog_count = 9;
  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Timestamp updated_at = 11;
}

message CreateSupplierRequest {
  int64 org_id = 1;
  string name = 2;
  string city = 3;
  IntegrationType integration_type = 4;
  string api_provider = 5;
}

message CreateSupplierResponse {
  Supplier supplier = 1;
}

message UpdateSupplierRequest {
  int64 id = 1;
  string name = 2;
  string city = 3;
  bool enabled = 4;
  int64 org_id = 5;
}

message UpdateSupplierResponse {
  Supplier supplier = 1;
}

message DeleteSupplierRequest {
  int64 id = 1;
}

message DeleteSupplierResponse {}

message GetSupplierRequest {
  int64 id = 1;
}

message GetSupplierResponse {
  Supplier supplier = 1;
}

message ListSuppliersRequest {
  int32 page = 1;
  int32 page_size = 2;
  string city = 3;
  bool enabled_only = 4;
  IntegrationType integration_type = 5;
}

message ListSuppliersResponse {
  repeated Supplier suppliers = 1;
  int32 total = 2;
}

message ImportCatalogRequest {
  int64 supplier_id = 1;
  bytes file_data = 2;
  string file_name = 3;
  ImportMode mode = 4;
}

message ImportCatalogResponse {
  int64 import_id = 1;
  string status = 2;
  int32 total_rows = 3;
  int32 imported = 4;
  int32 skipped = 5;
  int32 errors = 6;
  repeated ImportError error_details = 7;
}

message GetImportStatusRequest {
  int64 import_id = 1;
}

message GetImportStatusResponse {
  int64 import_id = 1;
  string status = 2;
  int32 total_rows = 3;
  int32 imported = 4;
  int32 skipped = 5;
  int32 errors = 6;
  repeated ImportError error_details = 7;
}

message ImportError {
  int32 row = 1;
  string message = 2;
}

message CatalogItem {
  int64 id = 1;
  string article = 2;
  string brand = 3;
  string name = 4;
  int32 price = 5;
  int32 quantity = 6;
  int32 delivery_days = 7;
  bool is_original = 8;
  string note = 9;
  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Timestamp updated_at = 11;
}

message ListCatalogItemsRequest {
  int64 supplier_id = 1;
  int32 page = 2;
  int32 page_size = 3;
  string search = 4;
}

message ListCatalogItemsResponse {
  repeated CatalogItem items = 1;
  int32 total = 2;
}

message DeleteCatalogItemsRequest {
  int64 supplier_id = 1;
  repeated int64 item_ids = 2;
}

message DeleteCatalogItemsResponse {
  int32 deleted = 1;
}
