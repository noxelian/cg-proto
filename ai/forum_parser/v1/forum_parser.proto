syntax = "proto3";

package ai.forum_parser.v1;

option go_package = "github.com/4ubak/cg-proto/gen/go/ai/forum_parser/v1;forumparserv1";

import "google/protobuf/timestamp.proto";

// ForumParserService — crawled + CTOgram user discussions in one model.
// Production: BFF (cg-bff) calls over gRPC; forum-parser may expose HTTP for local dev only.
//
// Auth for mutating RPCs (CreateDiscussion, CreateReply, ListMyDiscussions):
//   - metadata "authorization": "Bearer <jwt>" (BFF forwards mobile/web token), and/or
//   - metadata "x-user-id": "<usr_id>" when BFF has already validated the token.
service ForumParserService {
  // Semantic search (POST /v1/search) or brand browse when browse=true.
  rpc SearchThreads(SearchThreadsRequest) returns (SearchThreadsResponse);

  // Thread detail with OP + first page of posts (GET /v1/threads/:id).
  rpc GetThread(GetThreadRequest) returns (GetThreadResponse);

  // Paginated posts excluding OP duplication logic on server (GET /v1/threads/:id/posts).
  rpc ListThreadPosts(ListThreadPostsRequest) returns (ListThreadPostsResponse);

  // Feed by garage car (GET /v1/discussions?car_make_id=...).
  rpc ListDiscussions(ListDiscussionsRequest) returns (ListDiscussionsResponse);

  // Current user's threads (GET /v1/discussions/mine). Requires auth metadata.
  rpc ListMyDiscussions(ListMyDiscussionsRequest) returns (ListMyDiscussionsResponse);

  // Create user thread (POST /v1/discussions). Requires auth metadata.
  rpc CreateDiscussion(CreateDiscussionRequest) returns (CreateDiscussionResponse);

  // Reply on any thread (POST /v1/threads/:id/replies). Requires auth metadata.
  rpc CreateReply(CreateReplyRequest) returns (CreateReplyResponse);
}

// ThreadCard is the list/detail header for crawled and user-authored threads.
message ThreadCard {
  string id = 1;
  string forum_slug = 2;
  string forum_name = 3;
  string title = 4;
  string excerpt = 5;
  int32 reply_count = 6;
  double score = 7;
  google.protobuf.Timestamp last_activity = 8;
  string source_url = 9;
  bool is_user_authored = 10;
  int64 author_user_id = 11; // 0 if crawled / unknown
  int32 car_make_id = 12; // 0 if unset
  string car_make_name = 13;
  int32 car_model_id = 14; // 0 if unset
  string car_model_name = 15;
  int32 car_year = 16; // 0 if unset
  bool can_reply = 17;
}

message Post {
  int32 position = 1;
  string author = 2;
  string body = 3;
  google.protobuf.Timestamp posted_at = 4;
  bool is_user_post = 5;
  int64 author_user_id = 6; // 0 if crawled author string only
  int32 reply_to_position = 7; // 0 = not a targeted reply
  string quote_excerpt = 8;
}

message SearchThreadsRequest {
  string query = 1;
  int32 limit = 2;
  int32 offset = 3;
  // true = car-make browse (keyword match + lower threshold), same as HTTP browse flag.
  bool browse = 4;
}

message SearchThreadsResponse {
  repeated ThreadCard threads = 1;
  bool has_more = 2;
  double min_score = 3;
  bool browse = 4;
}

message GetThreadRequest {
  string thread_id = 1;
  int32 posts_limit = 2;
  int32 posts_offset = 3;
  // When > 0, server picks posts_offset so this position appears in the page (chronological order).
  int32 around_position = 4;
}

message GetThreadResponse {
  ThreadCard thread = 1;
  repeated Post posts = 2;
  bool posts_has_more = 3;
  int32 posts_total = 4;
  // Viewer positions when my_positions_set=true. OP is position 0.
  int32 my_first_position = 5;
  int32 my_last_position = 6;
  // True when viewer is known and has at least one post (or is thread OP author).
  bool my_positions_set = 7;
  // Row offset used for this page (SQL OFFSET on published posts, excluding synthetic OP).
  int32 posts_offset = 8;
  // True when earlier posts exist (posts_offset > 0).
  bool posts_has_before = 9;
}

message ListThreadPostsRequest {
  string thread_id = 1;
  int32 limit = 2;
  int32 offset = 3;
}

message ListThreadPostsResponse {
  repeated Post posts = 1;
  bool has_more = 2;
}

message ListDiscussionsRequest {
  int32 car_make_id = 1; // required (>0)
  string car_make_name = 2;
  int32 car_model_id = 3; // 0 = any model for make
  string car_model_name = 4;
  int32 car_year = 5; // 0 = any year
  int32 limit = 6;
  int32 offset = 7;
}

message ListDiscussionsResponse {
  repeated ThreadCard threads = 1;
  bool has_more = 2;
}

message ListMyDiscussionsRequest {
  int32 limit = 1;
  int32 offset = 2;
}

message ListMyDiscussionsResponse {
  repeated ThreadCard threads = 1;
  bool has_more = 2;
}

message CreateDiscussionRequest {
  string title = 1;
  string body = 2;
  int32 car_make_id = 3; // 0 = optional
  string car_make_name = 4;
  int32 car_model_id = 5;
  string car_model_name = 6;
  int32 car_year = 7;
}

message CreateDiscussionResponse {
  ThreadCard thread = 1;
}

message CreateReplyRequest {
  string thread_id = 1;
  string body = 2;
  int32 reply_to_position = 3; // 0 = none
  string quote_excerpt = 4;
}

message CreateReplyResponse {
  Post reply = 1;
}

// =============================================================================
// Forum Q&A (CTOgram community questions — no crawled threads in this API).
// BFF maps HTTP /v1/questions/* to ForumQAService.
// =============================================================================

// ForumQAService — user questions, answers, knowledge base, master (PRO) flows.
// Mutating RPCs require auth metadata (same as ForumParserService).
service ForumQAService {
  // Static topic catalog (engine, suspension, …).
  rpc ListTopics(ListTopicsRequest) returns (ListTopicsResponse);

  // Public feed with filters and sort (GET /v1/questions).
  rpc ListQuestions(ListQuestionsRequest) returns (ListQuestionsResponse);

  // Current user's questions and threads where user answered (GET /v1/questions/mine).
  rpc ListMyQuestions(ListMyQuestionsRequest) returns (ListMyQuestionsResponse);

  // Solved questions for knowledge-base tab (GET /v1/knowledge).
  rpc ListKnowledgeBase(ListKnowledgeBaseRequest) returns (ListKnowledgeBaseResponse);

  // Curated FAQ collections shown on knowledge-base tab.
  rpc ListFAQCollections(ListFAQCollectionsRequest) returns (ListFAQCollectionsResponse);

  // Similar solved questions shown before publishing (guard on create form).
  rpc FindSimilarSolved(FindSimilarSolvedRequest) returns (FindSimilarSolvedResponse);

  // Auto-suggest topic from question title keywords.
  rpc SuggestTopic(SuggestTopicRequest) returns (SuggestTopicResponse);

  // Question detail with answers (GET /v1/questions/:id). Increments view_count.
  rpc GetQuestion(GetQuestionRequest) returns (GetQuestionResponse);

  rpc CreateQuestion(CreateQuestionRequest) returns (CreateQuestionResponse);

  rpc CreateAnswer(CreateAnswerRequest) returns (CreateAnswerResponse);

  // Question author marks best answer → status solved, entry in knowledge base.
  rpc MarkBestAnswer(MarkBestAnswerRequest) returns (MarkBestAnswerResponse);

  rpc ReportQuestion(ReportQuestionRequest) returns (ReportQuestionResponse);

  rpc ReportAnswer(ReportAnswerRequest) returns (ReportAnswerResponse);

  // --- Master (PRO) ---

  rpc GetMasterProfile(GetMasterProfileRequest) returns (GetMasterProfileResponse);

  rpc UpsertMasterProfile(UpsertMasterProfileRequest) returns (UpsertMasterProfileResponse);

  // Open questions matching master profile (topics, brands, radius).
  rpc ListIncomingQuestions(ListIncomingQuestionsRequest) returns (ListIncomingQuestionsResponse);

  // Master dismisses a question from their incoming list.
  rpc HideQuestion(HideQuestionRequest) returns (HideQuestionResponse);
}

enum QuestionStatus {
  QUESTION_STATUS_UNSPECIFIED = 0;
  QUESTION_STATUS_OPEN = 1;
  QUESTION_STATUS_SOLVED = 2;
  QUESTION_STATUS_CLOSED = 3;
}

enum AuthorRole {
  AUTHOR_ROLE_UNSPECIFIED = 0;
  AUTHOR_ROLE_CLIENT = 1;
  AUTHOR_ROLE_MASTER = 2;
}

enum QuestionSort {
  QUESTION_SORT_UNSPECIFIED = 0;
  QUESTION_SORT_NEW = 1;
  QUESTION_SORT_NO_ANSWER = 2;
  QUESTION_SORT_POPULAR_WEEK = 3;
}

enum QuestionStatusFilter {
  QUESTION_STATUS_FILTER_UNSPECIFIED = 0;
  QUESTION_STATUS_FILTER_OPEN = 1;
  QUESTION_STATUS_FILTER_SOLVED = 2;
  // Open questions with zero answers.
  QUESTION_STATUS_FILTER_NO_ANSWER = 3;
}

enum ReportReason {
  REPORT_REASON_UNSPECIFIED = 0;
  REPORT_REASON_SPAM = 1;
  REPORT_REASON_ABUSE = 2;
  REPORT_REASON_ADVERTISING = 3;
  REPORT_REASON_OTHER = 4;
}

// Topic is a fixed catalog row (forum_topics table).
message Topic {
  string id = 1;
  string name = 2;
}

// QuestionCard — list/header shape for Q&A UI (maps to ctogram user thread).
message QuestionCard {
  string id = 1;
  string title = 2;
  string excerpt = 3;
  QuestionStatus question_status = 4;
  string topic_id = 5;
  string topic_name = 6;
  int32 answer_count = 7;
  int32 view_count = 8;
  bool has_master_answer = 9;
  int32 photo_count = 10;
  int64 author_user_id = 11;
  string author_display_name = 12;
  int32 car_make_id = 13;
  string car_make_name = 14;
  int32 car_model_id = 15;
  string car_model_name = 16;
  int32 car_year = 17;
  int64 garage_car_id = 18;
  string city = 19;
  google.protobuf.Timestamp created_at = 20;
  google.protobuf.Timestamp last_activity = 21;
  // True when authenticated viewer is the question author.
  bool is_author = 22;
}

// Answer — one reply on a question (maps to published user post).
message Answer {
  string id = 1;
  AuthorRole author_role = 2;
  int64 author_user_id = 3;
  string author_display_name = 4;
  int64 workshop_id = 5;
  string workshop_name = 6;
  bool offer_booking = 7;
  string body = 8;
  repeated string photo_urls = 9;
  bool is_best = 10;
  google.protobuf.Timestamp posted_at = 11;
  // Legacy chronological index within thread (position > 0).
  int32 position = 12;
}

message FAQCollection {
  string id = 1;
  string title = 2;
  string slug = 3;
  int32 question_count = 4;
  // Optional cover gradient/key for UI (e.g. "navy", "green").
  string style_key = 5;
  // topic_id when filter_kind = "topic"; empty for "popular".
  string topic_id = 6;
  // "topic" | "popular"
  string filter_kind = 7;
}

// --- Topics ---

message ListTopicsRequest {}

message ListTopicsResponse {
  repeated Topic topics = 1;
}

// --- List / search feed ---

message ListQuestionsRequest {
  string query = 1;
  string topic_id = 2;
  QuestionStatusFilter status_filter = 3;
  QuestionSort sort = 4;
  // When true, filter to viewer garage car make/model/year (requires auth).
  bool my_car = 5;
  int32 car_make_id = 6;
  int32 car_model_id = 7;
  int32 car_year = 8;
  string city = 9;
  int32 limit = 10;
  int32 offset = 11;
}

message ListQuestionsResponse {
  repeated QuestionCard questions = 1;
  bool has_more = 2;
}

message ListMyQuestionsRequest {
  int32 limit = 1;
  int32 offset = 2;
}

message ListMyQuestionsResponse {
  repeated QuestionCard questions = 1;
  bool has_more = 2;
}

// --- Knowledge base ---

message ListKnowledgeBaseRequest {
  string query = 1;
  string topic_id = 2;
  int32 limit = 3;
  int32 offset = 4;
}

message ListKnowledgeBaseResponse {
  repeated QuestionCard questions = 1;
  bool has_more = 2;
}

message ListFAQCollectionsRequest {}

message ListFAQCollectionsResponse {
  repeated FAQCollection collections = 1;
}

message FindSimilarSolvedRequest {
  string title = 1;
  string topic_id = 2;
  int32 car_make_id = 3;
  string car_make_name = 4;
  int32 car_model_id = 5;
  string car_model_name = 6;
  int32 limit = 7;
}

message FindSimilarSolvedResponse {
  repeated QuestionCard questions = 1;
}

message SuggestTopicRequest {
  string title = 1;
}

message SuggestTopicResponse {
  string topic_id = 1;
  string topic_name = 2;
}

// --- Detail ---

message GetQuestionRequest {
  string question_id = 1;
}

message GetQuestionResponse {
  QuestionCard question = 1;
  string body = 2;
  repeated string photo_urls = 3;
  repeated Answer answers = 4;
  string best_answer_id = 5;
  // Viewer may mark best answer when true.
  bool can_mark_best = 6;
}

// --- Create / mutate ---

message CreateQuestionRequest {
  string title = 1;
  string body = 2;
  string topic_id = 3;
  int32 car_make_id = 4;
  string car_make_name = 5;
  int32 car_model_id = 6;
  string car_model_name = 7;
  int32 car_year = 8;
  int64 garage_car_id = 9;
  string city = 10;
  repeated string photo_urls = 11;
}

message CreateQuestionResponse {
  QuestionCard question = 1;
}

message CreateAnswerRequest {
  string question_id = 1;
  string body = 2;
  AuthorRole author_role = 3;
  int64 workshop_id = 4;
  bool offer_booking = 5;
  repeated string photo_urls = 6;
}

message CreateAnswerResponse {
  Answer answer = 1;
}

message MarkBestAnswerRequest {
  string question_id = 1;
  string answer_id = 2;
}

message MarkBestAnswerResponse {
  QuestionCard question = 1;
  Answer best_answer = 2;
}

message ReportQuestionRequest {
  string question_id = 1;
  ReportReason reason = 2;
  string comment = 3;
}

message ReportQuestionResponse {}

message ReportAnswerRequest {
  string question_id = 1;
  string answer_id = 2;
  ReportReason reason = 3;
  string comment = 4;
}

message ReportAnswerResponse {}

// --- Master profile ---

message MasterProfile {
  int64 user_id = 1;
  int64 workshop_id = 2;
  string workshop_name = 3;
  repeated string topic_ids = 4;
  repeated string car_brands = 5;
  int32 radius_km = 6;
  string city = 7;
  bool onboarded = 8;
}

message GetMasterProfileRequest {}

message GetMasterProfileResponse {
  MasterProfile profile = 1;
}

message UpsertMasterProfileRequest {
  int64 workshop_id = 1;
  repeated string topic_ids = 2;
  repeated string car_brands = 3;
  int32 radius_km = 4;
  string city = 5;
}

message UpsertMasterProfileResponse {
  MasterProfile profile = 1;
}

message ListIncomingQuestionsRequest {
  int32 limit = 1;
  int32 offset = 2;
}

message ListIncomingQuestionsResponse {
  repeated QuestionCard questions = 1;
  bool has_more = 2;
  // Total open questions matching master profile (ignores pagination).
  int32 total_count = 3;
}

message HideQuestionRequest {
  string question_id = 1;
}

message HideQuestionResponse {}
