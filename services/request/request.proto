syntax = "proto3";

package services.request.v1;

option go_package = "github.com/4ubak/cg-proto/gen/go/services/request;requestv1";

import "google/protobuf/timestamp.proto";

service RequestService {
  // CreateRequest creates a new repair or parts request
  rpc CreateRequest(CreateRequestRequest) returns (CreateRequestResponse);
  
  // GetRequest returns request by ID
  rpc GetRequest(GetRequestRequest) returns (GetRequestResponse);
  
  // UpdateRequest updates a request
  rpc UpdateRequest(UpdateRequestRequest) returns (UpdateRequestResponse);
  
  // DeleteRequest deletes a request
  rpc DeleteRequest(DeleteRequestRequest) returns (DeleteRequestResponse);
  
  // ListRequests lists requests with filters
  rpc ListRequests(ListRequestsRequest) returns (ListRequestsResponse);

  // ListPublishedPreviews exposes the safe, read-only marketplace discovery
  // projection before sign-in. Unlike ListRequests it never includes user,
  // address, geo, organization or lifecycle-private fields.
  rpc ListPublishedPreviews(ListPublishedPreviewsRequest) returns (ListPublishedPreviewsResponse);
  
  // SearchRequests searches requests via Postgres
  rpc SearchRequests(SearchRequestsRequest) returns (SearchRequestsResponse);
  
  // ChangeStatus changes request status (moderation, published, deleted)
  rpc ChangeStatus(ChangeStatusRequest) returns (ChangeStatusResponse);
  
  // GetUserRequests returns requests for a user
  rpc GetUserRequests(GetUserRequestsRequest) returns (GetUserRequestsResponse);
  
  // IncrementViews increments view count for a request
  rpc IncrementViews(IncrementViewsRequest) returns (IncrementViewsResponse);
  
  // GetSuggestions returns search suggestions
  rpc GetSuggestions(GetSuggestionsRequest) returns (GetSuggestionsResponse);
  
  // GetNewRequestsForOrganization returns list of new request IDs for organization
  rpc GetNewRequestsForOrganization(GetNewRequestsForOrganizationRequest) returns (GetNewRequestsForOrganizationResponse);
  
  // MarkRequestAsViewed marks request as viewed for organization
  rpc MarkRequestAsViewed(MarkRequestAsViewedRequest) returns (MarkRequestAsViewedResponse);

  // IsRequestNew checks if request is new for organization
  rpc IsRequestNew(IsRequestNewRequest) returns (IsRequestNewResponse);

  // DismissRequest hides a request for an organization ("не интересно"). Wraps
  // the domain method DismissRequest(ctx, requestID, orgID).
  rpc DismissRequest(DismissRequestRequest) returns (DismissRequestResponse);

  // CountUnreadForOrganization returns the number of matched requests that are
  // unread and not dismissed for the organization, scoped by the org-profile
  // filter. Wraps the filter-aware domain method
  // CountUnreadForOrganization(ctx, orgID, model.RequestFilter).
  rpc CountUnreadForOrganization(CountUnreadForOrganizationRequest) returns (CountUnreadForOrganizationResponse);

  // ClassifyRequest sets group_id, category_ids and cleaned note for a request.
  // Used by AI classify service after auto-classification.
  rpc ClassifyRequest(ClassifyRequestRequest) returns (ClassifyRequestResponse);

  // GetUserRequestCounts returns the user's request counts grouped by state in
  // one call (legacy ads/count: total / active(PUBLISHED) / moderation /
  // inactive(DELETED+CLOSED)). Optional type filter (0 = all).
  rpc GetUserRequestCounts(GetUserRequestCountsRequest) returns (GetUserRequestCountsResponse);

  // PauseRequest temporarily hides a published request from the СТО feed.
  // Sets status → PAUSED, records paused_at and optionally paused_by_org_id.
  // Only the request owner may call this.
  rpc PauseRequest(PauseRequestRequest) returns (PauseRequestResponse);

  // UnpauseRequest restores a paused request back to PUBLISHED, clearing
  // paused_at / paused_by_org_id. Only the request owner may call this.
  rpc UnpauseRequest(UnpauseRequestRequest) returns (UnpauseRequestResponse);
}

enum RequestType {
  REQUEST_TYPE_UNSPECIFIED = 0;
  REQUEST_TYPE_REPAIR = 1;  // Ремонт
  REQUEST_TYPE_PARTS = 2;    // Запчасти
}

enum RequestStatus {
  REQUEST_STATUS_UNSPECIFIED = 0;
  REQUEST_STATUS_MODERATION = 1;
  REQUEST_STATUS_PUBLISHED = 2;
  REQUEST_STATUS_DELETED = 3;
  // Closed by the customer after picking an organization and (for repair)
  // leaving a review, or after parts/workshop receipt confirmation.
  REQUEST_STATUS_CLOSED = 4;
  // Temporarily hidden by the customer ("на паузе"). Stays classified and can
  // be republished at any time (→ PUBLISHED). Invisible to the org/СТО feed.
  REQUEST_STATUS_PAUSED = 5;
}

message Request {
  string id = 1;  // UUID string
  RequestType type = 2;
  RequestStatus status = 3;
  int64 user_id = 4;
  
  // NSI (Группа → Категории)
  int64 group_id = 5;           // СТО, Кузовные, Запчасти
  repeated int64 category_ids = 6;  // Может быть несколько
  
  // Car details (для матчинга)
  int64 car_make_id = 7;
  int64 car_model_id = 8;
  optional int64 car_generation_id = 9;
  int32 year = 10;
  
  // Description
  string note = 11;
  repeated string photos = 12;
  
  // Location
  int64 city_id = 13;
  string address = 14;
  double latitude = 15;
  double longitude = 16;
  
  google.protobuf.Timestamp created_at = 17;
  google.protobuf.Timestamp updated_at = 18;
  optional google.protobuf.Timestamp published_at = 19;

  // Workshop integration (parts request from repair order)
  optional int64 repair_order_id = 20;  // Linked repair order in cg-workshop
  optional string org_id = 21;          // Organization UUID creating the request

  // Enriched field: set when listing with organization_id context
  bool is_new = 22;  // true if this request has not been viewed by the requesting organization

  // Enriched field: number of bids (откликов) on this request. Populated by the
  // list/get queries via a LATERAL count subquery (no row multiplication).
  int32 bids_count = 23;

  // Pause metadata — set only when status == REQUEST_STATUS_PAUSED.
  optional google.protobuf.Timestamp paused_at = 24;
  // UUID of org the customer paused "for" (mirrors legacy paused_by_service_id);
  // empty when self-paused.
  optional string paused_by_org_id = 25;
  // Legacy ad.id (numeric) this request was migrated from — bridges still-legacy
  // cg_web flows (reviews, chat responses, notifications) that key off the old id.
  // 0/absent for natively-created requests.
  optional int64 legacy_id = 26;
  // Garage car (cg-users garage) this request was created for. Persisted so
  // request history can be queried per specific car, beyond the make/model/year
  // snapshot. Absent for requests created without a garage car.
  optional int64 garage_car_id = 27;
}

// CreateRequest
message CreateRequestRequest {
  RequestType type = 1;
  int64 user_id = 2;
  
  int64 group_id = 3;
  repeated int64 category_ids = 4;
  
  int64 car_make_id = 5;
  int64 car_model_id = 6;
  optional int64 car_generation_id = 7;
  int32 year = 8;
  
  string note = 9;
  repeated string photos = 10;
  
  int64 city_id = 11;
  string address = 12;
  double latitude = 13;
  double longitude = 14;
  
  bool publish = 15;  // Если true, статус = "moderation"

  // Workshop integration (parts request from repair order)
  optional int64 repair_order_id = 16;  // Linked repair order in cg-workshop
  optional string org_id = 17;          // Organization UUID creating the request

  // Garage car (cg-users garage) the request is created for. The BFF also uses
  // it to fill car_make_id/model/year, but it is persisted so request history
  // can be queried per specific car.
  optional int64 garage_car_id = 18;
}

message CreateRequestResponse {
  Request request = 1;
}

// GetRequest
message GetRequestRequest {
  string request_id = 1;  // UUID string
}

message GetRequestResponse {
  Request request = 1;
}

// UpdateRequest
message UpdateRequestRequest {
  string request_id = 1;  // UUID string
  int64 user_id = 2;

  optional string note = 3;
  repeated string photos = 4;

  optional string address = 5;
  optional double latitude = 6;
  optional double longitude = 7;

  // Car identity — editable so a manager can set the vehicle on a parts request
  // that was created without one (customer is contacted, car specified in admin).
  // Each is optional: absent = leave unchanged.
  optional int64 car_make_id = 8;
  optional int64 car_model_id = 9;
  optional int64 car_generation_id = 10;
  optional int32 year = 11;
  optional int64 garage_car_id = 12;

  // NSI classification — editable so a manager can correct the group (СТО/
  // кузовные/запчасти) and categories of a request. group_id is optional
  // (absent = unchanged); category_ids replaces the set when has_category_ids
  // is true (allows clearing to empty).
  optional int64 group_id = 13;
  repeated int64 category_ids = 14;
  bool has_category_ids = 15;
}

message UpdateRequestResponse {
  Request request = 1;
}

// DeleteRequest
message DeleteRequestRequest {
  string request_id = 1;  // UUID string
  int64 user_id = 2;
}

message DeleteRequestResponse {
  bool success = 1;
}

// ListRequests
message ListRequestsRequest {
  RequestType type = 1;
  RequestStatus status = 2;
  int64 user_id = 3;
  int64 group_id = 4;
  int64 category_id = 5;  // Фильтр по одной категории
  int64 city_id = 6;
  int64 car_make_id = 7;
  int32 page = 8;
  int32 page_size = 9;
  string sort_by = 10;  // created_at, published_at, unread_first
  optional int64 repair_order_id = 11;  // Filter by linked repair order
  optional string organization_id = 12;  // When set, enriches results with is_new flag; enables sort_by=unread_first
  optional string owner_organization_id = 13;  // Filters requests whose authoritative org_id matches this organization
}

message ListRequestsResponse {
  repeated Request requests = 1;
  int32 total = 2;
}

// ListPublishedPreviews
message ListPublishedPreviewsRequest {
  int64 category_id = 1;
  int64 city_id = 2;
  int64 car_make_id = 3;
  int32 page = 4;
  int32 page_size = 5;
}

// PublishedRequestPreview intentionally contains only marketplace-card data.
message PublishedRequestPreview {
  string id = 1;
  RequestType type = 2;
  int64 group_id = 3;
  repeated int64 category_ids = 4;
  int64 car_make_id = 5;
  int64 car_model_id = 6;
  int32 year = 7;
  string note = 8;
  repeated string photos = 9;
  int64 city_id = 10;
  google.protobuf.Timestamp published_at = 11;
}

message ListPublishedPreviewsResponse {
  repeated PublishedRequestPreview requests = 1;
  int32 total = 2;
}

// SearchRequests
message SearchRequestsRequest {
  string query = 1;
  RequestType type = 2;
  int64 group_id = 3;
  repeated int64 category_ids = 4;
  int64 city_id = 5;
  int64 car_make_id = 6;
  int64 car_model_id = 7;
  int32 year_min = 8;
  int32 year_max = 9;
  int32 page = 10;
  int32 page_size = 11;
}

message SearchRequestsResponse {
  repeated Request requests = 1;
  int32 total = 2;
}

// ChangeStatus
message ChangeStatusRequest {
  string request_id = 1;  // UUID string
  RequestStatus status = 2;
  int64 user_id = 3;
}

message ChangeStatusResponse {
  Request request = 1;
}

// GetUserRequests
message GetUserRequestsRequest {
  int64 user_id = 1;
  RequestStatus status = 2;
  int32 page = 3;
  int32 page_size = 4;
  // Multi-status filter (server-side IN); when non-empty it wins over `status`.
  // Enables correct tab bucketing (active = moderation+published+paused,
  // completed = deleted+closed) with correct pagination/meta — the old
  // single-status field forced clients/BFF to post-filter after pagination.
  repeated RequestStatus statuses = 5;
}

message GetUserRequestsResponse {
  repeated Request requests = 1;
  int32 total = 2;
}

// IncrementViews
message IncrementViewsRequest {
  string request_id = 1;  // UUID string
}

message IncrementViewsResponse {
  bool success = 1;
}

// GetSuggestions
message GetSuggestionsRequest {
  string query = 1;
  int32 limit = 2;
}

message GetSuggestionsResponse {
  repeated string suggestions = 1;
}

// GetNewRequestsForOrganization
message GetNewRequestsForOrganizationRequest {
  string organization_id = 1;  // UUID from organization-service
}

message GetNewRequestsForOrganizationResponse {
  repeated string request_ids = 1;  // UUID strings
}

// MarkRequestAsViewed
message MarkRequestAsViewedRequest {
  string request_id = 1;  // UUID string
  string organization_id = 2;  // UUID from organization-service
}

message MarkRequestAsViewedResponse {
  bool success = 1;
}

// IsRequestNew
message IsRequestNewRequest {
  string request_id = 1;  // UUID string
  string organization_id = 2;  // UUID from organization-service
}

message IsRequestNewResponse {
  bool is_new = 1;
}

// DismissRequest — hide a request for an organization ("не интересно").
// Wraps domain DismissRequest(ctx, requestID, orgID).
message DismissRequestRequest {
  string request_id = 1;       // UUID string
  string organization_id = 2;  // UUID from organization-service
}

message DismissRequestResponse {
  bool success = 1;
}

// CountUnreadForOrganization — count unread & not-dismissed requests for an
// organization, scoped by the org-profile filter. Wraps domain
// CountUnreadForOrganization(ctx, orgID, model.RequestFilter).
//
// Filter fields map 1:1 to model.RequestFilter. Empty/zero = no filter on that
// field. Note the domain filter carries a single category_id (not a list).
message CountUnreadForOrganizationRequest {
  string organization_id = 1;  // UUID from organization-service

  // Org-profile filter (subset of model.RequestFilter used by the feed).
  RequestType type = 2;        // UNSPECIFIED = any type
  int64 group_id = 3;          // 0 = any group
  int64 category_id = 4;       // 0 = any category (model.RequestFilter.CategoryID)
  int64 city_id = 5;           // 0 = any city
  int64 car_make_id = 6;       // 0 = any make
  int64 car_model_id = 7;      // 0 = any model
  int32 year = 8;              // 0 = any year
}

message CountUnreadForOrganizationResponse {
  int64 count = 1;
}

// ClassifyRequest — AI auto-classification of repair/parts requests
message ClassifyRequestRequest {
  string request_id = 1;          // UUID of the request to classify
  int64 group_id = 2;             // Service group (1=STO/Repair, 2=Bodyshop)
  repeated int64 category_ids = 3; // Service categories
  string cleaned_note = 4;        // Moderated/cleaned description text
  bool publish = 5;               // If true, also transition status to PUBLISHED
}

message ClassifyRequestResponse {
  Request request = 1;
}

// GetUserRequestCounts — per-state counts of a user's requests (legacy ads/count).
message GetUserRequestCountsRequest {
  int64 user_id = 1;
  RequestType type = 2;  // optional filter; 0 (unspecified) = all types
}

message GetUserRequestCountsResponse {
  int32 total = 1;
  int32 active = 2;       // REQUEST_STATUS_PUBLISHED
  int32 moderation = 3;   // REQUEST_STATUS_MODERATION
  int32 inactive = 4;     // REQUEST_STATUS_DELETED + REQUEST_STATUS_CLOSED
  int32 paused = 5;       // REQUEST_STATUS_PAUSED (separate bucket)
}

// PauseRequest — hide a published request from the СТО feed.
message PauseRequestRequest {
  string request_id = 1;  // UUID of the request to pause
  int64 user_id = 2;      // must match request.user_id
  // Optional UUID of the organization the customer is pausing for.
  // Mirrors legacy paused_by_service_id. Empty = self-pause.
  optional string paused_by_org_id = 3;
}

message PauseRequestResponse {
  Request request = 1;
}

// UnpauseRequest — restore a paused request to PUBLISHED.
message UnpauseRequestRequest {
  string request_id = 1;  // UUID of the request to unpause
  int64 user_id = 2;      // must match request.user_id
}

message UnpauseRequestResponse {
  Request request = 1;
}
