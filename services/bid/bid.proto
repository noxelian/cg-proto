syntax = "proto3";

package services.bid.v1;

option go_package = "github.com/4ubak/cg-proto/gen/go/services/bid;bidv1";

import "google/protobuf/timestamp.proto";

service BidService {
  // CreateBid creates a new bid from organization to request
  rpc CreateBid(CreateBidRequest) returns (CreateBidResponse);
  
  // GetBid returns bid by ID
  rpc GetBid(GetBidRequest) returns (GetBidResponse);
  
  // UpdateBid updates a bid
  rpc UpdateBid(UpdateBidRequest) returns (UpdateBidResponse);
  
  // DeleteBid deletes a bid
  rpc DeleteBid(DeleteBidRequest) returns (DeleteBidResponse);
  
  // ListBids lists bids with filters
  rpc ListBids(ListBidsRequest) returns (ListBidsResponse);
  
  // GetBidsByRequest returns bids for a request
  rpc GetBidsByRequest(GetBidsByRequestRequest) returns (GetBidsByRequestResponse);
  
  // GetBidsByOrganization returns bids for an organization
  rpc GetBidsByOrganization(GetBidsByOrganizationRequest) returns (GetBidsByOrganizationResponse);
  
  // AcceptBid accepts a bid (user accepts organization's bid)
  rpc AcceptBid(AcceptBidRequest) returns (AcceptBidResponse);
  
  // RejectBid rejects a bid (user rejects organization's bid)
  rpc RejectBid(RejectBidRequest) returns (RejectBidResponse);
  
  // CancelBid cancels a bid (organization cancels their bid)
  rpc CancelBid(CancelBidRequest) returns (CancelBidResponse);
  rpc MarkPartsPurchased(MarkPartsPurchasedRequest) returns (MarkPartsPurchasedResponse);

  // GetBidPartPrices fetches current prices for a batch of bid parts.
  // Used by CartService.RefreshPrices to detect price changes on cart items.
  rpc GetBidPartPrices(GetBidPartPricesRequest) returns (GetBidPartPricesResponse);

  // MarkBidRead marks a bid (response) as read by the given user.
  // Idempotent — calling multiple times is safe.
  rpc MarkBidRead(MarkBidReadRequest) returns (MarkBidReadResponse);

  // GetRequestResponsesSummary returns per-request aggregates (total responses,
  // unread count, last_response_at) for a set of request IDs owned by a user.
  rpc GetRequestResponsesSummary(GetRequestResponsesSummaryRequest) returns (GetRequestResponsesSummaryResponse);

  // Buyer-scoped parts projections for chatbot-service. Bid-service validates
  // buyer_user_id against the authoritative request owner before returning a bid.
  rpc GetBidForBuyer(GetBidForBuyerRequest) returns (GetBidForBuyerResponse);
  rpc ListBidsForBuyer(ListBidsForBuyerRequest) returns (ListBidsForBuyerResponse);

  // Review-eligibility projection for organization-service. It exposes only
  // whether one organization has an accepted bid on one request.
  rpc HasAcceptedBidForOrganization(HasAcceptedBidForOrganizationRequest) returns (HasAcceptedBidForOrganizationResponse);
}

enum BidType {
  BID_TYPE_UNSPECIFIED = 0;
  BID_TYPE_STO = 1;              // СТО
  BID_TYPE_PARTS_SUPPLIER = 2;   // Поставщик запчастей
}

enum BidStatus {
  BID_STATUS_UNSPECIFIED = 0;
  BID_STATUS_PENDING = 1;
  BID_STATUS_ACCEPTED = 2;
  BID_STATUS_REJECTED = 3;
  BID_STATUS_CANCELLED = 4;
}

message Bid {
  int64 id = 1;
  string request_id = 2;
  BidType type = 3;
  BidStatus status = 4;
  string organization_id = 5;  // UUID from organization-service
  
  // For STO
  optional int64 price = 6;
  string currency = 7;
  optional int32 duration = 8;  // Длительность ремонта в днях
  
  // For Parts Supplier
  repeated BidPart parts = 9;
  
  string description = 10;
  repeated string photos = 11;
  
  google.protobuf.Timestamp created_at = 12;
  google.protobuf.Timestamp updated_at = 13;
}

message BidPart {
  int64 id = 1;
  int64 bid_id = 2;
  string part_name = 3;
  string part_number = 4;
  int32 quantity = 5;
  int64 price = 6;
  string condition = 7;        // new, used, refurbished
  string availability = 8;     // in_stock, on_order, unavailable
  string status = 9;           // pending, purchased
  // Source warehouse the supplier ships this position from. UUID of cg-warehouse.warehouses.id.
  // Empty string means legacy/unspecified (warehouse write-off skipped).
  string warehouse_id = 10;
}

// CreateBid
message CreateBidRequest {
  string request_id = 1;
  BidType type = 2;
  string organization_id = 3;  // UUID from organization-service
  
  // For STO
  optional int64 price = 4;
  string currency = 5;
  optional int32 duration = 6;
  
  // For Parts Supplier
  repeated CreateBidPartRequest parts = 7;
  
  string description = 8;
  repeated string photos = 9;

  // Admin: skip payment/subscription check when creating bid on behalf of org
  bool skip_payment_check = 10;
}

message CreateBidPartRequest {
  string part_name = 1;
  string part_number = 2;
  int32 quantity = 3;
  int64 price = 4;
  string condition = 5;
  string availability = 6;
  // UUID of cg-warehouse.warehouses.id the supplier will ship from.
  string warehouse_id = 7;
}

message CreateBidResponse {
  Bid bid = 1;
}

// GetBid
message GetBidRequest {
  int64 bid_id = 1;
}

message GetBidResponse {
  Bid bid = 1;
}

message GetBidForBuyerRequest {
  int64 bid_id = 1;
  int64 buyer_user_id = 2;
}

message GetBidForBuyerResponse {
  Bid bid = 1;
}

message ListBidsForBuyerRequest {
  string request_id = 1;
  int64 buyer_user_id = 2;
}

message ListBidsForBuyerResponse {
  repeated Bid bids = 1;
}

message HasAcceptedBidForOrganizationRequest {
  string request_id = 1;
  string organization_id = 2;
}

message HasAcceptedBidForOrganizationResponse {
  bool accepted = 1;
}

// UpdateBid
message UpdateBidRequest {
  int64 bid_id = 1;
  string organization_id = 2;  // UUID from organization-service
  
  optional int64 price = 3;
  string currency = 4;
  optional int32 duration = 5;
  repeated CreateBidPartRequest parts = 6;
  optional string description = 7;
  repeated string photos = 8;
}

message UpdateBidResponse {
  Bid bid = 1;
}

// DeleteBid
message DeleteBidRequest {
  int64 bid_id = 1;
  string organization_id = 2;  // UUID from organization-service
}

message DeleteBidResponse {
  bool success = 1;
}

// ListBids
message ListBidsRequest {
  BidType type = 1;
  BidStatus status = 2;
  string organization_id = 3;  // UUID from organization-service
  string request_id = 4;
  int32 page = 5;
  int32 page_size = 6;
}

message ListBidsResponse {
  repeated Bid bids = 1;
  int32 total = 2;
}

// GetBidsByRequest
message GetBidsByRequestRequest {
  string request_id = 1;
  BidStatus status = 2;
  int32 page = 3;
  int32 page_size = 4;
}

message GetBidsByRequestResponse {
  repeated Bid bids = 1;
  int32 total = 2;
}

// GetBidsByOrganization
message GetBidsByOrganizationRequest {
  string organization_id = 1;  // UUID from organization-service
  BidStatus status = 2;
  int32 page = 3;
  int32 page_size = 4;
}

message GetBidsByOrganizationResponse {
  repeated Bid bids = 1;
  int32 total = 2;
}

// AcceptBid
message AcceptBidRequest {
  int64 bid_id = 1;
  int64 user_id = 2;
}

message AcceptBidResponse {
  Bid bid = 1;
}

// RejectBid
message RejectBidRequest {
  int64 bid_id = 1;
  int64 user_id = 2;
}

message RejectBidResponse {
  Bid bid = 1;
}

// CancelBid
message CancelBidRequest {
  int64 bid_id = 1;
  string organization_id = 2;  // UUID from organization-service
}

message CancelBidResponse {
  Bid bid = 1;
}


// GetBidPartPrices

// BidPartPriceQuery identifies a single bid part to look up.
message BidPartPriceQuery {
  int64 bid_id = 1;
  int64 bid_part_id = 2;
}

// BidPartPriceResult carries the current price and validity of a bid part.
message BidPartPriceResult {
  int64 bid_id = 1;
  int64 bid_part_id = 2;

  // Legacy current price in the currency minor unit (tiyn for KZT), kept for
  // rolling-deploy compatibility. New consumers should prefer
  // unit_price_minor because its unit is explicit in the field name.
  int64 unit_price = 3;

  // is_valid is false when the bid is expired, cancelled, or the part is unavailable.
  bool is_valid = 4;

  // invalid_reason is set when is_valid = false. Examples: "bid_expired", "bid_cancelled", "part_unavailable".
  string invalid_reason = 5;

  // availability reflects the current stock status: in_stock, on_order, unavailable.
  string availability = 6;

  // Authoritative current price in the currency minor unit (tiyn for KZT).
  // Populated with the same value as unit_price so old and new consumers can
  // coexist during a rolling deployment.
  int64 unit_price_minor = 7;
}

message GetBidPartPricesRequest {
  repeated BidPartPriceQuery items = 1;
}

message GetBidPartPricesResponse {
  repeated BidPartPriceResult results = 1;
}

// MarkPartsPurchased
message MarkPartsPurchasedRequest {
  int64 bid_id = 1;
  repeated int64 part_ids = 2;
}

message MarkPartsPurchasedResponse {}

// MarkBidRead
message MarkBidReadRequest {
  int64  bid_id     = 1;
  int64  user_id    = 2;
  string request_id = 3;
}

message MarkBidReadResponse {
  // already_read is true when the read record already existed (idempotent).
  bool already_read = 1;
}

// GetRequestResponsesSummary
message RequestResponseSummary {
  string request_id       = 1;
  int32  total_responses  = 2;
  int32  unread_count     = 3;
  // last_response_at is RFC3339; empty string when no responses exist.
  string last_response_at = 4;
}

message GetRequestResponsesSummaryRequest {
  // request_ids is the set of request UUIDs to aggregate.
  repeated string request_ids = 1;
  // user_id is used to look up which bids have already been read.
  int64 user_id = 2;
}

message GetRequestResponsesSummaryResponse {
  // summaries maps request_id -> summary; absent entries mean zero responses.
  repeated RequestResponseSummary summaries = 1;
}
