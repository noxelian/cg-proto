syntax = "proto3";

package payments.payment.v1;

option go_package = "github.com/4ubak/cg-proto/gen/go/payments/payment;paymentv1";

import "google/protobuf/timestamp.proto";

// PaymentService handles payment processing, transactions, refunds, and webhooks.
// Domain services (orders, bookings) create entities first, then BFF calls
// CreateTransaction to initiate payment via the appropriate provider.
service PaymentService {
  // === Transactions ===
  rpc CreateTransaction(CreateTransactionRequest) returns (CreateTransactionResponse);
  rpc ListTransactions(ListTransactionsRequest) returns (ListTransactionsResponse);
  rpc GetTransaction(GetTransactionRequest) returns (GetTransactionResponse);

  // === Refunds ===
  rpc InitiateRefund(InitiateRefundRequest) returns (InitiateRefundResponse);

  // === Provider webhooks ===
  rpc HandleIokaWebhook(HandleIokaWebhookRequest) returns (HandleIokaWebhookResponse);
  rpc HandleKaspiCheckPay(HandleKaspiCheckPayRequest) returns (HandleKaspiCheckPayResponse);

  // === Admin ===
  rpc GetPaymentAuditLog(GetPaymentAuditLogRequest) returns (GetPaymentAuditLogResponse);

  // MarkPaidB2B records an offline (invoice/cash) payment made on behalf
  // of a legal-entity buyer. Creates a succeeded transaction without
  // calling a provider; emits payment.events with canonical_event_type
  // = payment.success so cg-orders cart consumer treats it identically
  // to B2C online payments. Caller must hold the
  // `payments:admin_mark_paid` permission (enforced at the handler).
  rpc MarkPaidB2B(MarkPaidB2BRequest) returns (MarkPaidB2BResponse);
}

// =============================================
// Enums
// =============================================

enum TransactionStatus {
  TRANSACTION_STATUS_UNSPECIFIED = 0;
  TRANSACTION_STATUS_PENDING = 1;
  TRANSACTION_STATUS_PROCESSING = 2;
  TRANSACTION_STATUS_SUCCEEDED = 3;
  TRANSACTION_STATUS_FAILED = 4;
  TRANSACTION_STATUS_REFUNDED = 5;
  TRANSACTION_STATUS_PARTIALLY_REFUNDED = 6;
}

enum TransactionType {
  TRANSACTION_TYPE_UNSPECIFIED = 0;
  TRANSACTION_TYPE_CHARGE = 1;
  TRANSACTION_TYPE_REFUND = 2;
  TRANSACTION_TYPE_ESCROW_HOLD = 3;
  TRANSACTION_TYPE_ESCROW_RELEASE = 4;
}

enum PaymentProvider {
  PAYMENT_PROVIDER_UNSPECIFIED = 0;
  PAYMENT_PROVIDER_IOKA = 1;
  PAYMENT_PROVIDER_KASPI = 2;
}

enum PaymentMethod {
  PAYMENT_METHOD_UNSPECIFIED = 0;
  PAYMENT_METHOD_CARD = 1;
  PAYMENT_METHOD_APPLE_PAY = 2;
  PAYMENT_METHOD_GOOGLE_PAY = 3;
  PAYMENT_METHOD_KASPI = 4;
}

// =============================================
// Core messages
// =============================================

message Transaction {
  int64 id = 1;
  string external_id = 2;
  string entity_type = 3;
  int64 entity_id = 4;
  string organization_id = 5;
  int64 user_id = 6;
  int64 amount = 7;
  string currency = 8;
  int64 commission_amount = 9;
  PaymentProvider provider = 10;
  PaymentMethod payment_method = 11;
  TransactionStatus status = 12;
  TransactionType type = 13;
  string idempotency_key = 14;
  google.protobuf.Timestamp paid_at = 15;
  string failure_reason = 16;
  google.protobuf.Timestamp created_at = 17;
  google.protobuf.Timestamp updated_at = 18;
}

message Refund {
  int64 id = 1;
  int64 transaction_id = 2;
  string external_id = 3;
  int64 amount = 4;
  string reason = 5;
  string status = 6;
  string initiated_by = 7;
  int64 initiator_id = 8;
  google.protobuf.Timestamp created_at = 9;
}

message AuditLogEntry {
  int64 id = 1;
  string entity_type = 2;
  int64 entity_id = 3;
  string action = 4;
  string old_status = 5;
  string new_status = 6;
  string actor_type = 7;
  string actor_id = 8;
  google.protobuf.Timestamp created_at = 9;
}

// =============================================
// CreateTransaction — initiates a payment for any entity
// =============================================

message CreateTransactionRequest {
  string entity_type = 1;       // "subscription", "bid_purchase", "order", "booking"
  int64 entity_id = 2;
  string organization_id = 3;
  int64 user_id = 4;
  int64 amount = 5;
  string currency = 6;
  PaymentProvider provider = 7;
  PaymentMethod payment_method = 8;
  string idempotency_key = 9;
  int64 commission_amount = 10;
  string return_url = 11;       // optional HTTPS redirect URL after payment (must be HTTPS, no private IPs)
}

message CreateTransactionResponse {
  Transaction transaction = 1;
  string payment_url = 2;
}

// =============================================
// ListTransactions / GetTransaction
// =============================================

message ListTransactionsRequest {
  string organization_id = 1;
  int64 user_id = 2;
  string entity_type = 3;
  TransactionStatus status = 4;
  int32 page = 5;
  int32 page_size = 6;
}

message ListTransactionsResponse {
  repeated Transaction transactions = 1;
  int32 total = 2;
}

message GetTransactionRequest {
  int64 transaction_id = 1;
}

message GetTransactionResponse {
  Transaction transaction = 1;
}

// =============================================
// Refund
// =============================================

message InitiateRefundRequest {
  int64 transaction_id = 1;
  int64 amount = 2;
  string reason = 3;
  int64 initiator_id = 4;
}

message InitiateRefundResponse {
  Refund refund = 1;
}

// =============================================
// Webhooks
// =============================================

message HandleIokaWebhookRequest {
  bytes raw_body = 1;
  map<string, string> headers = 2;
}

message HandleIokaWebhookResponse {
  bool success = 1;
}

message HandleKaspiCheckPayRequest {
  string command = 1;
  string txn_id = 2;
  string account = 3;
  string sum = 4;
  string txn_date = 5;
}

message HandleKaspiCheckPayResponse {
  string xml_response = 1;
}

// =============================================
// Audit log
// =============================================

message GetPaymentAuditLogRequest {
  string entity_type = 1;
  int64 entity_id = 2;
  int32 page = 3;
  int32 page_size = 4;
}

message GetPaymentAuditLogResponse {
  repeated AuditLogEntry entries = 1;
  int32 total = 2;
}

// =============================================
// B2B Mark-Paid (admin-driven offline payments)
// =============================================

message MarkPaidB2BRequest {
  // entity_type + entity_id identify the payable resource (e.g.
  // "marketplace_order"+order_id). Mirrors CreateTransactionRequest so
  // downstream consumers see the same envelope as B2C events.
  string entity_type = 1;
  int64 entity_id = 2;
  string organization_id = 3;
  // user_id of the buyer (the legal entity's contact), 0 if not bound.
  int64 user_id = 4;
  int64 amount = 5;          // tiyn
  string currency = 6;       // default KZT
  string idempotency_key = 7; // typically "{checkout_id}" or "b2b:{order_id}"
  // payment_method = "invoice" | "cash"
  string payment_method = 8;
  string invoice_number = 9;  // optional, required when payment_method=invoice
  string notes = 10;          // free-form audit note
}

message MarkPaidB2BResponse {
  Transaction transaction = 1;
  // idempotent=true when the request matched an existing succeeded
  // transaction (replay). The caller can use this to suppress duplicate
  // side effects on its own side.
  bool idempotent = 2;
}
