syntax = "proto3";

package payments.payment.v1;

option go_package = "github.com/4ubak/cg-proto/gen/go/payments/payment;paymentv1";

import "google/protobuf/timestamp.proto";

// PaymentService handles payment processing, transactions, refunds, and webhooks.
service PaymentService {
  // === Transactions ===
  // CreateTransaction accepts an authoritative payment intent only from the
  // service that owns entity_type. It is not a human/BFF checkout endpoint.
  // User-facing checkout uses InitPayment + StartPayment so cg-payments can
  // resolve amount and ownership from the entity owner.
  rpc CreateTransaction(CreateTransactionRequest) returns (CreateTransactionResponse);
  rpc ListTransactions(ListTransactionsRequest) returns (ListTransactionsResponse);
  rpc GetTransaction(GetTransactionRequest) returns (GetTransactionResponse);

  // === Refunds ===
  rpc InitiateRefund(InitiateRefundRequest) returns (InitiateRefundResponse);

  // === Provider webhooks ===
  rpc HandleIokaWebhook(HandleIokaWebhookRequest) returns (HandleIokaWebhookResponse);
  rpc HandleKaspiCheckPay(HandleKaspiCheckPayRequest) returns (HandleKaspiCheckPayResponse);

  // === Admin ===
  rpc GetPaymentAuditLog(GetPaymentAuditLogRequest) returns (GetPaymentAuditLogResponse);

  // MarkPaidB2B records an offline (invoice/cash) payment made on behalf
  // of a legal-entity buyer. Creates a succeeded transaction without
  // calling a provider; emits payment.events with canonical_event_type
  // = payment.success so cg-orders cart consumer treats it identically
  // to B2C online payments. Caller must hold the
  // `payments:admin_mark_paid` permission (enforced at the handler).
  rpc MarkPaidB2B(MarkPaidB2BRequest) returns (MarkPaidB2BResponse);

  // === Combined-pay (cg_web migration) ===

  // InitPayment opens the CombinedPayModal: returns selectable payment methods,
  // wallet eligibility, and the session token used by StartPayment.
  rpc InitPayment(InitPaymentRequest) returns (InitPaymentResponse);

  // StartPayment begins the chosen payment option (or settles from wallet).
  rpc StartPayment(StartPaymentRequest) returns (StartPaymentResponse);
}

// =============================================
// Enums
// =============================================

enum TransactionStatus {
  TRANSACTION_STATUS_UNSPECIFIED = 0;
  TRANSACTION_STATUS_PENDING = 1;
  TRANSACTION_STATUS_PROCESSING = 2;
  TRANSACTION_STATUS_SUCCEEDED = 3;
  TRANSACTION_STATUS_FAILED = 4;
  TRANSACTION_STATUS_REFUNDED = 5;
  TRANSACTION_STATUS_PARTIALLY_REFUNDED = 6;
}

enum TransactionType {
  TRANSACTION_TYPE_UNSPECIFIED = 0;
  TRANSACTION_TYPE_CHARGE = 1;
  TRANSACTION_TYPE_REFUND = 2;
  TRANSACTION_TYPE_ESCROW_HOLD = 3;
  TRANSACTION_TYPE_ESCROW_RELEASE = 4;
}

enum PaymentProvider {
  PAYMENT_PROVIDER_UNSPECIFIED = 0;
  PAYMENT_PROVIDER_IOKA = 1;
  PAYMENT_PROVIDER_KASPI = 2;
  PAYMENT_PROVIDER_FREEDOMPAY = 3;
}

enum PaymentMethod {
  PAYMENT_METHOD_UNSPECIFIED = 0;
  PAYMENT_METHOD_CARD = 1;
  PAYMENT_METHOD_APPLE_PAY = 2;
  PAYMENT_METHOD_GOOGLE_PAY = 3;
  PAYMENT_METHOD_KASPI = 4;
}

// PayEntityType is the canonical entity-type counterpart of the free-form
// `entity_type` string used by InitPayment / StartPayment. Legacy pay_type_id
// values 1-18 are mapped here so the BFF can validate without string compares.
enum PayEntityType {
  PAY_ENTITY_TYPE_UNSPECIFIED = 0;
  PAY_ENTITY_TYPE_ADS = 1;               // legacy PayTypeAds=1
  PAY_ENTITY_TYPE_BASKET = 2;            // legacy PayTypeBasket=2
  PAY_ENTITY_TYPE_HELP_REQUEST = 3;      // legacy PayTypeHelpRequest=3
  PAY_ENTITY_TYPE_TURNKEY = 4;           // legacy PayTypeTurnkey=4
  PAY_ENTITY_TYPE_PAYMENT_REQUEST = 5;   // legacy PayTypePaymentRequest=5
  PAY_ENTITY_TYPE_BANNER = 6;            // legacy PayTypeBanner=6
  PAY_ENTITY_TYPE_AD_PAY_CALL = 7;       // legacy PayTypeAdPayCallRequests=7
  PAY_ENTITY_TYPE_ORDER_WORK = 11;       // legacy PayTypeOrderWork=11 (repair order)
  PAY_ENTITY_TYPE_CHAT_RESPONSE = 12;    // legacy PayTypeChatResponse=12
  PAY_ENTITY_TYPE_MAINTENANCE = 15;      // legacy PayTypeMaintenance=15
  PAY_ENTITY_TYPE_CAR_WASH_AUTO = 16;    // legacy PayTypeCarWashAutoBook=16
  PAY_ENTITY_TYPE_CAR_WASH_BOOKING = 17; // legacy PayTypeCarWash=17
  PAY_ENTITY_TYPE_SUBSCRIPTION = 20;     // new_cg: subscription
  PAY_ENTITY_TYPE_BID_PURCHASE = 21;     // new_cg: bid_purchase
  PAY_ENTITY_TYPE_ORDER = 22;            // new_cg: marketplace order
  PAY_ENTITY_TYPE_BOOKING = 23;          // new_cg: car-wash booking
  PAY_ENTITY_TYPE_CART_CHECKOUT = 24;    // new_cg: cart_checkout
  PAY_ENTITY_TYPE_REPAIR_ORDER = 25;     // new_cg: cg-workshop repair_order
}

// PayOptionKind is the installment / BNPL flavour of a payment option.
enum PayOptionKind {
  PAY_OPTION_KIND_UNSPECIFIED = 0;
  PAY_OPTION_KIND_CARD = 1;        // ioka card / Apple Pay / Google Pay
  PAY_OPTION_KIND_KASPI = 2;       // Kaspi QR / Kaspi Pay direct
  PAY_OPTION_KIND_INSTALLMENT = 3; // BNPL / kaspi_pay installment
  PAY_OPTION_KIND_WALLET = 4;      // pay from bonus wallet balance
}

// =============================================
// Core messages
// =============================================

message Transaction {
  int64 id = 1;
  string external_id = 2;
  string entity_type = 3;
  int64 entity_id = 4;
  string organization_id = 5;
  int64 user_id = 6;
  int64 amount = 7;
  string currency = 8;
  int64 commission_amount = 9;
  PaymentProvider provider = 10;
  PaymentMethod payment_method = 11;
  TransactionStatus status = 12;
  TransactionType type = 13;
  string idempotency_key = 14;
  google.protobuf.Timestamp paid_at = 15;
  string failure_reason = 16;
  google.protobuf.Timestamp created_at = 17;
  google.protobuf.Timestamp updated_at = 18;
}

message Refund {
  int64 id = 1;
  int64 transaction_id = 2;
  string external_id = 3;
  int64 amount = 4;
  string reason = 5;
  string status = 6;
  string initiated_by = 7;
  int64 initiator_id = 8;
  google.protobuf.Timestamp created_at = 9;
}

message AuditLogEntry {
  int64 id = 1;
  string entity_type = 2;
  int64 entity_id = 3;
  string action = 4;
  string old_status = 5;
  string new_status = 6;
  string actor_type = 7;
  string actor_id = 8;
  google.protobuf.Timestamp created_at = 9;
}

// =============================================
// CreateTransaction — owner-service authoritative payment intent
// =============================================

message CreateTransactionRequest {
  // cg-payments binds each entity_type to one signed service identity. The
  // current owner-service path is cg-orders -> cart_checkout.
  string entity_type = 1;
  int64 entity_id = 2;
  string organization_id = 3;
  int64 user_id = 4;            // authoritative payer selected by the owner service
  int64 amount = 5;             // authoritative amount in minor units (tiyn for KZT)
  string currency = 6;
  PaymentProvider provider = 7;
  PaymentMethod payment_method = 8;
  string idempotency_key = 9;
  int64 commission_amount = 10;
  string return_url = 11;       // optional HTTPS redirect URL after payment (must be HTTPS, no private IPs)
}

message CreateTransactionResponse {
  Transaction transaction = 1;
  string payment_url = 2;
}

// =============================================
// ListTransactions / GetTransaction
// =============================================

message ListTransactionsRequest {
  string organization_id = 1;
  int64 user_id = 2;
  string entity_type = 3;
  TransactionStatus status = 4;
  int32 page = 5;
  int32 page_size = 6;
}

message ListTransactionsResponse {
  repeated Transaction transactions = 1;
  int32 total = 2;
}

message GetTransactionRequest {
  int64 transaction_id = 1;
}

message GetTransactionResponse {
  Transaction transaction = 1;
}

// =============================================
// Refund
// =============================================

message InitiateRefundRequest {
  int64 transaction_id = 1;
  int64 amount = 2;
  string reason = 3;
  int64 initiator_id = 4;
}

message InitiateRefundResponse {
  Refund refund = 1;
}

// =============================================
// Webhooks
// =============================================

message HandleIokaWebhookRequest {
  bytes raw_body = 1;
  map<string, string> headers = 2;
}

message HandleIokaWebhookResponse {
  bool success = 1;
}

message HandleKaspiCheckPayRequest {
  string command = 1;
  string txn_id = 2;
  string account = 3;
  string sum = 4;
  string txn_date = 5;
}

message HandleKaspiCheckPayResponse {
  string xml_response = 1;
}

// =============================================
// Audit log
// =============================================

message GetPaymentAuditLogRequest {
  string entity_type = 1;
  int64 entity_id = 2;
  int32 page = 3;
  int32 page_size = 4;
}

message GetPaymentAuditLogResponse {
  repeated AuditLogEntry entries = 1;
  int32 total = 2;
}

// =============================================
// B2B Mark-Paid (admin-driven offline payments)
// =============================================

message MarkPaidB2BRequest {
  // entity_type + entity_id identify the payable resource (e.g.
  // "marketplace_order"+order_id). Mirrors CreateTransactionRequest so
  // downstream consumers see the same envelope as B2C events.
  string entity_type = 1;
  int64 entity_id = 2;
  string organization_id = 3;
  // user_id of the buyer (the legal entity's contact), 0 if not bound.
  int64 user_id = 4;
  int64 amount = 5;          // tiyn
  string currency = 6;       // default KZT
  string idempotency_key = 7; // typically "{checkout_id}" or "b2b:{order_id}"
  // payment_method = "invoice" | "cash"
  string payment_method = 8;
  string invoice_number = 9;  // optional, required when payment_method=invoice
  string notes = 10;          // free-form audit note
}

message MarkPaidB2BResponse {
  Transaction transaction = 1;
  // idempotent=true when the request matched an existing succeeded
  // transaction (replay). The caller can use this to suppress duplicate
  // side effects on its own side.
  bool idempotent = 2;
}

// =============================================
// Combined-pay (cg_web migration)
// =============================================

// PayOption is a single selectable payment method shown in CombinedPayModal.
message PayOption {
  string id = 1;             // provider key: "ioka", "kaspi", "kaspi_pay", "wallet"
  string title = 2;          // display name shown in UI
  string sub_title = 3;      // e.g. "моментальная оплата"
  string cashback_title = 4; // e.g. "5% бонусов"
  string icon_url = 5;       // absolute URL to bank/provider logo
  PayOptionKind kind = 6;
  // Opaque token the client passes back in StartPaymentRequest.pay_session_token
  // to identify this option. Encodes entity_type + entity_id + provider +
  // idempotency_key without leaking internal IDs in plain text.
  string pay_session_token = 7;
}

message InitPaymentRequest {
  PayEntityType entity_type = 1;
  int64 entity_id = 2; // Required positive ID resolved by the entity owner.
  // Deprecated request financial facts. cg-payments ignores these fields and
  // resolves amount, currency and organization from the owning service before
  // minting a pay-session token.
  int64 amount = 3 [deprecated = true];
  string currency = 4 [deprecated = true];
  // Deprecated identity copy. The verified JWT is authoritative.
  int64 user_id = 5 [deprecated = true];
  // Deprecated legacy CombinedPayModel context; cg-payments ignores it.
  string city = 6 [deprecated = true];
  string phone = 7 [deprecated = true];
  string note = 8 [deprecated = true];
  int64 delivery_amount = 9 [deprecated = true];
}

message InitPaymentResponse {
  // available_options are the standard (non-installment) methods (FE available_banks[]).
  repeated PayOption available_options = 1;
  // installment_options are BNPL / kaspi_pay entries (FE loan_from_bank[]).
  repeated PayOption installment_options = 2;
  // wallet_eligible is true when the user has a positive wallet balance (FE from_account).
  bool wallet_eligible = 3;
  // wallet_balance_tiyn is the current deductible wallet balance; 0 when ineligible.
  int64 wallet_balance_tiyn = 4;
  // total_amount_tiyn is the authoritative amount resolved by the entity owner.
  int64 total_amount_tiyn = 5;
}

message StartPaymentRequest {
  // pay_session_token was returned in InitPaymentResponse.PayOption.pay_session_token.
  string pay_session_token = 1;
  // use_wallet_balance: true when the user toggled "Потратить бонусы".
  bool use_wallet_balance = 2;
  // wallet_apply_amount is the tiyn amount to deduct; capped at min(balance, total).
  int64 wallet_apply_amount = 3;
  // return_url is the deep-link / HTTPS URL the provider redirects to after payment.
  string return_url = 4;
}

message StartPaymentResponse {
  // payment_url is the provider checkout URL; empty when fully settled from wallet.
  string payment_url = 1;
  // installment_url is set instead of payment_url for BNPL options.
  string installment_url = 2;
  // transaction_id is the newly created or idempotently returned transaction.
  int64 transaction_id = 3;
  // wallet_debited_tiyn is the amount actually deducted from the wallet.
  int64 wallet_debited_tiyn = 4;
  // fully_paid_from_wallet=true means the wallet covered the full amount.
  bool fully_paid_from_wallet = 5;
}
