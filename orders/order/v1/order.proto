syntax = "proto3";

package orders.order.v1;

option go_package = "github.com/4ubak/cg-proto/gen/go/orders/order;orderv1";

import "google/protobuf/timestamp.proto";

// OrderService handles plans, subscriptions, bid purchases, and marketplace orders.
// Payment initiation is delegated to PaymentService via BFF orchestration.
service OrderService {
  // === Plans (admin) ===
  rpc ListPlans(ListPlansRequest) returns (ListPlansResponse);
  rpc CreatePlan(CreatePlanRequest) returns (CreatePlanResponse);
  rpc UpdatePlan(UpdatePlanRequest) returns (UpdatePlanResponse);
  rpc SetPlanPrices(SetPlanPricesRequest) returns (SetPlanPricesResponse);

  // === Subscriptions ===
  rpc CreateSubscription(CreateSubscriptionRequest) returns (CreateSubscriptionResponse);
  rpc GetSubscription(GetSubscriptionRequest) returns (GetSubscriptionResponse);
  rpc GetSubscriptionsByOrg(GetSubscriptionsByOrgRequest) returns (GetSubscriptionsByOrgResponse);
  rpc CancelSubscription(CancelSubscriptionRequest) returns (CancelSubscriptionResponse);
  rpc CheckBidAccess(CheckBidAccessRequest) returns (CheckBidAccessResponse);
  rpc CalculateSubscriptionPrice(CalculateSubscriptionPriceRequest) returns (CalculateSubscriptionPriceResponse);
  rpc GetSubscriptionStatus(GetSubscriptionStatusRequest) returns (GetSubscriptionStatusResponse);

  // === Bid purchases ===
  rpc PurchaseBid(PurchaseBidRequest) returns (PurchaseBidResponse);
  rpc GetBidPurchasePrice(GetBidPurchasePriceRequest) returns (GetBidPurchasePriceResponse);

  // === Orders (parts marketplace) ===
  rpc CreateOrder(CreateOrderRequest) returns (CreateOrderResponse);
  rpc GetOrder(GetOrderRequest) returns (GetOrderResponse);
  rpc ListOrders(ListOrdersRequest) returns (ListOrdersResponse);
  rpc ConfirmShipment(ConfirmShipmentRequest) returns (ConfirmShipmentResponse);
  rpc ConfirmReceipt(ConfirmReceiptRequest) returns (ConfirmReceiptResponse);
  rpc CancelOrder(CancelOrderRequest) returns (CancelOrderResponse);
  rpc GetOrdersByCheckoutId(GetOrdersByCheckoutIdRequest) returns (GetOrdersByCheckoutIdResponse);

  // === Workshop orders (parts in repair orders) ===
  rpc CreateWorkshopOrder(CreateWorkshopOrderRequest) returns (CreateWorkshopOrderResponse);
  rpc GetOrderByRepairOrderId(GetOrderByRepairOrderIdRequest) returns (GetOrderByRepairOrderIdResponse);
  rpc GetOrderByRepairOrderAndSeller(GetOrderByRepairOrderAndSellerRequest) returns (GetOrderByRepairOrderAndSellerResponse);
  rpc ListOrdersByRepairOrderId(ListOrdersByRepairOrderIdRequest) returns (ListOrdersByRepairOrderIdResponse);
  rpc AddOrderItem(AddOrderItemRequest) returns (AddOrderItemResponse);
  rpc UpdateOrderItem(UpdateOrderItemRequest) returns (UpdateOrderItemResponse);
  rpc DeleteOrderItem(DeleteOrderItemRequest) returns (DeleteOrderItemResponse);
  rpc UpdateDeliveryStatus(UpdateDeliveryStatusRequest) returns (UpdateDeliveryStatusResponse);
  rpc SetOrderStatus(SetOrderStatusRequest) returns (SetOrderStatusResponse);

  // === Admin analytics ===
  rpc GetSubscriptionStats(GetSubscriptionStatsRequest) returns (GetSubscriptionStatsResponse);
}

// =============================================
// Enums
// =============================================

enum PlanType {
  PLAN_TYPE_UNSPECIFIED = 0;
  PLAN_TYPE_SUBSCRIPTION = 1;
  PLAN_TYPE_BID_PACKAGE = 2;
}

enum SubscriptionStatus {
  SUBSCRIPTION_STATUS_UNSPECIFIED = 0;
  SUBSCRIPTION_STATUS_PENDING = 1;
  SUBSCRIPTION_STATUS_ACTIVE = 2;
  SUBSCRIPTION_STATUS_PAST_DUE = 3;
  SUBSCRIPTION_STATUS_GRACE_PERIOD = 4;
  SUBSCRIPTION_STATUS_CANCELLED = 5;
  SUBSCRIPTION_STATUS_EXPIRED = 6;
}

enum OrderStatus {
  ORDER_STATUS_UNSPECIFIED = 0;
  ORDER_STATUS_PENDING = 1;
  ORDER_STATUS_PAID = 2;
  ORDER_STATUS_CONFIRMED = 3;
  ORDER_STATUS_SHIPPING = 4;
  ORDER_STATUS_SHIPPED = 5;
  ORDER_STATUS_DELIVERED = 6;
  ORDER_STATUS_COMPLETED = 7;
  ORDER_STATUS_CANCELLED = 8;
  ORDER_STATUS_DISPUTED = 9;
  ORDER_STATUS_REFUNDED = 10;
}

enum EscrowStatus {
  ESCROW_STATUS_UNSPECIFIED = 0;
  ESCROW_STATUS_NONE = 1;
  ESCROW_STATUS_HELD = 2;
  ESCROW_STATUS_RELEASED = 3;
  ESCROW_STATUS_RETURNED = 4;
}

enum DeliveryType {
  DELIVERY_TYPE_UNSPECIFIED = 0;
  DELIVERY_TYPE_PICKUP = 1;
  DELIVERY_TYPE_DELIVERY = 2;
}

enum OrderType {
  ORDER_TYPE_UNSPECIFIED = 0;
  ORDER_TYPE_MARKETPLACE = 1;
  ORDER_TYPE_WORKSHOP = 2;
}

enum ItemSource {
  ITEM_SOURCE_UNSPECIFIED = 0;
  ITEM_SOURCE_WORKSHOP = 1;  // Part sourced by workshop (has price)
  ITEM_SOURCE_CLIENT = 2;    // Part brought by client (price=0, no warranty)
}

enum ItemCondition {
  ITEM_CONDITION_UNSPECIFIED = 0;
  ITEM_CONDITION_NEW = 1;
  ITEM_CONDITION_USED = 2;
  ITEM_CONDITION_REFURBISHED = 3;
}

enum DeliveryStatus {
  DELIVERY_STATUS_UNSPECIFIED = 0;
  DELIVERY_STATUS_ORDERED = 1;
  DELIVERY_STATUS_SHIPPED = 2;
  DELIVERY_STATUS_DELIVERED = 3;
  DELIVERY_STATUS_INSTALLED = 4;
  DELIVERY_STATUS_CANCELLED = 5;
}

// =============================================
// Core messages
// =============================================

message Plan {
  int64 id = 1;
  string code = 2;
  string name = 3;
  string description = 4;
  string org_type = 5;
  PlanType plan_type = 6;
  map<string, string> features = 7;
  bool is_active = 8;
  int32 sort_order = 9;
  repeated PlanPrice prices = 10;
  google.protobuf.Timestamp created_at = 11;
  google.protobuf.Timestamp updated_at = 12;
  int64 group_id = 13;
  int64 city_id = 14;
}

message PlanPrice {
  int64 id = 1;
  int64 plan_id = 2;
  int32 period_months = 3;
  int64 price_amount = 4;
  string currency = 5;
  int32 discount_percent = 6;
  bool is_active = 7;
  repeated PlanPriceTier tiers = 8;
}

message PlanPriceTier {
  int64 id = 1;
  string attribute_key = 2;
  int32 min_value = 3;
  int32 max_value = 4;
  int64 price_amount = 5;
  string currency = 6;
  bool is_per_unit = 7;
  int32 rental_discount_percent = 8;
}

message Subscription {
  int64 id = 1;
  string organization_id = 2;
  int64 plan_id = 3;
  int64 plan_price_id = 4;
  SubscriptionStatus status = 5;
  google.protobuf.Timestamp current_period_start = 6;
  google.protobuf.Timestamp current_period_end = 7;
  google.protobuf.Timestamp cancelled_at = 8;
  string cancel_reason = 9;
  bool auto_renew = 10;
  map<string, string> tier_attributes = 11;
  google.protobuf.Timestamp created_at = 12;
  google.protobuf.Timestamp updated_at = 13;
  Plan plan = 14;
  int64 price_amount = 15;
  string currency = 16;
}

message Order {
  int64 id = 1;
  string order_number = 2;
  int64 buyer_user_id = 3;
  string seller_org_id = 4;
  OrderStatus status = 5;
  int64 subtotal = 6;
  int64 commission_amount = 7;
  int64 delivery_amount = 8;
  int64 total_amount = 9;
  string currency = 10;
  DeliveryType delivery_type = 11;
  string delivery_address = 12;
  int64 delivery_city_id = 13;
  EscrowStatus escrow_status = 14;
  repeated OrderItem items = 15;
  string notes = 16;
  google.protobuf.Timestamp created_at = 17;
  google.protobuf.Timestamp updated_at = 18;
  OrderType order_type = 19;          // MARKETPLACE or WORKSHOP
  int64 repair_order_id = 20;         // For WORKSHOP orders: linked repair order in cg-workshop
}

message OrderItem {
  int64 id = 1;
  int64 order_id = 2;
  string part_name = 3;
  string part_number = 4;
  int32 quantity = 5;
  int64 unit_price = 6;
  int64 total_price = 7;
  string condition = 8;
  string currency = 9;
  ItemSource source = 10;             // WORKSHOP or CLIENT
  DeliveryStatus delivery_status = 11; // Delivery tracking for workshop items
  ItemCondition item_condition = 12;   // NEW, USED, REFURBISHED (replaces string condition for workshop)
  google.protobuf.Timestamp deleted_at = 13; // Soft delete timestamp (null = active)
  optional int64 bid_id = 14;         // Bid ID this item was created from (nil if manually added)
  optional int64 bid_part_id = 15;   // Bid part ID for per-part idempotency
}

message BidPurchase {
  int64 id = 1;
  string organization_id = 2;
  int64 bid_id = 3;
  string request_id = 4;
  int64 price_amount = 5;
  string currency = 6;
  string status = 7;
  google.protobuf.Timestamp created_at = 8;
}

// =============================================
// Plan RPCs
// =============================================

message ListPlansRequest {
  string org_type = 1;
  bool active_only = 2;
  int64 group_id = 3;
  int64 city_id = 4;
}

message ListPlansResponse {
  repeated Plan plans = 1;
}

message CreatePlanRequest {
  string code = 1;
  string name = 2;
  string description = 3;
  string org_type = 4;
  PlanType plan_type = 5;
  map<string, string> features = 6;
  int32 sort_order = 7;
  int64 group_id = 8;
  int64 city_id = 9;
}

message CreatePlanResponse {
  Plan plan = 1;
}

message UpdatePlanRequest {
  int64 plan_id = 1;
  optional string name = 2;
  optional string description = 3;
  map<string, string> features = 4;
  optional bool is_active = 5;
  optional int32 sort_order = 6;
}

message UpdatePlanResponse {
  Plan plan = 1;
}

message SetPlanPricesRequest {
  int64 plan_id = 1;
  repeated PlanPriceInput prices = 2;
}

message PlanPriceInput {
  int32 period_months = 1;
  int64 price_amount = 2;
  string currency = 3;
  int32 discount_percent = 4;
  repeated PlanPriceTierInput tiers = 5;
}

message PlanPriceTierInput {
  string attribute_key = 1;
  int32 min_value = 2;
  int32 max_value = 3;
  int64 price_amount = 4;
  string currency = 5;
  bool is_per_unit = 6;
  int32 rental_discount_percent = 7;
}

message SetPlanPricesResponse {
  Plan plan = 1;
}

// =============================================
// Subscription RPCs
// =============================================

message CreateSubscriptionRequest {
  string organization_id = 1;
  int64 plan_id = 2;
  int32 period_months = 3;
  map<string, string> tier_attributes = 4;
  string idempotency_key = 5;
  int64 group_id = 6;
  int64 city_id = 7;
  int32 posts_count = 8;
  bool is_rented = 9;
}

message CreateSubscriptionResponse {
  Subscription subscription = 1;
}

message GetSubscriptionRequest {
  int64 subscription_id = 1;
}

message GetSubscriptionResponse {
  Subscription subscription = 1;
}

message GetSubscriptionsByOrgRequest {
  string organization_id = 1;
  bool active_only = 2;
}

message GetSubscriptionsByOrgResponse {
  repeated Subscription subscriptions = 1;
}

message CancelSubscriptionRequest {
  int64 subscription_id = 1;
  string organization_id = 2;
  string reason = 3;
}

message CancelSubscriptionResponse {
  Subscription subscription = 1;
}

message CheckBidAccessRequest {
  string organization_id = 1;
  string org_type = 2;
  int64 city_id = 3;
}

message CheckBidAccessResponse {
  bool has_access = 1;
  string access_type = 2;  // "subscription" or "bid_purchase"
}

message CalculateSubscriptionPriceRequest {
  int64 group_id = 1;
  int64 city_id = 2;
  int32 posts_count = 3;
  bool is_rented = 4;
  int32 period_months = 5;
}

message CalculateSubscriptionPriceResponse {
  int64 base_price = 1;
  int64 rental_discount = 2;
  int64 period_discount = 3;
  int64 final_price = 4;
  string currency = 5;
  bool is_free = 6;
  string price_breakdown = 7;
}

// =============================================
// Bid purchase RPCs
// =============================================

message PurchaseBidRequest {
  string organization_id = 1;
  string request_id = 2;
  string idempotency_key = 3;
  int64 group_id = 4;
}

message PurchaseBidResponse {
  BidPurchase bid_purchase = 1;
}

message GetBidPurchasePriceRequest {
  string org_type = 1;
  int64 group_id = 2;
}

message GetBidPurchasePriceResponse {
  int64 price_amount = 1;
  string currency = 2;
}

// =============================================
// Order RPCs
// =============================================

message CreateOrderRequest {
  int64 buyer_user_id = 1;
  string seller_org_id = 2;
  repeated OrderItemInput items = 3;
  DeliveryType delivery_type = 4;
  string delivery_address = 5;
  int64 delivery_city_id = 6;
  string notes = 7;
  string idempotency_key = 8;
}

message OrderItemInput {
  string part_name = 1;
  string part_number = 2;
  int32 quantity = 3;
  int64 unit_price = 4;
  string condition = 5;
}

message CreateOrderResponse {
  Order order = 1;
}

message GetOrderRequest {
  int64 order_id = 1;
}

message GetOrderResponse {
  Order order = 1;
}

message ListOrdersRequest {
  int64 buyer_user_id = 1;
  string seller_org_id = 2;
  OrderStatus status = 3;
  int32 page = 4;
  int32 page_size = 5;
  OrderType order_type = 6;
  string cart_checkout_id = 7; // optional: filter orders by cart checkout session
}

message GetOrdersByCheckoutIdRequest {
  string checkout_id = 1;
}

message GetOrdersByCheckoutIdResponse {
  repeated Order orders = 1;
}

message ListOrdersResponse {
  repeated Order orders = 1;
  int32 total = 2;
}

message ConfirmShipmentRequest {
  int64 order_id = 1;
  string seller_org_id = 2;
}

message ConfirmShipmentResponse {
  Order order = 1;
}

message ConfirmReceiptRequest {
  int64 order_id = 1;
  int64 buyer_user_id = 2;
}

message ConfirmReceiptResponse {
  Order order = 1;
}

message CancelOrderRequest {
  int64 order_id = 1;
  int64 user_id = 2;
  string reason = 3;
}

message CancelOrderResponse {
  Order order = 1;
  bool refund_eligible = 2;
}

// =============================================
// Subscription stats
// =============================================

message GetSubscriptionStatsRequest {
  string org_type = 1;
}

message GetSubscriptionStatsResponse {
  int32 total_active = 1;
  int32 total_expired = 2;
  int32 total_cancelled = 3;
  int32 new_this_month = 4;
  int32 churned_this_month = 5;
  double churn_rate = 6;
}

// =============================================
// Workshop order RPCs
// =============================================

message CreateWorkshopOrderRequest {
  int64 repair_order_id = 1;           // Linked repair order ID in cg-workshop
  int64 created_by_user_id = 2;        // User creating the order (MP or MZ)
  repeated WorkshopOrderItemInput items = 3; // Initial items (at least one required)
  string seller_org_id = 4;            // Supplier organization UUID (one order per supplier)
}

message WorkshopOrderItemInput {
  string part_name = 1;
  string part_number = 2;
  int32 quantity = 3;
  int64 unit_price = 4;               // In tenge (minor units); 0 for CLIENT source
  ItemSource source = 5;               // WORKSHOP or CLIENT
  ItemCondition condition = 6;         // NEW, USED, REFURBISHED
  optional int64 bid_id = 7;          // Bid ID for idempotency tracking (nil if manually added)
  optional int64 bid_part_id = 8;    // Bid part ID for per-part idempotency
}

message CreateWorkshopOrderResponse {
  Order order = 1;
}

message GetOrderByRepairOrderIdRequest {
  int64 repair_order_id = 1;
}

message GetOrderByRepairOrderIdResponse {
  Order order = 1;                     // null if no parts order exists for this repair order
}

message GetOrderByRepairOrderAndSellerRequest {
  int64 repair_order_id = 1;
  string seller_org_id = 2;
}

message GetOrderByRepairOrderAndSellerResponse {
  Order order = 1;
}

message ListOrdersByRepairOrderIdRequest {
  int64 repair_order_id = 1;
}

message ListOrdersByRepairOrderIdResponse {
  repeated Order orders = 1;
}

message AddOrderItemRequest {
  int64 order_id = 1;
  WorkshopOrderItemInput item = 2;
}

message AddOrderItemResponse {
  Order order = 1;                     // Full order with updated items list
}

message UpdateOrderItemRequest {
  int64 item_id = 1;
  optional string part_name = 2;
  optional string part_number = 3;
  optional int32 quantity = 4;
  optional int64 unit_price = 5;
  optional ItemSource source = 6;
  optional ItemCondition condition = 7;
}

message UpdateOrderItemResponse {
  Order order = 1;
}

message DeleteOrderItemRequest {
  int64 item_id = 1;                   // Soft-delete: sets deleted_at timestamp
}

message DeleteOrderItemResponse {
  Order order = 1;
}

message UpdateDeliveryStatusRequest {
  int64 item_id = 1;
  DeliveryStatus delivery_status = 2;  // Forward-only: ORDERED->SHIPPED->DELIVERED->INSTALLED or ->CANCELLED
}

message UpdateDeliveryStatusResponse {
  Order order = 1;
}

message SetOrderStatusRequest {
  int64 order_id = 1;
  OrderStatus status = 2;
}

message SetOrderStatusResponse {
  Order order = 1;
}

// =============================================
// Subscription status RPC
// =============================================

message GetSubscriptionStatusRequest {
  string organization_id = 1;
}

message GetSubscriptionStatusResponse {
  bool has_active_subscription = 1;
  Subscription active_subscription = 2;     // null when no active subscription
  int32 bid_purchases_remaining = 3;
  google.protobuf.Timestamp valid_until = 4; // expiry of active subscription, if any
}
