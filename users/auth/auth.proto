syntax = "proto3";

package users.auth.v1;

option go_package = "github.com/4ubak/cg-proto/gen/go/users/auth;authv1";

import "google/protobuf/timestamp.proto";

service AuthService {
  // SendCode sends verification code to phone number
  rpc SendCode(SendCodeRequest) returns (SendCodeResponse);

  // VerifyCode verifies the code and returns tokens
  rpc VerifyCode(VerifyCodeRequest) returns (VerifyCodeResponse);

  // RefreshToken refreshes access token using refresh token
  rpc RefreshToken(RefreshTokenRequest) returns (RefreshTokenResponse);

  // Logout invalidates refresh token
  rpc Logout(LogoutRequest) returns (LogoutResponse);

  // ValidateToken validates access token (internal use)
  rpc ValidateToken(ValidateTokenRequest) returns (ValidateTokenResponse);

  // GetSessions returns active sessions for user
  rpc GetSessions(GetSessionsRequest) returns (GetSessionsResponse);

  // DeleteSessionsByUserID invalidates every session for the given user.
  // Called by cg-users/organization when a member is fired so the fired
  // user can no longer refresh their token. Returns the number of rows
  // removed for observability.
  rpc DeleteSessionsByUserID(DeleteSessionsByUserIDRequest) returns (DeleteSessionsByUserIDResponse);

  // SelectOrg issues a new token pair with org context embedded.
  // Requires: authenticated JWT with app="partner".
  // Returns 403 if the caller is not a member of the requested organization.
  rpc SelectOrg(SelectOrgRequest) returns (SelectOrgResponse);

  // GetSendCodeRateLimit returns the current SendCode (OTP) rate-limit state
  // for a phone — admin support tool to inspect why a user can't get a code.
  rpc GetSendCodeRateLimit(GetSendCodeRateLimitRequest) returns (GetSendCodeRateLimitResponse);

  // ResetSendCodeRateLimit clears the SendCode rate-limit counters for a phone
  // (and its per-IP entry if provided) so the user can request a code again.
  rpc ResetSendCodeRateLimit(ResetSendCodeRateLimitRequest) returns (ResetSendCodeRateLimitResponse);

  // IssueServiceToken mints a short-lived RS256 service JWT for a calling
  // microservice (central-issuer model of the HS256->RS256 migration). Only
  // cg-users holds the signing key; every other service obtains its
  // service-to-service tokens here instead of minting locally.
  //
  // Caller identity is established by mTLS (verified client-cert CN), NOT by any
  // payload field. The requested `subject` is authorized against the
  // authenticated peer, and `act_as_user_id` > 0 (act-as-user) is permitted
  // only for explicitly whitelisted callers (cg-bff external analytics, cg-crm
  // owner-scoped lookups).
  rpc IssueServiceToken(IssueServiceTokenRequest) returns (IssueServiceTokenResponse);

  // IssueTokenPair mints a user access/refresh pair for trusted internal
  // cg-users services that already completed the domain-side state mutation
  // (for example user-service ConfirmPhoneChange after users.phone changes).
  //
  // This is served only on the dedicated mTLS listener and is restricted by
  // client-cert CN in auth-service. It exists so auth-service remains the only
  // holder of JWT signing material during the RS256-only cutover.
  rpc IssueTokenPair(IssueTokenPairRequest) returns (IssueTokenPairResponse);

  // IssueExternalLoginTokenPair mints a login access/refresh pair and creates
  // a refresh session for a user already authenticated by a trusted external
  // identity provider (Boxo Connect SSO via auth-sapp today). Unlike
  // IssueTokenPair it behaves like a normal login (the VerifyCode tail): it
  // does NOT revoke the user's existing sessions, so a super-app login never
  // logs the user out of the mobile/web apps.
  //
  // Served only on the dedicated mTLS listener; restricted by client-cert CN
  // (default allowlist: auth-sapp).
  rpc IssueExternalLoginTokenPair(IssueExternalLoginTokenPairRequest) returns (IssueExternalLoginTokenPairResponse);
}

message GetSendCodeRateLimitRequest {
  string phone = 1;
}

message GetSendCodeRateLimitResponse {
  int64 phone_count = 1;       // requests counted in the current window
  int64 phone_limit = 2;       // max allowed per window (3)
  int64 window_seconds = 3;    // window length (3600)
  bool blocked = 4;            // true if phone_count >= phone_limit
}

message ResetSendCodeRateLimitRequest {
  string phone = 1;
}

message ResetSendCodeRateLimitResponse {
  bool success = 1;
}

message IssueServiceTokenRequest {
  // subject is the literal phone/identity to embed in the minted token
  // (e.g. "cg-orders", "chatbot-service"). It MUST match what the caller used
  // under HS256 so verify-side gates (serviceauth, cg-crm allowlist) keep
  // working byte-for-byte.
  string subject = 1;
  // act_as_user_id: 0 = pure service token (userID=0); > 0 = act-as-user,
  // permitted only for whitelisted callers (cg-bff, cg-crm).
  int64 act_as_user_id = 2;
  // device_id: optional; defaults to subject when empty.
  string device_id = 3;
}

message IssueServiceTokenResponse {
  string access_token = 1;
  google.protobuf.Timestamp expires_at = 2;
}

message IssueTokenPairRequest {
  int64 user_id = 1;
  string phone = 2;
  // device_id is embedded into both access and refresh tokens. For
  // ConfirmPhoneChange callers use "phone-change".
  string device_id = 3;
}

message IssueTokenPairResponse {
  string access_token = 1;
  string refresh_token = 2;
  google.protobuf.Timestamp expires_at = 3;
}

message IssueExternalLoginTokenPairRequest {
  int64 user_id = 1;
  // phone may be empty for reference-only users (host app withheld the
  // number); the claim is then minted with an empty phone.
  string phone = 2;
  // device_id is embedded into both tokens; auth-sapp uses "boxo".
  string device_id = 3;
  // app is the audience claim enforced by the per-BFF auth middleware:
  // "client", "partner", or "sapp". Unknown/empty falls back to "client".
  string app = 4;
}

message IssueExternalLoginTokenPairResponse {
  string access_token = 1;
  string refresh_token = 2;
  google.protobuf.Timestamp expires_at = 3;
}

message SendCodeRequest {
  string phone = 1;
  string device_id = 2;
  // hash_code is the Android SMS Retriever app signature (11 chars). When set,
  // it is appended to the SMS body so Google Play services can auto-read the
  // code without SMS-read permission. Empty on iOS / web.
  string hash_code = 3;
}

message SendCodeResponse {
  bool success = 1;
  int32 retry_after = 2;  // seconds to wait before next request
  string message = 3;
}

message VerifyCodeRequest {
  string phone = 1;
  string code = 2;
  string device_id = 3;
  string invite_code = 4;  // optional: join organization on registration
  // app identifies the calling application: "client" (default) or "partner"
  string app = 5;
}

message VerifyCodeResponse {
  string access_token = 1;
  string refresh_token = 2;
  google.protobuf.Timestamp expires_at = 3;
  User user = 4;
  bool is_new_user = 5;
}

message RefreshTokenRequest {
  string refresh_token = 1;
}

message RefreshTokenResponse {
  string access_token = 1;
  string refresh_token = 2;
  google.protobuf.Timestamp expires_at = 3;
}

message LogoutRequest {
  string refresh_token = 1;
}

message LogoutResponse {
  bool success = 1;
}

message ValidateTokenRequest {
  string access_token = 1;
}

message ValidateTokenResponse {
  bool valid = 1;
  int64 user_id = 2;
  string phone = 3;
  // App context claims (present only if the token carries them)
  string app = 4;
  string org_id = 5;
  string org_type = 6;
  int64 city_id = 7;
  string org_role = 8;
}

// SelectOrgRequest — exchange current partner JWT for one scoped to an org.
message SelectOrgRequest {
  string organization_id = 1;
}

// SelectOrgResponse — new token pair with org_id/org_type/city_id/org_role embedded.
message SelectOrgResponse {
  string access_token = 1;
  string refresh_token = 2;
  google.protobuf.Timestamp expires_at = 3;
}

message GetSessionsRequest {
  int64 user_id = 1;
}

message GetSessionsResponse {
  repeated Session sessions = 1;
}

message DeleteSessionsByUserIDRequest {
  int64 user_id = 1;
}

message DeleteSessionsByUserIDResponse {
  int32 deleted_count = 1;
}

message User {
  int64 id = 1;
  string phone = 2;
  string name = 3;
  string avatar = 4;
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp updated_at = 6;
}

message Session {
  string id = 1;
  string device_id = 2;
  string user_agent = 3;
  string ip = 4;
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp last_used_at = 6;
}
