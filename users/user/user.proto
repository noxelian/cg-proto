syntax = "proto3";

package users.user.v1;

option go_package = "github.com/4ubak/cg-proto/gen/go/users/user;userv1";

import "google/protobuf/timestamp.proto";

service UserService {
  // GetProfile returns user profile by user_id from auth context
  rpc GetProfile(GetProfileRequest) returns (GetProfileResponse);
  
  // UpdateProfile updates user profile
  rpc UpdateProfile(UpdateProfileRequest) returns (UpdateProfileResponse);
  
  // GetUserByID returns user by ID (for internal service calls)
  rpc GetUserByID(GetUserByIDRequest) returns (GetUserByIDResponse);
  
  // GetUserByPhone returns user by phone (for auth service)
  rpc GetUserByPhone(GetUserByPhoneRequest) returns (GetUserByPhoneResponse);
  
  // CreateUser creates new user (for auth service on first login)
  rpc CreateUser(CreateUserRequest) returns (CreateUserResponse);
  
  // GetUsersByIDs returns multiple users by IDs (for batch loading)
  rpc GetUsersByIDs(GetUsersByIDsRequest) returns (GetUsersByIDsResponse);

  // GetUsersByPhones returns multiple users matched by their stored phone
  // (digits-only comparison). Lets cg-crm enrich call/chat lists with
  // cg-users names in a single round trip instead of N GetUserByPhone
  // calls.
  rpc GetUsersByPhones(GetUsersByPhonesRequest) returns (GetUsersByPhonesResponse);

  // FindOrCreateByPhone atomically finds user by phone or creates minimal record (for sync service)
  rpc FindOrCreateByPhone(FindOrCreateByPhoneRequest) returns (FindOrCreateByPhoneResponse);
  
  // GetSettings returns user notification settings
  rpc GetSettings(GetSettingsRequest) returns (GetSettingsResponse);
  
  // UpdateSettings updates user notification settings
  rpc UpdateSettings(UpdateSettingsRequest) returns (UpdateSettingsResponse);
  
  // RegisterDevice registers device for push notifications
  rpc RegisterDevice(RegisterDeviceRequest) returns (RegisterDeviceResponse);
  
  // UnregisterDevice unregisters device
  rpc UnregisterDevice(UnregisterDeviceRequest) returns (UnregisterDeviceResponse);
  
  // GetDevices returns user devices
  rpc GetDevices(GetDevicesRequest) returns (GetDevicesResponse);
  
  // DeleteAccount deletes user account
  rpc DeleteAccount(DeleteAccountRequest) returns (DeleteAccountResponse);

  // ListUsers returns a paginated list of users (admin-only)
  rpc ListUsers(ListUsersRequest) returns (ListUsersResponse);

  // Platform roles (CTOgram employee roles — many-to-many)
  rpc SetPlatformRoles(SetPlatformRolesRequest) returns (SetPlatformRolesResponse);
  rpc GetPlatformRoles(GetPlatformRolesRequest) returns (GetPlatformRolesResponse);
  rpc CheckPlatformRoles(CheckPlatformRolesRequest) returns (CheckPlatformRolesResponse);
  rpc SetPlatformOrgAccess(SetPlatformOrgAccessRequest) returns (SetPlatformOrgAccessResponse);
  rpc GetPlatformOrgAccess(GetPlatformOrgAccessRequest) returns (GetPlatformOrgAccessResponse);

  // ListUsersByPlatformRoles returns users that have any of the given platform roles.
  // If roles is empty, returns all users that have at least one platform role.
  rpc ListUsersByPlatformRoles(ListUsersByPlatformRolesRequest) returns (ListUsersByPlatformRolesResponse);

  // ==== Phone book (multi-phone feature) ====
  // A user owns up to 5 phone numbers, any of which identifies them across
  // auth, telephony, WhatsApp/Wazzup and CRM. All writes are authenticated;
  // Phase 1 accepts writes from the owning user or a platform admin.

  // ListPhones returns every phone on the user's account, primary first.
  rpc ListPhones(ListPhonesRequest) returns (ListPhonesResponse);

  // AddPhone inserts a new phone. Returns ALREADY_EXISTS when the phone is
  // already owned by someone else, and RESOURCE_EXHAUSTED when the caller
  // already has 5 phones. CRM operators add phones with is_verified=false
  // so the number can't be used to log in until the owner passes SMS-OTP.
  rpc AddPhone(AddPhoneRequest) returns (AddPhoneResponse);

  // RemovePhone deletes a phone. Returns FAILED_PRECONDITION if the phone
  // is currently primary — the caller must promote another first.
  rpc RemovePhone(RemovePhoneRequest) returns (RemovePhoneResponse);

  // SetPrimaryPhone atomically demotes the current primary and promotes
  // the target within one transaction.
  rpc SetPrimaryPhone(SetPrimaryPhoneRequest) returns (SetPrimaryPhoneResponse);

  // RelabelPhone updates the label on a phone. Allowed values:
  // mobile | work | home | whatsapp | other.
  rpc RelabelPhone(RelabelPhoneRequest) returns (RelabelPhoneResponse);

  // Platform role catalog — CRUD for dynamic role definitions.
  // Roles are identified by string codes (not the static PlatformRole enum)
  // so admins can introduce new roles without proto changes.
  rpc ListPlatformRoleDefs(ListPlatformRoleDefsRequest) returns (ListPlatformRoleDefsResponse);
  rpc GetPlatformRoleDef(GetPlatformRoleDefRequest) returns (GetPlatformRoleDefResponse);
  rpc CreatePlatformRoleDef(CreatePlatformRoleDefRequest) returns (CreatePlatformRoleDefResponse);
  rpc UpdatePlatformRoleDef(UpdatePlatformRoleDefRequest) returns (UpdatePlatformRoleDefResponse);
  rpc DeletePlatformRoleDef(DeletePlatformRoleDefRequest) returns (DeletePlatformRoleDefResponse);

  // ListModules returns the static list of UI/API modules that can be
  // assigned to roles via allowed_modules.
  rpc ListModules(ListModulesRequest) returns (ListModulesResponse);
}

// AdminUserService provides admin-only RPCs for managing any user's data.
// All methods require a valid JWT with platform role "admin" or "support"
// asserted via the x-platform-role gRPC metadata header (set by BFF).
service AdminUserService {
  // AdminGetProfile returns profile for any user by ID.
  rpc AdminGetProfile(AdminGetProfileRequest) returns (AdminGetProfileResponse);

  // AdminUpdateProfile updates profile for any user by ID.
  rpc AdminUpdateProfile(AdminUpdateProfileRequest) returns (AdminUpdateProfileResponse);

  // AdminListCars returns cars owned by any user.
  rpc AdminListCars(AdminListCarsRequest) returns (AdminListCarsResponse);
}

enum PlatformRole {
  PLATFORM_ROLE_UNSPECIFIED = 0;
  PLATFORM_ROLE_MECHANIC = 1;          // MC — mechanic, scoped to assigned orgs
  PLATFORM_ROLE_RECEPTIONIST = 2;      // MP — receptionist, platform-wide
  PLATFORM_ROLE_PARTS_MANAGER = 3;     // MZ — parts manager, platform-wide
  PLATFORM_ROLE_ADMIN = 4;             // Admin CTOgram — full access
  PLATFORM_ROLE_SALES_MANAGER = 5;     // Sales manager
  PLATFORM_ROLE_RECRUITER = 6;         // Recruiter
  PLATFORM_ROLE_AUTOBODY_MANAGER = 7;  // Autobody manager
  PLATFORM_ROLE_HEAD_OF_SALES = 8;     // Head of sales — pipeline-scoped analytics viewer (read-only on foreign deals)
}

message User {
  int64 id = 1;
  string phone = 2;
  string name = 3;
  string avatar_url = 4;
  string email = 5;
  int64 city_id = 6;
  bool is_verified = 7;
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp updated_at = 9;
  // Social-network identifiers stamped when a contact is created from
  // an external integration (Instagram Direct AI today).
  string instagram_id       = 10;
  string instagram_username = 11;
}

message UserCounters {
  int64 ads_count = 1;
  int64 reviews_count = 2;
  int64 followers_count = 3;
  int64 following_count = 4;
}

// Profile
message GetProfileRequest {}

message GetProfileResponse {
  User user = 1;
  UserCounters counters = 2;
}

message UpdateProfileRequest {
  optional string name = 1;
  optional string avatar_url = 2;
  optional string email = 3;
  optional int64 city_id = 4;
  // When set, update this user instead of the JWT caller (admin use).
  optional int64 user_id = 5;
  // Phone number change (admin-only). Returns ALREADY_EXISTS if phone is taken.
  optional string phone = 6;
}

message UpdateProfileResponse {
  User user = 1;
}

// User by ID (internal)
message GetUserByIDRequest {
  int64 user_id = 1;
}

message GetUserByIDResponse {
  User user = 1;
}

message GetUsersByIDsRequest {
  repeated int64 user_ids = 1;
}

message GetUsersByIDsResponse {
  repeated User users = 1;
}

message GetUsersByPhonesRequest {
  // Phones in any formatting; the server normalises to digits before
  // comparing. Duplicates are deduped server-side.
  repeated string phones = 1;
}

message GetUsersByPhonesResponse {
  // One entry per phone that matched a stored user. Phones with no
  // match are omitted — callers detect "no contact for this phone" by
  // its absence in the list.
  repeated User users = 1;
}

// User by Phone (for auth service)
message GetUserByPhoneRequest {
  string phone = 1;
}

message GetUserByPhoneResponse {
  User user = 1;
}

// Create User (for auth service on first login)
message CreateUserRequest {
  string phone = 1;
}

message CreateUserResponse {
  User user = 1;
}

// FindOrCreateByPhone (for sync service)
message FindOrCreateByPhoneRequest {
  string phone = 1;
  // Optional name to set on a freshly-created user (existing rows are
  // not overwritten — manager-edited names should win).
  string name = 2;
  // Optional Instagram identifiers — when present they are written to
  // the user row (both new and existing) so the contact card can show
  // the IG handle and the AI can find the user back by IG id.
  string instagram_id       = 3;
  string instagram_username = 4;
}

message FindOrCreateByPhoneResponse {
  User user = 1;
  bool created = 2;
}

// Settings
message UserSettings {
  bool push_enabled = 1;
  bool sms_enabled = 2;
  bool email_enabled = 3;
  bool chat_notifications = 4;
  bool order_notifications = 5;
  bool promo_notifications = 6;
}

message GetSettingsRequest {}

message GetSettingsResponse {
  UserSettings settings = 1;
}

message UpdateSettingsRequest {
  optional bool push_enabled = 1;
  optional bool sms_enabled = 2;
  optional bool email_enabled = 3;
  optional bool chat_notifications = 4;
  optional bool order_notifications = 5;
  optional bool promo_notifications = 6;
}

message UpdateSettingsResponse {
  UserSettings settings = 1;
}

// Devices
message Device {
  string id = 1;
  string device_id = 2;
  string platform = 3;  // ios, android
  string fcm_token = 4;
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp last_used_at = 6;
}

message RegisterDeviceRequest {
  string device_id = 1;
  string fcm_token = 2;
  string platform = 3;
}

message RegisterDeviceResponse {
  bool success = 1;
}

message UnregisterDeviceRequest {
  string device_id = 1;
}

message UnregisterDeviceResponse {
  bool success = 1;
}

message GetDevicesRequest {}

message GetDevicesResponse {
  repeated Device devices = 1;
}

// Account
message DeleteAccountRequest {
  string reason = 1;
}

message DeleteAccountResponse {
  bool success = 1;
}

// =============================================
// Platform Roles (CTOgram employee roles — many-to-many)
// =============================================

message SetPlatformRolesRequest {
  int64 user_id = 1;
  repeated PlatformRole roles = 2;       // DEPRECATED: use role_codes. Kept for wire compat.
  repeated string role_codes = 3;        // preferred: string codes (supports dynamic catalog roles)
}

message SetPlatformRolesResponse {}

message GetPlatformRolesRequest {
  int64 user_id = 1;
}

message GetPlatformRolesResponse {
  repeated PlatformRole roles = 1;       // DEPRECATED: use role_codes.
  repeated string role_codes = 2;        // preferred
}

message CheckPlatformRolesRequest {
  int64 user_id = 1;
}

message CheckPlatformRolesResponse {
  repeated PlatformRole roles = 1;       // DEPRECATED: use role_codes.
  repeated string accessible_org_ids = 2;
  repeated string role_codes = 3;        // preferred
}

message SetPlatformOrgAccessRequest {
  int64 user_id = 1;
  repeated string org_ids = 2;  // replaces entire list
}

message SetPlatformOrgAccessResponse {}

message GetPlatformOrgAccessRequest {
  int64 user_id = 1;
}

message GetPlatformOrgAccessResponse {
  repeated string org_ids = 1;
}

// ListUsers (admin)
message ListUsersRequest {
  int32 page = 1;
  int32 page_size = 2;
  string search = 3;  // Search by phone or name
}

message ListUsersResponse {
  repeated User users = 1;
  int32 total = 2;
}

// ListUsersByPlatformRoles
message PlatformMember {
  int64 user_id = 1;
  string name = 2;
  string phone = 3;
  repeated PlatformRole roles = 4;       // DEPRECATED: use role_codes.
  repeated string role_codes = 5;        // preferred
}

message ListUsersByPlatformRolesRequest {
  repeated PlatformRole roles = 1;       // DEPRECATED: use role_codes.
  repeated string role_codes = 2;        // preferred: filter by these string codes; empty = all users with any role
}

message ListUsersByPlatformRolesResponse {
  repeated PlatformMember members = 1;
}

// ==== Phone book (Phase 1 messages) ====

// UserPhone is one entry in the user's phone book. The service layer
// exposes the canonical +7XXXXXXXXXX shape in `phone`; callers pass
// mixed-format input on writes and receive normalised output on reads.
message UserPhone {
  int64  id          = 1;
  int64  user_id     = 2;
  string phone       = 3;   // +7XXXXXXXXXX
  string label       = 4;   // mobile|work|home|whatsapp|other
  bool   is_primary  = 5;
  bool   is_verified = 6;
  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp updated_at = 8;
}

message ListPhonesRequest {
  // Target user. If zero, the JWT caller's own user_id is used. A
  // non-zero value is admin-only (callers without the relevant platform
  // role receive PERMISSION_DENIED).
  int64 user_id = 1;
}

message ListPhonesResponse {
  repeated UserPhone phones = 1;
}

message AddPhoneRequest {
  // Target user (see ListPhonesRequest.user_id semantics).
  int64  user_id     = 1;
  // Phone in any format; the server normalises to +7XXXXXXXXXX before
  // validation and storage.
  string phone       = 2;
  string label       = 3; // default "mobile" when empty
  // Make the new phone the user's primary. The current primary (if any)
  // is demoted in the same transaction.
  bool   is_primary  = 4;
  // Platform admins can pre-verify on behalf of the user; self-service
  // callers ignore this field and must pass SMS-OTP before the phone
  // becomes verified.
  bool   is_verified = 5;
}

message AddPhoneResponse {
  UserPhone phone = 1;
}

message RemovePhoneRequest {
  int64 user_id  = 1;
  int64 phone_id = 2;
}

message RemovePhoneResponse {}

message SetPrimaryPhoneRequest {
  int64 user_id  = 1;
  int64 phone_id = 2;
}

message SetPrimaryPhoneResponse {
  UserPhone phone = 1;
}

message RelabelPhoneRequest {
  int64  user_id  = 1;
  int64  phone_id = 2;
  string label    = 3;
}

message RelabelPhoneResponse {
  UserPhone phone = 1;
}

// --- Platform role catalog ---

message PlatformRoleDef {
  string code = 1;
  string label = 2;
  string description = 3;
  repeated string allowed_modules = 4;
  bool is_org_scoped = 5;
  bool is_system = 6;
  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp updated_at = 8;
}

message ListPlatformRoleDefsRequest {}

message ListPlatformRoleDefsResponse {
  repeated PlatformRoleDef roles = 1;
}

message GetPlatformRoleDefRequest {
  string code = 1;
}

message GetPlatformRoleDefResponse {
  PlatformRoleDef role = 1;
}

message CreatePlatformRoleDefRequest {
  string code = 1;
  string label = 2;
  string description = 3;
  repeated string allowed_modules = 4;
  bool is_org_scoped = 5;
}

message CreatePlatformRoleDefResponse {
  PlatformRoleDef role = 1;
}

message UpdatePlatformRoleDefRequest {
  string code = 1;
  // Optional fields — omit to leave unchanged. For system roles,
  // allowed_modules and is_org_scoped are locked.
  optional string label = 2;
  optional string description = 3;
  repeated string allowed_modules = 4;
  bool allowed_modules_set = 5;  // true when allowed_modules intent is explicit (even if empty)
  optional bool is_org_scoped = 6;
}

message UpdatePlatformRoleDefResponse {
  PlatformRoleDef role = 1;
}

message DeletePlatformRoleDefRequest {
  string code = 1;
}

message DeletePlatformRoleDefResponse {}

// Module describes an assignable UI/API section.
message Module {
  string id = 1;
  string label = 2;
}

message ListModulesRequest {}

message ListModulesResponse {
  repeated Module modules = 1;
  string wildcard = 2; // "*" — grants access to every module
}

// ==== Admin RPCs (AdminUserService) ====

message AdminGetProfileRequest {
  int64 user_id = 1;
}

message AdminGetProfileResponse {
  User user = 1;
  UserCounters counters = 2;
}

message AdminUpdateProfileRequest {
  int64 user_id = 1;
  optional string name = 2;
  optional string avatar_url = 3;
  optional string email = 4;
  optional int64 city_id = 5;
  // Phone change; returns ALREADY_EXISTS if phone is taken.
  optional string phone = 6;
}

message AdminUpdateProfileResponse {
  User user = 1;
}

message AdminListCarsRequest {
  int64 user_id = 1;
  int32 limit = 2;
  int32 offset = 3;
}

message AdminListCarsResponse {
  repeated AdminCar cars = 1;
  int32 total = 2;
}

// AdminCar is a minimal car view for admin purposes.
message AdminCar {
  int64 id = 1;
  int64 user_id = 2;
  int32 mark_id = 3;
  int32 model_id = 4;
  int32 year = 5;
  string vin = 6;
  string license_plate = 7;
  string color = 8;
  bool is_primary = 9;
  google.protobuf.Timestamp created_at = 10;
}
