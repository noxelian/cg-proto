syntax = "proto3";

package users.user.v1;

option go_package = "github.com/4ubak/cg-proto/gen/go/users/user;userv1";

import "google/protobuf/timestamp.proto";

service UserService {
  // GetProfile returns user profile by user_id from auth context
  rpc GetProfile(GetProfileRequest) returns (GetProfileResponse);
  
  // UpdateProfile updates user profile
  rpc UpdateProfile(UpdateProfileRequest) returns (UpdateProfileResponse);
  
  // GetUserByID returns user by ID (for internal service calls)
  rpc GetUserByID(GetUserByIDRequest) returns (GetUserByIDResponse);
  
  // GetUserByPhone returns user by phone (for auth service)
  rpc GetUserByPhone(GetUserByPhoneRequest) returns (GetUserByPhoneResponse);
  
  // CreateUser creates new user (for auth service on first login)
  rpc CreateUser(CreateUserRequest) returns (CreateUserResponse);
  
  // GetUsersByIDs returns multiple users by IDs (for batch loading)
  rpc GetUsersByIDs(GetUsersByIDsRequest) returns (GetUsersByIDsResponse);

  // FindOrCreateByPhone atomically finds user by phone or creates minimal record (for sync service)
  rpc FindOrCreateByPhone(FindOrCreateByPhoneRequest) returns (FindOrCreateByPhoneResponse);
  
  // GetSettings returns user notification settings
  rpc GetSettings(GetSettingsRequest) returns (GetSettingsResponse);
  
  // UpdateSettings updates user notification settings
  rpc UpdateSettings(UpdateSettingsRequest) returns (UpdateSettingsResponse);
  
  // RegisterDevice registers device for push notifications
  rpc RegisterDevice(RegisterDeviceRequest) returns (RegisterDeviceResponse);
  
  // UnregisterDevice unregisters device
  rpc UnregisterDevice(UnregisterDeviceRequest) returns (UnregisterDeviceResponse);
  
  // GetDevices returns user devices
  rpc GetDevices(GetDevicesRequest) returns (GetDevicesResponse);
  
  // DeleteAccount deletes user account
  rpc DeleteAccount(DeleteAccountRequest) returns (DeleteAccountResponse);

  // ListUsers returns a paginated list of users (admin-only)
  rpc ListUsers(ListUsersRequest) returns (ListUsersResponse);

  // Platform roles (CTOgram employee roles — many-to-many)
  rpc SetPlatformRoles(SetPlatformRolesRequest) returns (SetPlatformRolesResponse);
  rpc GetPlatformRoles(GetPlatformRolesRequest) returns (GetPlatformRolesResponse);
  rpc CheckPlatformRoles(CheckPlatformRolesRequest) returns (CheckPlatformRolesResponse);
  rpc SetPlatformOrgAccess(SetPlatformOrgAccessRequest) returns (SetPlatformOrgAccessResponse);
  rpc GetPlatformOrgAccess(GetPlatformOrgAccessRequest) returns (GetPlatformOrgAccessResponse);

  // ListUsersByPlatformRoles returns users that have any of the given platform roles.
  // If roles is empty, returns all users that have at least one platform role.
  rpc ListUsersByPlatformRoles(ListUsersByPlatformRolesRequest) returns (ListUsersByPlatformRolesResponse);
}

enum PlatformRole {
  PLATFORM_ROLE_UNSPECIFIED = 0;
  PLATFORM_ROLE_MECHANIC = 1;          // MC — mechanic, scoped to assigned orgs
  PLATFORM_ROLE_RECEPTIONIST = 2;      // MP — receptionist, platform-wide
  PLATFORM_ROLE_PARTS_MANAGER = 3;     // MZ — parts manager, platform-wide
  PLATFORM_ROLE_ADMIN = 4;             // Admin CTOgram — full access
  PLATFORM_ROLE_SALES_MANAGER = 5;     // Sales manager
  PLATFORM_ROLE_RECRUITER = 6;         // Recruiter
  PLATFORM_ROLE_AUTOBODY_MANAGER = 7;  // Autobody manager
}

message User {
  int64 id = 1;
  string phone = 2;
  string name = 3;
  string avatar_url = 4;
  string email = 5;
  int64 city_id = 6;
  bool is_verified = 7;
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp updated_at = 9;
}

message UserCounters {
  int64 ads_count = 1;
  int64 reviews_count = 2;
  int64 followers_count = 3;
  int64 following_count = 4;
}

// Profile
message GetProfileRequest {}

message GetProfileResponse {
  User user = 1;
  UserCounters counters = 2;
}

message UpdateProfileRequest {
  optional string name = 1;
  optional string avatar_url = 2;
  optional string email = 3;
  optional int64 city_id = 4;
  // When set, update this user instead of the JWT caller (admin use).
  optional int64 user_id = 5;
  // Phone number change (admin-only). Returns ALREADY_EXISTS if phone is taken.
  optional string phone = 6;
}

message UpdateProfileResponse {
  User user = 1;
}

// User by ID (internal)
message GetUserByIDRequest {
  int64 user_id = 1;
}

message GetUserByIDResponse {
  User user = 1;
}

message GetUsersByIDsRequest {
  repeated int64 user_ids = 1;
}

message GetUsersByIDsResponse {
  repeated User users = 1;
}

// User by Phone (for auth service)
message GetUserByPhoneRequest {
  string phone = 1;
}

message GetUserByPhoneResponse {
  User user = 1;
}

// Create User (for auth service on first login)
message CreateUserRequest {
  string phone = 1;
}

message CreateUserResponse {
  User user = 1;
}

// FindOrCreateByPhone (for sync service)
message FindOrCreateByPhoneRequest {
  string phone = 1;
}

message FindOrCreateByPhoneResponse {
  User user = 1;
  bool created = 2;
}

// Settings
message UserSettings {
  bool push_enabled = 1;
  bool sms_enabled = 2;
  bool email_enabled = 3;
  bool chat_notifications = 4;
  bool order_notifications = 5;
  bool promo_notifications = 6;
}

message GetSettingsRequest {}

message GetSettingsResponse {
  UserSettings settings = 1;
}

message UpdateSettingsRequest {
  optional bool push_enabled = 1;
  optional bool sms_enabled = 2;
  optional bool email_enabled = 3;
  optional bool chat_notifications = 4;
  optional bool order_notifications = 5;
  optional bool promo_notifications = 6;
}

message UpdateSettingsResponse {
  UserSettings settings = 1;
}

// Devices
message Device {
  string id = 1;
  string device_id = 2;
  string platform = 3;  // ios, android
  string fcm_token = 4;
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp last_used_at = 6;
}

message RegisterDeviceRequest {
  string device_id = 1;
  string fcm_token = 2;
  string platform = 3;
}

message RegisterDeviceResponse {
  bool success = 1;
}

message UnregisterDeviceRequest {
  string device_id = 1;
}

message UnregisterDeviceResponse {
  bool success = 1;
}

message GetDevicesRequest {}

message GetDevicesResponse {
  repeated Device devices = 1;
}

// Account
message DeleteAccountRequest {
  string reason = 1;
}

message DeleteAccountResponse {
  bool success = 1;
}

// =============================================
// Platform Roles (CTOgram employee roles — many-to-many)
// =============================================

message SetPlatformRolesRequest {
  int64 user_id = 1;
  repeated PlatformRole roles = 2;  // replaces entire set
}

message SetPlatformRolesResponse {}

message GetPlatformRolesRequest {
  int64 user_id = 1;
}

message GetPlatformRolesResponse {
  repeated PlatformRole roles = 1;
}

message CheckPlatformRolesRequest {
  int64 user_id = 1;
}

message CheckPlatformRolesResponse {
  repeated PlatformRole roles = 1;
  repeated string accessible_org_ids = 2;  // populated only for MECHANIC
}

message SetPlatformOrgAccessRequest {
  int64 user_id = 1;
  repeated string org_ids = 2;  // replaces entire list
}

message SetPlatformOrgAccessResponse {}

message GetPlatformOrgAccessRequest {
  int64 user_id = 1;
}

message GetPlatformOrgAccessResponse {
  repeated string org_ids = 1;
}

// ListUsers (admin)
message ListUsersRequest {
  int32 page = 1;
  int32 page_size = 2;
  string search = 3;  // Search by phone or name
}

message ListUsersResponse {
  repeated User users = 1;
  int32 total = 2;
}

// ListUsersByPlatformRoles
message PlatformMember {
  int64 user_id = 1;
  string name = 2;
  string phone = 3;
  repeated PlatformRole roles = 4;
}

message ListUsersByPlatformRolesRequest {
  repeated PlatformRole roles = 1;  // filter by these roles; empty = all users with any role
}

message ListUsersByPlatformRolesResponse {
  repeated PlatformMember members = 1;
}
