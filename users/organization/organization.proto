syntax = "proto3";

package users.organization.v1;

option go_package = "gitlab.com/xakpro/cg-proto/gen/go/users/organization;organizationv1";

import "google/protobuf/timestamp.proto";

service OrganizationService {
  // CreateOrganization creates a new organization
  rpc CreateOrganization(CreateOrganizationRequest) returns (CreateOrganizationResponse);
  
  // GetOrganization returns organization by ID
  rpc GetOrganization(GetOrganizationRequest) returns (GetOrganizationResponse);
  
  // UpdateOrganization updates organization
  rpc UpdateOrganization(UpdateOrganizationRequest) returns (UpdateOrganizationResponse);
  
  // DeleteOrganization deletes organization (only owner can delete)
  rpc DeleteOrganization(DeleteOrganizationRequest) returns (DeleteOrganizationResponse);
  
  // GetMyOrganizations returns organizations where current user is a member
  rpc GetMyOrganizations(GetMyOrganizationsRequest) returns (GetMyOrganizationsResponse);

  // UpsertByLegacyID upserts organization by legacy_id (for sync service)
  rpc UpsertByLegacyID(UpsertByLegacyIDRequest) returns (UpsertByLegacyIDResponse);
  
  // Categories - for matching with requests
  rpc SetCategories(SetCategoriesRequest) returns (SetCategoriesResponse);
  rpc GetCategories(GetCategoriesRequest) returns (GetCategoriesResponse);
  
  // Members
  rpc AddMember(AddMemberRequest) returns (AddMemberResponse);
  rpc FireMember(FireMemberRequest) returns (FireMemberResponse);
  rpc UpdateMemberRole(UpdateMemberRoleRequest) returns (UpdateMemberRoleResponse);
  rpc GetMembers(GetMembersRequest) returns (GetMembersResponse);
  rpc GetMember(GetMemberRequest) returns (GetMemberResponse);
  
  // Invite codes
  rpc CreateInviteCode(CreateInviteCodeRequest) returns (CreateInviteCodeResponse);
  rpc UseInviteCode(UseInviteCodeRequest) returns (UseInviteCodeResponse);
  rpc GetInviteCodes(GetInviteCodesRequest) returns (GetInviteCodesResponse);
  rpc DeactivateInviteCode(DeactivateInviteCodeRequest) returns (DeactivateInviteCodeResponse);
  
  // Permissions
  rpc CheckPermission(CheckPermissionRequest) returns (CheckPermissionResponse);
  rpc GetRoles(GetRolesRequest) returns (GetRolesResponse);

  // Organization profiles (type-specific settings)
  rpc GetOrgProfile(GetOrgProfileRequest) returns (GetOrgProfileResponse);
  rpc UpdateOrgProfile(UpdateOrgProfileRequest) returns (UpdateOrgProfileResponse);

  // Subscription info (for payment service)
  rpc GetOrganizationSubscriptionInfo(GetOrgSubscriptionInfoRequest) returns (GetOrgSubscriptionInfoResponse);

  // Platform roles (CTOgram employee roles)
  rpc SetPlatformRole(SetPlatformRoleRequest) returns (SetPlatformRoleResponse);
  rpc GetPlatformRole(GetPlatformRoleRequest) returns (GetPlatformRoleResponse);
  rpc SetPlatformOrgAccess(SetPlatformOrgAccessRequest) returns (SetPlatformOrgAccessResponse);
  rpc GetPlatformOrgAccess(GetPlatformOrgAccessRequest) returns (GetPlatformOrgAccessResponse);
  rpc CheckPlatformRole(CheckPlatformRoleRequest) returns (CheckPlatformRoleResponse);
}

enum OrganizationType {
  ORGANIZATION_TYPE_UNSPECIFIED = 0;
  ORGANIZATION_TYPE_STO = 1;            // СТО (NSI group_id = 1)
  ORGANIZATION_TYPE_BODY_SHOP = 2;      // Кузовной цех (NSI group_id = 3)
  ORGANIZATION_TYPE_CAR_WASH = 3;       // Автомойка (no NSI group)
  ORGANIZATION_TYPE_PARTS_SUPPLIER = 4; // Поставщик запчастей (NSI group_id = 2)
  ORGANIZATION_TYPE_TIRE_SERVICE = 5;   // Шиномонтаж (no NSI group)
  ORGANIZATION_TYPE_DEALER = 6;         // Дилер
  ORGANIZATION_TYPE_GAS_SERVICE = 7;    // Установка газа на авто (NSI group_id = 23)
  ORGANIZATION_TYPE_OIL_SERVICE = 8;    // Замена масла и жидкостей (NSI group_id = 25)
  ORGANIZATION_TYPE_EMERGENCY = 9;      // Срочная выездная помощь (NSI group_id = 34)
}

enum MemberStatus {
  MEMBER_STATUS_UNSPECIFIED = 0;
  MEMBER_STATUS_ACTIVE = 1;
  MEMBER_STATUS_FIRED = 2;
}

enum PlatformRole {
  PLATFORM_ROLE_UNSPECIFIED = 0;
  PLATFORM_ROLE_MECHANIC = 1;      // MC — mechanic, scoped to assigned orgs
  PLATFORM_ROLE_RECEPTIONIST = 2;  // MP — receptionist, platform-wide
  PLATFORM_ROLE_PARTS_MANAGER = 3; // MZ — parts manager, platform-wide
  PLATFORM_ROLE_ADMIN = 4;         // Admin CTOgram — full access
}

message Organization {
  string id = 1;
  string name = 2;
  OrganizationType type = 3;
  int64 owner_user_id = 4;
  string description = 5;
  string logo_url = 6;
  string address = 7;
  string phone = 8;
  int64 city_id = 9;
  string status = 10;
  OrganizationSettings settings = 11;
  google.protobuf.Timestamp created_at = 12;
  google.protobuf.Timestamp updated_at = 13;
  repeated int64 category_ids = 14;  // Service categories for matching
  optional int64 legacy_id = 15;
  double rating = 16;
  int32 raters_count = 17;
  string avatar = 18;
  string whatsapp_link = 19;
  optional double latitude = 20;
  optional double longitude = 21;
  bool is_reviewed = 22;
  repeated int64 car_make_ids = 23;
  repeated int64 car_model_ids = 24;
  optional int32 year_from = 25;
  optional int32 year_to = 26;
  bool is_rented = 27;
  int32 posts_count = 28;
}

message OrganizationSettings {
  bool accept_orders = 1;
  WorkingHours working_hours = 2;
}

message WorkingHours {
  string monday = 1;    // e.g., "09:00-18:00"
  string tuesday = 2;
  string wednesday = 3;
  string thursday = 4;
  string friday = 5;
  string saturday = 6;
  string sunday = 7;
}

message Member {
  string id = 1;
  string organization_id = 2;
  int64 user_id = 3;
  string role_code = 4;  // owner, admin, manager, master, viewer
  repeated string permissions = 5;
  MemberStatus status = 6;
  google.protobuf.Timestamp hired_at = 7;
  google.protobuf.Timestamp fired_at = 8;
}

message Role {
  string code = 1;
  string name = 2;
  string description = 3;
  repeated string permissions = 4;
}

message InviteCode {
  string code = 1;
  string organization_id = 2;
  string role_code = 3;
  int64 created_by = 4;
  int32 max_uses = 5;
  int32 current_uses = 6;
  bool is_active = 7;
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp expires_at = 9;
}

// Organization CRUD
message CreateOrganizationRequest {
  string name = 1;
  OrganizationType type = 2;
  string description = 3;
  string address = 4;
  string phone = 5;
  int64 city_id = 6;
  repeated int64 category_ids = 7;
  repeated int64 car_make_ids = 8;
  repeated int64 car_model_ids = 9;
  optional int32 year_from = 10;
  optional int32 year_to = 11;
  optional double latitude = 12;
  optional double longitude = 13;
}

message CreateOrganizationResponse {
  Organization organization = 1;
}

message GetOrganizationRequest {
  string organization_id = 1;
}

message GetOrganizationResponse {
  Organization organization = 1;
}

message UpdateOrganizationRequest {
  string organization_id = 1;
  optional string name = 2;
  optional string description = 3;
  optional string logo_url = 4;
  optional string address = 5;
  optional string phone = 6;
  optional OrganizationSettings settings = 7;
  repeated int64 car_make_ids = 8;
  repeated int64 car_model_ids = 9;
  optional int32 year_from = 10;
  optional int32 year_to = 11;
  optional string avatar = 12;
  optional double latitude = 13;
  optional double longitude = 14;
  // Admin: set org status (active, suspended, closed)
  optional string status = 15;
}

message UpdateOrganizationResponse {
  Organization organization = 1;
}

message DeleteOrganizationRequest {
  string organization_id = 1;
}

message DeleteOrganizationResponse {
  bool success = 1;
}

message GetMyOrganizationsRequest {
  // Optional: when set by admin, return orgs for this user instead of JWT user.
  int64 user_id = 1;
}

message GetMyOrganizationsResponse {
  repeated OrganizationMembership memberships = 1;
}

message OrganizationMembership {
  Organization organization = 1;
  string role_code = 2;
  repeated string permissions = 3;
}

// Members
message AddMemberRequest {
  string organization_id = 1;
  int64 user_id = 2;
  string role_code = 3;
  repeated string permissions = 4;
}

message AddMemberResponse {
  Member member = 1;
}

message FireMemberRequest {
  string member_id = 1;
  string reason = 2;
}

message FireMemberResponse {
  bool success = 1;
}

message UpdateMemberRoleRequest {
  string member_id = 1;
  string role_code = 2;
  repeated string permissions = 3;
}

message UpdateMemberRoleResponse {
  Member member = 1;
}

message GetMembersRequest {
  string organization_id = 1;
  MemberStatus status = 2;
}

message GetMembersResponse {
  repeated Member members = 1;
}

message GetMemberRequest {
  string member_id = 1;
}

message GetMemberResponse {
  Member member = 1;
}

// Invite codes
message CreateInviteCodeRequest {
  string organization_id = 1;
  string role_code = 2;
  int32 expires_in_hours = 3;
  int32 max_uses = 4;
}

message CreateInviteCodeResponse {
  InviteCode invite_code = 1;
}

message UseInviteCodeRequest {
  string code = 1;
}

message UseInviteCodeResponse {
  Member member = 1;
  Organization organization = 2;
}

message GetInviteCodesRequest {
  string organization_id = 1;
  bool active_only = 2;
}

message GetInviteCodesResponse {
  repeated InviteCode invite_codes = 1;
}

message DeactivateInviteCodeRequest {
  string code = 1;
}

message DeactivateInviteCodeResponse {
  bool success = 1;
}

// Permissions
message CheckPermissionRequest {
  string organization_id = 1;
  string permission = 2;
}

message CheckPermissionResponse {
  bool allowed = 1;
  string role_code = 2;
}

message GetRolesRequest {
  OrganizationType organization_type = 1;
}

message GetRolesResponse {
  repeated Role roles = 1;
}

// UpsertByLegacyID (for sync service - migrating orgs from old system)
message UpsertByLegacyIDRequest {
  int64 legacy_id = 1;
  string name = 2;
  OrganizationType type = 3;
  int64 owner_user_id = 4;
  string description = 5;
  string address = 6;
  string phone = 7;
  int64 city_id = 8;
  double rating = 9;
  int32 raters_count = 10;
  string avatar = 11;
  string whatsapp_link = 12;
  optional double latitude = 13;
  optional double longitude = 14;
  bool is_reviewed = 15;
  string status = 16;
  repeated int64 category_ids = 17;
  repeated int64 car_make_ids = 18;
}

message UpsertByLegacyIDResponse {
  Organization organization = 1;
  bool created = 2;
}

// Categories - for matching with service requests
message SetCategoriesRequest {
  string organization_id = 1;
  repeated int64 category_ids = 2;  // NSI service_category IDs
}

message SetCategoriesResponse {
  repeated int64 category_ids = 1;
}

message GetCategoriesRequest {
  string organization_id = 1;
}

message GetCategoriesResponse {
  repeated int64 category_ids = 1;
}

// =============================================
// Organization Profiles (type-specific settings)
// =============================================

message STOProfile {
  string organization_id = 1;
  int32 posts_count = 2;
  bool has_diagnostics = 3;
  bool has_lift = 4;
  repeated string specializations = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp updated_at = 7;
}

message CarWashProfile {
  string organization_id = 1;
  int32 bays_count = 2;
  int32 slot_duration_minutes = 3;
  bool booking_enabled = 4;
  bool no_queue_enabled = 5;
  bool auto_slot_generation = 6;
  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp updated_at = 8;
}

message PartsProfile {
  string organization_id = 1;
  bool has_delivery = 2;
  repeated int64 delivery_city_ids = 3;
  int64 min_order_amount = 4;
  int32 return_policy_days = 5;
  string catalog_url = 6;
  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp updated_at = 8;
}

message GetOrgProfileRequest {
  string organization_id = 1;
}

message GetOrgProfileResponse {
  // Only one of these will be set, based on org type
  optional STOProfile sto_profile = 1;
  optional CarWashProfile carwash_profile = 2;
  optional PartsProfile parts_profile = 3;
}

message UpdateOrgProfileRequest {
  string organization_id = 1;
  // Only one of these should be set
  optional STOProfile sto_profile = 2;
  optional CarWashProfile carwash_profile = 3;
  optional PartsProfile parts_profile = 4;
}

message UpdateOrgProfileResponse {
  // Returns the updated profile
  optional STOProfile sto_profile = 1;
  optional CarWashProfile carwash_profile = 2;
  optional PartsProfile parts_profile = 3;
}

// =============================================
// Subscription Info (for payment service)
// =============================================

message GetOrgSubscriptionInfoRequest {
  string organization_id = 1;
}

message GetOrgSubscriptionInfoResponse {
  string organization_id = 1;
  int64 group_id = 2;    // derived from OrganizationType
  int64 city_id = 3;
  int32 posts_count = 4;
  bool is_rented = 5;
  OrganizationType org_type = 6;
}

// =============================================
// Platform Roles (CTOgram employee roles)
// =============================================

message SetPlatformRoleRequest {
  int64 user_id = 1;
  PlatformRole role = 2;
}

message SetPlatformRoleResponse {
  bool success = 1;
}

message GetPlatformRoleRequest {
  int64 user_id = 1;
}

message GetPlatformRoleResponse {
  PlatformRole role = 1;
}

message SetPlatformOrgAccessRequest {
  int64 user_id = 1;
  repeated string org_ids = 2; // replaces entire list
}

message SetPlatformOrgAccessResponse {
  bool success = 1;
}

message GetPlatformOrgAccessRequest {
  int64 user_id = 1;
}

message GetPlatformOrgAccessResponse {
  repeated string org_ids = 1;
}

message CheckPlatformRoleRequest {
  int64 user_id = 1;
}

message CheckPlatformRoleResponse {
  PlatformRole role = 1;
  repeated string accessible_org_ids = 2; // populated only for MECHANIC
}
