syntax = "proto3";

package communication.chat.v1;

option go_package = "github.com/4ubak/cg-proto/gen/go/communication/chat;chatv1";

import "google/protobuf/timestamp.proto";

service ChatService {
  rpc CreateChat(CreateChatRequest) returns (CreateChatResponse);
  rpc GetChat(GetChatRequest) returns (GetChatResponse);
  rpc GetUserChats(GetUserChatsRequest) returns (GetUserChatsResponse);
  rpc GetOrgChats(GetOrgChatsRequest) returns (GetOrgChatsResponse);
  rpc SendMessage(SendMessageRequest) returns (SendMessageResponse);
  rpc GetMessages(GetMessagesRequest) returns (GetMessagesResponse);
  rpc MarkAsRead(MarkAsReadRequest) returns (MarkAsReadResponse);
}

enum ChatContextType {
  CHAT_CONTEXT_TYPE_UNSPECIFIED = 0;
  CHAT_CONTEXT_TYPE_ORGANIZATION = 1;
  CHAT_CONTEXT_TYPE_REQUEST = 2;
  CHAT_CONTEXT_TYPE_PARTS_ORDER = 3;
  CHAT_CONTEXT_TYPE_WORKSHOP_ORDER = 4;
  CHAT_CONTEXT_TYPE_SUPPORT = 5;
}

// Chat represents a conversation between a mobile user and a seller/org/support.
// caller_role and caller_unread_count are populated by the server based on
// the authenticated caller's identity relative to this chat.
message Chat {
  string id = 1;
  ChatContextType context_type = 2;
  string context_id = 3;
  int64 buyer_id = 4;
  int64 seller_id = 5;
  string seller_org_id = 6;
  Message last_message = 7;
  int32 unread_count = 8;
  google.protobuf.Timestamp created_at = 9;
  google.protobuf.Timestamp updated_at = 10;
  // caller_role is "buyer" or "seller", computed from caller identity.
  string caller_role = 11;
  // caller_unread_count is the unread count for the caller's role.
  int32 caller_unread_count = 12;
}

message Message {
  string id = 1;
  string chat_id = 2;
  int64 sender_id = 3;
  string content = 4;
  string message_type = 5;
  bool is_read = 6;
  google.protobuf.Timestamp created_at = 7;
}

message CreateChatRequest {
  ChatContextType context_type = 1;
  string context_id = 2;
  int64 buyer_id = 3;
  int64 seller_id = 4;
  // seller_org_id is the UUID of the seller organization (empty for individual sellers).
  string seller_org_id = 5;
}

message CreateChatResponse {
  Chat chat = 1;
}

message GetChatRequest {
  string chat_id = 1;
}

message GetChatResponse {
  Chat chat = 1;
}

message GetUserChatsRequest {
  int64 user_id = 1;
  int32 page = 2;
  int32 page_size = 3;
}

message GetUserChatsResponse {
  repeated Chat chats = 1;
  int32 total = 2;
}

// GetOrgChatsRequest fetches chats for an organization.
// The caller must be a member of the organization (validated via JWT org claim).
message GetOrgChatsRequest {
  string organization_id = 1;
  int32 limit = 2;
  // cursor is the last chat ID for cursor-based pagination.
  string cursor = 3;
  // status filters chats: "open" | "closed" | "all". Defaults to "all".
  string status = 4;
}

message GetOrgChatsResponse {
  repeated Chat chats = 1;
  // next_cursor is the ID of the last item returned; empty means no more pages.
  string next_cursor = 2;
  int32 total = 3;
}

message SendMessageRequest {
  string chat_id = 1;
  int64 sender_id = 2;
  string content = 3;
  string message_type = 4;
}

message SendMessageResponse {
  Message message = 1;
}

message GetMessagesRequest {
  string chat_id = 1;
  string before_id = 2;
  int32 limit = 3;
}

message GetMessagesResponse {
  repeated Message messages = 1;
  bool has_more = 2;
}

message MarkAsReadRequest {
  string chat_id = 1;
  int64 user_id = 2;
  string last_message_id = 3;
}

message MarkAsReadResponse {
  int32 marked_count = 1;
}

// AdminChatService provides admin-only RPCs for chat moderation.
// All methods require a valid JWT with platform role "admin" or "support"
// asserted via the x-platform-role gRPC metadata header (set by BFF).
service AdminChatService {
  // AdminGetUserChats returns chats for any user by ID.
  rpc AdminGetUserChats(AdminGetUserChatsRequest) returns (AdminGetUserChatsResponse);

  // AdminGetChatMessages returns messages from any chat by ID.
  rpc AdminGetChatMessages(AdminGetChatMessagesRequest) returns (AdminGetChatMessagesResponse);
}

message AdminGetUserChatsRequest {
  int64 user_id = 1;
  int32 page = 2;
  int32 page_size = 3;
}

message AdminGetUserChatsResponse {
  repeated Chat chats = 1;
  int32 total = 2;
}

message AdminGetChatMessagesRequest {
  string chat_id = 1;
  string before_id = 2;
  int32 limit = 3;
}

message AdminGetChatMessagesResponse {
  repeated Message messages = 1;
  bool has_more = 2;
}
