syntax = "proto3";

package crm.v1;

option go_package = "github.com/4ubak/cg-proto/gen/go/crm;crmv1";

import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";

service CRMService {
  rpc CreatePipeline(CreatePipelineRequest)   returns (CreatePipelineResponse);
  rpc GetPipeline(GetPipelineRequest)         returns (GetPipelineResponse);
  rpc ListPipelines(ListPipelinesRequest)     returns (ListPipelinesResponse);
  rpc UpdatePipeline(UpdatePipelineRequest)   returns (UpdatePipelineResponse);
  rpc ArchivePipeline(ArchivePipelineRequest) returns (ArchivePipelineResponse);
  rpc CreateStage(CreateStageRequest)         returns (CreateStageResponse);
  rpc UpdateStage(UpdateStageRequest)         returns (UpdateStageResponse);
  rpc DeleteStage(DeleteStageRequest)         returns (DeleteStageResponse);
  rpc ReorderStages(ReorderStagesRequest)     returns (ReorderStagesResponse);

  // Contact RPCs -- DEPRECATED: crm_contacts table removed; user data fetched from cg-users directly.
  // These RPCs are retained for wire compatibility only and will be removed in a future version.
  rpc CreateContact(CreateContactRequest)     returns (CreateContactResponse)     { option deprecated = true; };
  rpc GetContact(GetContactRequest)           returns (GetContactResponse)        { option deprecated = true; };
  rpc ListContacts(ListContactsRequest)       returns (ListContactsResponse)      { option deprecated = true; };
  rpc SearchContacts(SearchContactsRequest)   returns (SearchContactsResponse)    { option deprecated = true; };
  rpc UpdateContact(UpdateContactRequest)     returns (UpdateContactResponse)     { option deprecated = true; };
  rpc DeleteContact(DeleteContactRequest)     returns (DeleteContactResponse)     { option deprecated = true; };

  // Vehicle RPCs -- DEPRECATED: crm_vehicles table removed; garage data fetched from cg-users directly.
  // These RPCs are retained for wire compatibility only and will be removed in a future version.
  rpc AddVehicle(AddVehicleRequest)           returns (AddVehicleResponse)        { option deprecated = true; };
  rpc GetVehicle(GetVehicleRequest)           returns (GetVehicleResponse)        { option deprecated = true; };
  rpc ListVehiclesByContact(ListVehiclesByContactRequest) returns (ListVehiclesByContactResponse) { option deprecated = true; };
  rpc GetServiceHistory(GetServiceHistoryRequest) returns (GetServiceHistoryResponse)             { option deprecated = true; };
  rpc GetGarageByPhone(GetGarageByPhoneRequest) returns (GetGarageByPhoneResponse)               { option deprecated = true; };
  rpc LookupVehicle(LookupVehicleRequest)     returns (LookupVehicleResponse)     { option deprecated = true; };

  // NOTE: Company RPCs (COMP-01/02/03) are DEFERRED per D-04.
  // NOTE: LinkContactToCompany (CONT-03) DEFERRED per D-04 -- companies not in scope.

  // Deal RPCs (Phase 4 -- deal lifecycle)
  rpc CreateDeal(CreateDealRequest)                         returns (CreateDealResponse);
  // CreateExternalDeal creates a deal on behalf of a trusted external system
  // (admin panel, partner website) authenticated by the BFF's API-key
  // gateway. Skips user-level permission checks — caller is authenticated
  // at the BFF boundary, not by a cg-users JWT. Reuses CreateDealRequest;
  // caller must supply created_by explicitly (no JWT to derive it from).
  rpc CreateExternalDeal(CreateDealRequest)                 returns (CreateDealResponse);
  rpc GetDeal(GetDealRequest)                               returns (GetDealResponse);
  rpc ListDeals(ListDealsRequest)                           returns (ListDealsResponse);
  rpc UpdateDeal(UpdateDealRequest)                         returns (UpdateDealResponse);
  rpc MoveDealStage(MoveDealStageRequest)                   returns (MoveDealStageResponse);
  rpc CloseDeal(CloseDealRequest)                           returns (CloseDealResponse);
  rpc ReOpenDeal(ReOpenDealRequest)                         returns (ReOpenDealResponse);
  rpc GetDealActivities(GetDealActivitiesRequest)           returns (GetDealActivitiesResponse);
  rpc GetContactActivities(GetContactActivitiesRequest)     returns (GetContactActivitiesResponse);

  // ImportDeal upserts a deal identified by external_id stored in custom_fields.
  // Used for migrating data from external CRMs (AmoCRM, Bitrix, etc.) without
  // creating duplicates on re-imports.
  //
  // Behavior:
  //   - Searches for an existing deal where custom_fields->>'external_id' = request.external_id
  //     within (organization_id, pipeline_id).
  //   - If found: updates stage, title, amount, user_id, assigned_to, status, custom_fields.
  //   - If not found: creates a new deal with the provided created_at preserved.
  //   - Returns the deal and a `created` flag.
  //
  // Bypasses the standard CreateDeal validations that don't apply to imports
  // (e.g. allows direct creation in terminal stages with status=won|lost).
  // Authorization: requires platform admin role.
  rpc ImportDeal(ImportDealRequest)                         returns (ImportDealResponse);

  // PatchDealCustomFields merges (or replaces) the deal's custom_fields
  // JSONB blob. Used by external-integration backfills (hh.ru migration,
  // partner data sync) that need to enrich an existing deal without going
  // through ImportDeal's external_id dedup (useful when the old deal
  // predates the external_id scheme).
  rpc PatchDealCustomFields(PatchDealCustomFieldsRequest) returns (PatchDealCustomFieldsResponse);

  // Lead RPCs (Phase 5 -- lead capture and conversion)
  rpc CreateLead(CreateLeadRequest)                         returns (CreateLeadResponse);
  rpc GetLead(GetLeadRequest)                               returns (GetLeadResponse);
  rpc ListLeads(ListLeadsRequest)                           returns (ListLeadsResponse);
  rpc ChangeLeadStatus(ChangeLeadStatusRequest)             returns (ChangeLeadStatusResponse);
  rpc ConvertLead(ConvertLeadRequest)                       returns (ConvertLeadResponse);

  // Task RPCs (Phase 6 -- task management with RBAC)
  rpc CreateTask(CreateTaskRequest)                         returns (CreateTaskResponse);
  rpc GetTask(GetTaskRequest)                               returns (GetTaskResponse);
  rpc ListTasks(ListTasksRequest)                           returns (ListTasksResponse);
  rpc UpdateTaskStatus(UpdateTaskStatusRequest)             returns (UpdateTaskStatusResponse);
  rpc UpdateTask(UpdateTaskRequest)                         returns (UpdateTaskResponse);

  // Custom Field RPCs (Phase 7 -- custom field definitions per org/entity)
  rpc CreateCustomFieldDefinition(CreateCustomFieldDefinitionRequest) returns (CreateCustomFieldDefinitionResponse);
  rpc GetCustomFieldDefinition(GetCustomFieldDefinitionRequest)       returns (GetCustomFieldDefinitionResponse);
  rpc ListCustomFieldDefinitions(ListCustomFieldDefinitionsRequest)   returns (ListCustomFieldDefinitionsResponse);
  rpc UpdateCustomFieldDefinition(UpdateCustomFieldDefinitionRequest) returns (UpdateCustomFieldDefinitionResponse);
  rpc DeleteCustomFieldDefinition(DeleteCustomFieldDefinitionRequest) returns (DeleteCustomFieldDefinitionResponse);

  // Webhook Subscription RPCs (Phase 7 -- webhook delivery)
  rpc CreateWebhookSubscription(CreateWebhookSubscriptionRequest) returns (CreateWebhookSubscriptionResponse);
  rpc ListWebhookSubscriptions(ListWebhookSubscriptionsRequest)   returns (ListWebhookSubscriptionsResponse);
  rpc UpdateWebhookSubscription(UpdateWebhookSubscriptionRequest) returns (UpdateWebhookSubscriptionResponse);
  rpc DeleteWebhookSubscription(DeleteWebhookSubscriptionRequest) returns (DeleteWebhookSubscriptionResponse);

  // Analytics RPCs (Phase 8)
  rpc GetFunnelConversion(GetFunnelConversionRequest) returns (GetFunnelConversionResponse);
  rpc GetManagerStats(GetManagerStatsRequest)         returns (GetManagerStatsResponse);
  rpc GetDealVolume(GetDealVolumeRequest)             returns (GetDealVolumeResponse);
  rpc GetStageStats(GetStageStatsRequest)             returns (GetStageStatsResponse);
  // Dashboard-focused aggregates — per-user activity counts and
  // deal-source breakdown. Both support an optional user_id filter so
  // admins can request their own stats instead of org-wide totals.
  rpc GetActivityStats(GetActivityStatsRequest)       returns (GetActivityStatsResponse);
  rpc GetDealSourcesBreakdown(GetDealSourcesBreakdownRequest) returns (GetDealSourcesBreakdownResponse);

  // Notes RPCs
  rpc CreateNote(CreateNoteRequest) returns (CreateNoteResponse);
  rpc UpdateNote(UpdateNoteRequest) returns (UpdateNoteResponse);

  // WhatsApp messaging RPCs
  rpc SendWhatsAppMessage(SendWhatsAppMessageRequest)     returns (SendWhatsAppMessageResponse);
  rpc SendWhatsAppTemplate(SendWhatsAppTemplateRequest)   returns (SendWhatsAppTemplateResponse);
  rpc ListWhatsAppMessages(ListWhatsAppMessagesRequest)   returns (ListWhatsAppMessagesResponse);
  // ListWhatsAppConversations returns a phone-grouped view over wa_messages:
  // one row per counterpart phone with its most recent message + unread count.
  // Powers the standalone WhatsApp inbox page on the CRM web app.
  rpc ListWhatsAppConversations(ListWhatsAppConversationsRequest) returns (ListWhatsAppConversationsResponse);
  rpc ListWhatsAppTemplates(ListWhatsAppTemplatesRequest) returns (ListWhatsAppTemplatesResponse);
  rpc HandleWhatsAppWebhook(WhatsAppWebhookRequest)       returns (WhatsAppWebhookResponse);

  // Telephony RPCs (Phase 8 — provider-agnostic; replaces Sipuni-specific methods)
  rpc TelephonyOriginate(TelephonyOriginateRequest)         returns (TelephonyOriginateResponse);
  rpc TelephonyGetCall(TelephonyGetCallRequest)             returns (TelephonyGetCallResponse);
  rpc TelephonyListCalls(TelephonyListCallsRequest)         returns (TelephonyListCallsResponse);
  rpc TelephonyGetCredentials(TelephonyGetCredentialsRequest) returns (TelephonyGetCredentialsResponse);

  // Phase 9 — Stasis event persistence, CallerID lookup, reconciliation (D-06, D-14, D-24)
  rpc CreateTelephonyCall(CreateTelephonyCallRequest)               returns (CreateTelephonyCallResponse);
  rpc UpdateTelephonyCallState(UpdateTelephonyCallStateRequest)     returns (UpdateTelephonyCallStateResponse);
  rpc ListTelephonyCallsByOrg(ListTelephonyCallsByOrgRequest)       returns (ListTelephonyCallsByOrgResponse);
  rpc ListOrphanedTelephonyCalls(ListOrphanedTelephonyCallsRequest) returns (ListOrphanedTelephonyCallsResponse);
  rpc LookupEntityByPhone(LookupEntityByPhoneRequest)               returns (LookupEntityByPhoneResponse);

  rpc UpsertTelephonyPipelineDID(UpsertTelephonyPipelineDIDRequest) returns (UpsertTelephonyPipelineDIDResponse);
  rpc ListTelephonyPipelineDIDs(ListTelephonyPipelineDIDsRequest)   returns (ListTelephonyPipelineDIDsResponse);
  rpc DeleteTelephonyPipelineDID(DeleteTelephonyPipelineDIDRequest) returns (DeleteTelephonyPipelineDIDResponse);

  rpc UpsertTelephonyUserExtension(UpsertTelephonyUserExtensionRequest) returns (UpsertTelephonyUserExtensionResponse);
  rpc GetTelephonyUserExtension(GetTelephonyUserExtensionRequest)       returns (GetTelephonyUserExtensionResponse);

  // Phase 11: Admin CRUD for user extensions
  rpc ListTelephonyUserExtensions(ListTelephonyUserExtensionsRequest)     returns (ListTelephonyUserExtensionsResponse);
  rpc DeleteTelephonyUserExtension(DeleteTelephonyUserExtensionRequest)   returns (DeleteTelephonyUserExtensionResponse);
  rpc UpdateTelephonyUserExtensionDND(UpdateTelephonyUserExtensionDNDRequest) returns (UpdateTelephonyUserExtensionDNDResponse);

  // Phase 20 D-06: resolve PJSIP extension → owning org+user for Stasis outbound dispatch.
  rpc LookupExtensionByNumber(LookupExtensionByNumberRequest) returns (LookupExtensionByNumberResponse);

  rpc GetTelephonyProviderConfig(GetTelephonyProviderConfigRequest)       returns (GetTelephonyProviderConfigResponse);
  rpc UpdateTelephonyProviderConfig(UpdateTelephonyProviderConfigRequest) returns (UpdateTelephonyProviderConfigResponse);

  // Phase 14: IVR Config + Business Hours + Greeting + Dialplan
  rpc ListTelephonyIVRConfig(ListTelephonyIVRConfigRequest)               returns (ListTelephonyIVRConfigResponse);
  rpc SaveTelephonyIVRConfig(SaveTelephonyIVRConfigRequest)               returns (SaveTelephonyIVRConfigResponse);
  rpc GetTelephonyBusinessHours(GetTelephonyBusinessHoursRequest)         returns (GetTelephonyBusinessHoursResponse);
  rpc SaveTelephonyBusinessHours(SaveTelephonyBusinessHoursRequest)       returns (SaveTelephonyBusinessHoursResponse);
  rpc GetTelephonyIVRGreeting(GetTelephonyIVRGreetingRequest)             returns (GetTelephonyIVRGreetingResponse);
  rpc UpsertTelephonyIVRGreeting(UpsertTelephonyIVRGreetingRequest)       returns (UpsertTelephonyIVRGreetingResponse);
  rpc GetTelephonyDialplanData(GetTelephonyDialplanDataRequest)           returns (GetTelephonyDialplanDataResponse);

  // Phase 16: Recording pipeline — persist and query call recordings
  rpc CreateTelephonyRecording(CreateTelephonyRecordingRequest)           returns (CreateTelephonyRecordingResponse);
  rpc GetTelephonyCallRecording(GetTelephonyCallRecordingRequest)         returns (GetTelephonyCallRecordingResponse);

  // Transcription pipeline — write recording transcript from the transcriber worker
  rpc UpdateTelephonyRecordingTranscript(UpdateTelephonyRecordingTranscriptRequest) returns (UpdateTelephonyRecordingTranscriptResponse);
}

message Pipeline {
  string id              = 1;
  string organization_id = 2;
  string name            = 3;
  string description     = 4;
  bool   is_default      = 5;
  bool   is_archived     = 6;
  int64  created_by      = 7;
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp updated_at = 9;
  repeated Stage stages  = 10;
}

message Stage {
  string id            = 1;
  string pipeline_id   = 2;
  string name          = 3;
  string color         = 4;
  int32  position      = 5;
  bool   is_terminal   = 6;
  string terminal_type = 7;
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp updated_at = 9;

  // Exit-requirement flags — evaluated on MoveDealStage (any move) and
  // CloseDeal when closing as "won". Lost transitions skip these.
  // Semantics on the deal:
  //   requires_vehicle  -> deal.vehicle_id != null
  //   requires_task     -> at least one task linked to deal (any status)
  //   requires_user     -> deal.user_id != null (client linked)
  //   requires_assignee -> deal.assigned_to != null (manager set)
  bool requires_vehicle  = 10;
  bool requires_task     = 11;
  bool requires_user     = 12;
  bool requires_assignee = 13;
  // True -> deal.amount_tiin must be > 0 to leave this stage (or close as won).
  bool requires_amount   = 14;
}

message CreatePipelineRequest {
  string organization_id = 1;
  string name            = 2;
  string description     = 3;
}

message CreatePipelineResponse {
  Pipeline pipeline = 1;
}

message GetPipelineRequest {
  string organization_id = 1;
  string id              = 2;
}

message GetPipelineResponse {
  Pipeline pipeline = 1;
}

message ListPipelinesRequest {
  string organization_id  = 1;
  bool   include_archived = 2;
}

message ListPipelinesResponse {
  repeated Pipeline pipelines = 1;
}

message UpdatePipelineRequest {
  string organization_id = 1;
  string id              = 2;
  string name            = 3;
  string description     = 4;
}

message UpdatePipelineResponse {
  Pipeline pipeline = 1;
}

message ArchivePipelineRequest {
  string organization_id = 1;
  string id              = 2;
}

message ArchivePipelineResponse {}

message CreateStageRequest {
  string organization_id = 1;
  string pipeline_id     = 2;
  string name            = 3;
  string color           = 4;
  bool   is_terminal     = 5;
  string terminal_type   = 6;
  // Exit-requirement flags (see Stage for semantics). Optional.
  bool   requires_vehicle  = 7;
  bool   requires_task     = 8;
  bool   requires_user     = 9;
  bool   requires_assignee = 10;
  bool   requires_amount   = 11;
}

message CreateStageResponse {
  Stage stage = 1;
}

message UpdateStageRequest {
  string organization_id = 1;
  string id              = 2;
  string name            = 3;
  string color           = 4;
  bool   is_terminal     = 5;
  string terminal_type   = 6; // "won" or "lost" when is_terminal=true, "" otherwise
  // Exit-requirement flags (see Stage for semantics). Optional.
  bool   requires_vehicle  = 7;
  bool   requires_task     = 8;
  bool   requires_user     = 9;
  bool   requires_assignee = 10;
  bool   requires_amount   = 11;
}

message UpdateStageResponse {
  Stage stage = 1;
}

message DeleteStageRequest {
  string organization_id = 1;
  string pipeline_id     = 2;
  string id              = 3;
}

message DeleteStageResponse {}

message ReorderStagesRequest {
  string organization_id    = 1;
  string pipeline_id        = 2;
  repeated string stage_ids = 3;
}

message ReorderStagesResponse {}

// ==================== Contact Messages ====================

// ContactProto is the wire representation of a CRM contact enriched with user data.
// name, phone, and email come from the linked cg-users UserInfo (nil if user service unavailable).
message ContactProto {
  string id              = 1;
  string organization_id = 2;
  int64  user_id         = 3;
  string display_name    = 4;
  string name            = 5;   // from UserInfo
  string phone           = 6;   // from UserInfo
  string email           = 7;   // from UserInfo
  string notes           = 8;
  google.protobuf.Struct custom_fields = 9;
  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Timestamp updated_at = 11;
}

message CreateContactRequest {
  string organization_id = 1;
  string phone           = 2; // required
  string display_name    = 3;
  string notes           = 4;
}

message CreateContactResponse {
  ContactProto contact = 1;
}

message GetContactRequest {
  string organization_id = 1;
  string id              = 2;
}

message GetContactResponse {
  ContactProto contact = 1;
}

message ListContactsRequest {
  string organization_id = 1;
  string search          = 2;
  int32  page            = 3;
  int32  page_size       = 4;
}

message ListContactsResponse {
  repeated ContactProto contacts = 1;
  int64  total                   = 2;
}

message SearchContactsRequest {
  string organization_id = 1;
  string query           = 2;
  int32  page            = 3;
  int32  page_size       = 4;
}

message SearchContactsResponse {
  repeated ContactProto contacts = 1;
  int32  total                   = 2;
}

message UpdateContactRequest {
  string organization_id = 1;
  string id              = 2;
  string display_name    = 3;
  string notes           = 4;
}

message UpdateContactResponse {
  ContactProto contact = 1;
}

message DeleteContactRequest {
  string organization_id = 1;
  string id              = 2;
}

message DeleteContactResponse {}

// ==================== Vehicle Messages ====================

// VehicleProto is the wire representation of a CRM vehicle enriched with car data.
// mark_name, model_name, year, vin, license_plate, color, mileage come from garage service CarInfo.
message VehicleProto {
  string id              = 1;
  string organization_id = 2;
  string contact_id      = 3;  // empty string if no contact linked
  int64  car_id          = 4;
  string mark_name       = 5;  // from CarInfo
  string model_name      = 6;  // from CarInfo
  int32  year            = 7;  // from CarInfo
  string vin             = 8;  // from CarInfo
  string license_plate   = 9;  // from CarInfo
  string color           = 10; // from CarInfo
  int32  mileage         = 11; // from CarInfo
  google.protobuf.Timestamp created_at = 12;
  google.protobuf.Timestamp updated_at = 13;
}

message AddVehicleRequest {
  string organization_id = 1;
  string contact_id      = 2;  // optional
  int64  user_id         = 3;
  string license_plate   = 4;
  string vin             = 5;
  int32  mark_id         = 6;
  int32  model_id        = 7;
  int32  generation_id   = 8;
  int32  year            = 9;
  string color           = 10;
}

message AddVehicleResponse {
  VehicleProto vehicle = 1;
}

message GetVehicleRequest {
  string organization_id = 1;
  string id              = 2;
}

message GetVehicleResponse {
  VehicleProto vehicle = 1;
}

message ListVehiclesByContactRequest {
  string organization_id = 1;
  string contact_id      = 2;
}

message ListVehiclesByContactResponse {
  repeated VehicleProto vehicles = 1;
}

// ServiceRecordProto represents a service history entry from the garage service.
message ServiceRecordProto {
  int64  id          = 1;
  int64  car_id      = 2;
  string title       = 3;
  string description = 4;
  int32  mileage     = 5;
  google.protobuf.Timestamp date = 6;
}

message GetServiceHistoryRequest {
  int64 car_id = 1;
  int32 page   = 2;
  int32 limit  = 3;
}

message GetServiceHistoryResponse {
  repeated ServiceRecordProto records = 1;
  int32  total                        = 2;
}

// CarInfoProto represents car data from the garage service.
message CarInfoProto {
  int64  id            = 1;
  int64  user_id       = 2;
  string mark_name     = 3;
  string model_name    = 4;
  int32  year          = 5;
  string vin           = 6;
  string license_plate = 7;
  string color         = 8;
  int32  mileage       = 9;
}

message GetGarageByPhoneRequest {
  string phone = 1;
}

message GetGarageByPhoneResponse {
  repeated CarInfoProto cars = 1;
}

message LookupVehicleRequest {
  int64  user_id       = 1;
  string vin           = 2;
  string license_plate = 3;
}

message LookupVehicleResponse {
  CarInfoProto car = 1;
}

// ==================== Deal Messages ====================

message DealProto {
  string id              = 1;
  string organization_id = 2;
  string pipeline_id     = 3;
  string stage_id        = 4;
  int64  user_id         = 5;  // 0 if null — cg-users user linked to this deal
  string company_id      = 6;  // empty if null
  reserved 7;                  // formerly vehicle_id — removed in migration 000012
  int64  assigned_to     = 8;  // 0 if null
  string title           = 9;
  double amount          = 10;
  string currency        = 11;
  string status          = 12; // "open", "won", "lost"
  string close_reason    = 13;
  google.protobuf.Timestamp expected_close = 14;
  google.protobuf.Struct custom_fields     = 15;
  int64  created_by      = 16;
  google.protobuf.Timestamp created_at     = 17;
  google.protobuf.Timestamp updated_at     = 18;

  // Enriched contact info (populated server-side from cg-users)
  string contact_name    = 19; // display name of the user linked via user_id
  string contact_phone   = 20; // phone of the user linked via user_id

  int64  vehicle_id      = 21; // 0 if null — car ID from cg-users garage

  // Last active (non-done/non-cancelled) task for this deal, sorted by due_at.
  // Populated server-side by ListDeals for kanban board display.
  TaskProto last_task     = 22;

  // Enriched manager info (populated server-side from cg-users via assigned_to)
  string assigned_name    = 23;

  // Unread inbound WhatsApp message count for this deal.
  // Incremented on each inbound webhook message; reset to 0 when a manager calls GetDeal.
  int32 unread_wa_count   = 24;

  // Where the deal came from. Populated at creation time; values include
  // "manual" (created by a user in the CRM UI), "lead" (converted from a lead
  // — inherits the lead's own source when present), "whatsapp", "landing",
  // "phone", "referral", etc. Empty on legacy rows that predate this field.
  string source           = 25;

  // True when the most recent call on this deal was an inbound call the
  // manager did not pick up (direction=inbound, state=ended, duration=0
  // and no later answered/outbound call). Populated server-side by
  // ListDeals and GetDeal for kanban/deal-detail visual alerting. Stays
  // true until the manager places/answers a subsequent call on the deal.
  bool has_missed_call    = 26;

  // External-source link. Populated when the deal was created by an
  // external system (admin panel, partner website) via the service-key
  // /external/deals API. (source, external_id) is idempotent per
  // organization; external_url is the deep-link back to the source
  // record for the "Open in source system" UI action. Empty otherwise.
  string external_id      = 27;
  string external_url     = 28;
}

message DealStageHistoryProto {
  string id            = 1;
  string deal_id       = 2;
  string from_stage_id = 3; // empty if first stage
  string to_stage_id   = 4;
  int64  changed_by    = 5;
  google.protobuf.Timestamp changed_at = 6;
}

message ActivityProto {
  string id              = 1;
  string organization_id = 2;
  string deal_id         = 3; // empty if null
  int64  user_id         = 4; // 0 if null — cg-users user linked to this activity
  string entity_type     = 5;
  string entity_id       = 6;
  string type            = 7;
  google.protobuf.Struct payload = 8;
  int64  created_by      = 9;
  google.protobuf.Timestamp created_at = 10;
}

message CreateDealRequest {
  string organization_id = 1;
  string pipeline_id     = 2;
  string stage_id        = 3;
  int64  user_id         = 4; // optional — cg-users user linked to this deal
  int64  vehicle_id      = 5; // optional — car ID from cg-users garage
  int64  assigned_to     = 6; // optional
  string title           = 7;
  double amount          = 8;
  string currency        = 9;
  google.protobuf.Timestamp expected_close = 10;
  // Origin of the deal. If empty, the server defaults to "manual". When a
  // deal is created via ConvertLead, the lead's source is propagated here
  // automatically — callers should not pass a value in that flow. Required
  // (and must be non-"manual") when external_id is set.
  string source          = 11;
  // External-system record identifier. When non-empty, the pair
  // (source, external_id) is enforced unique per organization and
  // repeated create calls return the existing deal instead of
  // duplicating. Intended for service-key integrations (admin panel,
  // partner websites).
  string external_id     = 12;
  // Deep-link to the source record in the external system. Rendered by
  // the CRM UI as "Open in source system". Optional.
  string external_url    = 13;
  // cg-users user_id stamped as the deal creator. Internal callers leave
  // this empty and the server derives it from the JWT. External callers
  // (service-key path) must supply it explicitly.
  int64  created_by      = 14;
}

message CreateDealResponse {
  DealProto deal = 1;
}

message GetDealRequest {
  string organization_id = 1;
  string id              = 2;
}

message GetDealResponse {
  DealProto deal = 1;
}

message ListDealsRequest {
  string organization_id = 1;
  string pipeline_id     = 2; // optional filter
  string stage_id        = 3; // optional filter
  int64  assigned_to     = 4; // optional filter
  string status          = 5; // optional filter
  google.protobuf.Timestamp date_from = 6;
  google.protobuf.Timestamp date_to   = 7;
  int64  user_id         = 8; // optional filter — filter by linked cg-users user_id
  int32  page            = 9;
  int32  page_size       = 10;
  string search          = 11; // optional — search by title (ILIKE)

  // Task-based filters (kanban "due today / overdue / has done" etc.).
  // All four fields cooperate as a single EXISTS (or NOT EXISTS) subquery:
  //   EXISTS (SELECT 1 FROM tasks t
  //           WHERE t.deal_id = d.id
  //             AND (task_due_from IS NULL OR t.due_at >= task_due_from)
  //             AND (task_due_to   IS NULL OR t.due_at <= task_due_to)
  //             AND (task_status   IS EMPTY OR t.status = ANY(task_status)))
  // When task_filter_mode="none", the EXISTS becomes NOT EXISTS
  // ("show deals with NO matching tasks"). Default mode is "any".
  google.protobuf.Timestamp task_due_from = 12;
  google.protobuf.Timestamp task_due_to   = 13;
  repeated string task_status             = 14; // pending|in_progress|done|cancelled
  string task_filter_mode                 = 15; // "any" (default) | "none"
}

message ListDealsResponse {
  repeated DealProto deals = 1;
  int64 total              = 2; // total rows matching filter (for pagination UI)
}

message UpdateDealRequest {
  string organization_id = 1;
  string id              = 2;
  string title           = 3;
  double amount          = 4;
  string currency        = 5;
  int64  assigned_to     = 6;
  google.protobuf.Timestamp expected_close = 7;
  int64  vehicle_id      = 8; // 0 to clear, >0 to set
}

message UpdateDealResponse {
  DealProto deal = 1;
}

// ImportDealRequest carries everything needed to migrate a single deal from
// an external CRM. The dedup key is (organization_id, pipeline_id, external_id).
message ImportDealRequest {
  string organization_id = 1;
  string pipeline_id     = 2;
  string stage_id        = 3;
  // external_id is the unique identifier of this deal in the source system
  // (e.g. "amocrm:31051709"). Used for upsert dedup within the pipeline.
  string external_id     = 4;
  string title           = 5;
  int64  user_id         = 6;  // optional — cg-users user linked to this deal
  int64  assigned_to     = 7;  // optional
  int64  created_by      = 8;  // optional, defaults to assigned_to
  double amount          = 9;
  string currency        = 10;
  // status: "open" | "won" | "lost". Allowed to be terminal even when the
  // stage_id refers to a non-terminal stage — the import RPC trusts the caller.
  string status          = 11;
  // close_reason is stored verbatim when status is "won" or "lost".
  string close_reason    = 12;
  // custom_fields are merged into existing custom_fields on update (JSONB ||).
  // The "external_id" key is automatically set by the server, callers should
  // NOT include it in this map.
  google.protobuf.Struct custom_fields = 13;
  // created_at preserves the original creation timestamp from the source CRM.
  // If unset, the server uses NOW().
  google.protobuf.Timestamp created_at = 14;
  // updated_at preserves the original last-edit timestamp. If unset, NOW().
  google.protobuf.Timestamp updated_at = 15;
}

message ImportDealResponse {
  DealProto deal = 1;
  // created is true when a new deal was inserted, false when an existing
  // deal was updated.
  bool created = 2;
  // previous_custom_fields is the deal's custom_fields BEFORE the import
  // merge — empty when the deal was newly created. Lets the caller
  // dedup imported tasks/notes against previously-imported fingerprints.
  google.protobuf.Struct previous_custom_fields = 3;
}

message PatchDealCustomFieldsRequest {
  string organization_id = 1;
  string deal_id         = 2;
  // patch is the set of keys to write. When merge=true (default) the keys
  // are layered onto the existing custom_fields via JSONB || (shallow
  // merge — top-level key replace). When merge=false the whole blob is
  // overwritten.
  google.protobuf.Struct patch = 3;
  // merge=true → JSONB ||; merge=false → full replace.
  bool merge = 4;
}

message PatchDealCustomFieldsResponse {
  DealProto deal = 1;
  // previous_custom_fields is the value BEFORE the patch was applied.
  google.protobuf.Struct previous_custom_fields = 2;
}

message MoveDealStageRequest {
  string organization_id = 1;
  string deal_id         = 2;
  string stage_id        = 3;
}

message MoveDealStageResponse {
  DealProto deal = 1;
}

message CloseDealRequest {
  string organization_id  = 1;
  string deal_id          = 2;
  string status           = 3; // "won" or "lost" — backward compat for clients that don't send terminal_stage_id
  string reason           = 4;
  string terminal_stage_id = 5; // explicit terminal stage id; when set, server validates it belongs to deal pipeline and is terminal, and derives status from stage.terminal_type
}

message CloseDealResponse {
  DealProto deal = 1;
}

message ReOpenDealRequest {
