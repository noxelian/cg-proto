// ==================== Telephony (Phase 8 — provider-agnostic) ====================
//
// Provider-agnostic telephony contract. Sipuni-specific messages were removed
// in Phase 8 (CTOgram v2.0 self-hosted telephony milestone). Backing providers:
//   TELEPHONY_PROVIDER_ASTERISK — Asterisk 22 on pbx.ctogram.net (active)
//   TELEPHONY_PROVIDER_SIPUNI   — reserved enum value, not used in Go code (D-12)

enum TelephonyProvider {
  TELEPHONY_PROVIDER_UNSPECIFIED = 0;
  TELEPHONY_PROVIDER_SIPUNI      = 1;  // reserved, not used (D-12)
  TELEPHONY_PROVIDER_ASTERISK    = 2;
}

enum TelephonyDirection {
  TELEPHONY_DIRECTION_UNSPECIFIED = 0;
  TELEPHONY_DIRECTION_INBOUND     = 1;
  TELEPHONY_DIRECTION_OUTBOUND    = 2;
}

enum TelephonyStatus {
  TELEPHONY_STATUS_UNSPECIFIED = 0;
  TELEPHONY_STATUS_RINGING     = 1;
  TELEPHONY_STATUS_ANSWERED    = 2;
  TELEPHONY_STATUS_MISSED      = 3;
  TELEPHONY_STATUS_BUSY        = 4;
  TELEPHONY_STATUS_CANCELLED   = 5;
  TELEPHONY_STATUS_ENDED       = 6;
}

// MatchedEntity represents a contact or lead matched by caller phone lookup.
// Phase 9 D-10, D-14. All fields optional — empty when no match.
message MatchedEntity {
  // entity_type: "contact" | "lead" | "none"
  string entity_type  = 1;
  // entity_id: UUID of the matched contact or lead (empty if none)
  string entity_id    = 2;
  // entity_name: trim(concat_ws(' ', first_name, last_name)) — built server-side
  string entity_name  = 3;
  // pipeline_id: UUID of pipeline owning the matched entity's active deal (contact) or the lead's pipeline
  string pipeline_id  = 4;
  // deal_id: UUID of the active deal associated with the contact (empty for leads or no-match)
  string deal_id      = 5;
  // assigned_to: user_id of the manager assigned to the deal (for priority routing)
  int64  assigned_to  = 6;
}

message TelephonyCall {
  string                      id                 = 1;
  TelephonyProvider           provider           = 2;
  string                      external_id        = 3;
  string                      organization_id    = 4;
  optional string             pipeline_id        = 5;
  optional string             deal_id            = 6;
  string                      src_num            = 7;
  string                      dst_num            = 8;
  TelephonyDirection          direction          = 9;
  TelephonyStatus             status             = 10;
  int32                       duration           = 11;
  optional string             record_url         = 12;
  google.protobuf.Timestamp   answered_at        = 13;
  google.protobuf.Timestamp   ended_at           = 14;
  google.protobuf.Timestamp   created_at         = 15;
  google.protobuf.Struct      provider_metadata  = 16;

  // --- Phase 9 additions (D-10, D-13) ---
  MatchedEntity               matched_entity           = 17;  // populated at StasisStart via LookupEntityByPhone
  string                      state                    = 18;  // 'ringing'|'answered'|'ended'|'failed' (lifecycle, distinct from deprecated `status`)
  string                      hangup_cause             = 19;  // ARI hangup cause code OR 'reconciled'
  google.protobuf.Timestamp   janitor_reconciled_at    = 20;  // D-24 SC#3 — set when janitor sweep marks call as reconciled
}

message TelephonyOriginateRequest {
  string          organization_id = 1;
  string          pipeline_id     = 2;
  string          user_id         = 3;  // initiator
  string          to_number       = 4;
  optional string contact_id      = 5;
  optional string deal_id         = 6;
  optional string lead_id         = 7;
}

message TelephonyOriginateResponse {
  TelephonyCall call = 1;
}

message TelephonyGetCallRequest {
  string call_id = 1;
}

message TelephonyGetCallResponse {
  TelephonyCall call = 1;
}

message TelephonyListCallsRequest {
  string          organization_id = 1;
  optional string deal_id         = 2;
  optional string phone           = 3;
  int32           limit           = 4;
  string          cursor          = 5;
}

message TelephonyListCallsResponse {
  repeated TelephonyCall calls       = 1;
  string                 next_cursor = 2;
}

// SIP + WebRTC ephemeral credentials for softphone clients
message IceServer {
  repeated string urls       = 1;
  string          username   = 2;
  string          credential = 3;
}

message SipCredentials {
  string                      extension   = 1;
  string                      password    = 2;  // ephemeral
  string                      wss_url     = 3;  // wss://pbx.ctogram.net:8089/ws
  repeated IceServer          ice_servers = 4;  // STUN/TURN (HMAC ephemeral for TURN)
  google.protobuf.Timestamp   expires_at  = 5;
}

message TelephonyGetCredentialsRequest {
  string user_id = 1;
}

message TelephonyGetCredentialsResponse {
  SipCredentials credentials = 1;
}

// ---------- telephony_pipeline_dids ----------
message TelephonyPipelineDID {
  string                      id              = 1;
  string                      organization_id = 2;
  string                      pipeline_id     = 3;
  TelephonyProvider           provider        = 4;
  string                      did             = 5;
  google.protobuf.Timestamp   created_at      = 6;
}

message UpsertTelephonyPipelineDIDRequest  { TelephonyPipelineDID did = 1; }
message UpsertTelephonyPipelineDIDResponse { TelephonyPipelineDID did = 1; }

message ListTelephonyPipelineDIDsRequest {
  string          organization_id = 1;
  optional string pipeline_id     = 2;
}
message ListTelephonyPipelineDIDsResponse {
  repeated TelephonyPipelineDID dids = 1;
}

message DeleteTelephonyPipelineDIDRequest {
  string id              = 1;
  string organization_id = 2;
}
message DeleteTelephonyPipelineDIDResponse {}

// ---------- telephony_user_extensions ----------
message TelephonyUserExtension {
  string                      id              = 1;
  string                      organization_id = 2;
  string                      user_id         = 3;
  TelephonyProvider           provider        = 4;
  string                      extension       = 5;
  google.protobuf.Timestamp   created_at      = 6;
  bool                        dnd             = 7;
}

message UpsertTelephonyUserExtensionRequest  { TelephonyUserExtension extension = 1; }
message UpsertTelephonyUserExtensionResponse { TelephonyUserExtension extension = 1; }

message GetTelephonyUserExtensionRequest {
  string            organization_id = 1;
  string            user_id         = 2;
  TelephonyProvider provider        = 3;
}
message GetTelephonyUserExtensionResponse {
  TelephonyUserExtension extension = 1;
}

// Phase 11: Admin CRUD for user extensions
message ListTelephonyUserExtensionsRequest {
  string organization_id = 1;
}
message ListTelephonyUserExtensionsResponse {
  repeated TelephonyUserExtension extensions = 1;
}

// Phase 20 D-06: LookupExtensionByNumber resolves an extension string to its
// owning organization_id+user_id. Used by cg-bff handleStasisStart when the
// manager leg enters Stasis with args[0]=="outbound" and we need to identify
// which org/user owns PJSIP/{extension}. Internal RPC — never exposed to
// end-user HTTP (see threat model T-20-01-04).
message LookupExtensionByNumberRequest {
  string            extension = 1;  // e.g. "1002"
  TelephonyProvider provider  = 2;  // PROVIDER_ASTERISK
}
message LookupExtensionByNumberResponse {
  string organization_id = 1;
  string user_id         = 2;
  string extension       = 3;
  bool   found           = 4;  // false => no row; org/user/ext will be empty
}

message DeleteTelephonyUserExtensionRequest {
  string id              = 1;
  string organization_id = 2;
}
message DeleteTelephonyUserExtensionResponse {}

message UpdateTelephonyUserExtensionDNDRequest {
  string organization_id = 1;
  string user_id         = 2;
  bool   dnd             = 3;
}
message UpdateTelephonyUserExtensionDNDResponse {
  TelephonyUserExtension extension = 1;
}

// ---------- telephony_provider_config ----------
message TelephonyProviderConfig {
  string                      id              = 1;
  string                      organization_id = 2;
  TelephonyProvider           active_provider = 3;
  google.protobuf.Struct      config          = 4;
  google.protobuf.Timestamp   last_updated    = 5;
  optional string             updated_by      = 6;
}

message GetTelephonyProviderConfigRequest {
  string organization_id = 1;
}
message GetTelephonyProviderConfigResponse {
  TelephonyProviderConfig config = 1;
}

message UpdateTelephonyProviderConfigRequest {
  TelephonyProviderConfig config = 1;
}
message UpdateTelephonyProviderConfigResponse {
  TelephonyProviderConfig config = 1;
}

// ==================== Phase 9 — Stasis event persistence + CallerID lookup ====================

message CreateTelephonyCallRequest {
  TelephonyCall  call           = 1;  // caller fills provider, external_id, org_id, pipeline_id, src_num, dst_num, direction, status, provider_metadata, state
  MatchedEntity  matched_entity = 2;  // optional — cg-bff pre-computes via LookupEntityByPhone
}
message CreateTelephonyCallResponse {
  TelephonyCall call    = 1;
  bool          created = 2;  // false if ON CONFLICT DO NOTHING hit (idempotent retry, D-08)
}

message UpdateTelephonyCallStateRequest {
  string                      organization_id       = 1;  // T-09-03 tenancy enforcement
  string                      call_id               = 2;  // server-side UUID (not external_id)
  string                      expected_state        = 3;  // optimistic lock (D-08) — empty string skips check
  string                      new_state             = 4;  // 'ringing'|'answered'|'ended'|'failed'
  string                      hangup_cause          = 5;  // optional
  google.protobuf.Timestamp   answered_at           = 6;  // optional
  google.protobuf.Timestamp   ended_at              = 7;  // optional
  google.protobuf.Timestamp   janitor_reconciled_at = 8;  // optional, set by janitor sweep
}
message UpdateTelephonyCallStateResponse {
  TelephonyCall call    = 1;
  bool          updated = 2;  // false if WHERE state=expected_state matched 0 rows (Pitfall 3 — not an error)
}

message ListTelephonyCallsByOrgRequest {
  string          organization_id = 1;
  int32           limit           = 2;
  int32           offset          = 3;
  repeated string state_filter    = 4;  // optional: e.g. ['ringing','answered']
}
message ListTelephonyCallsByOrgResponse {
  repeated TelephonyCall calls = 1;
  int32                  total = 2;
}

message ListOrphanedTelephonyCallsRequest {
  // No org filter — janitor scans cross-org.
  google.protobuf.Timestamp older_than = 1;  // e.g. now - 2h (D-24)
  int32                     limit      = 2;  // safety cap, e.g. 1000
}
message ListOrphanedTelephonyCallsResponse {
  repeated TelephonyCall calls = 1;
}

message LookupEntityByPhoneRequest {
  string organization_id = 1;  // T-09-03 tenancy enforcement
  string phone           = 2;  // caller normalizes to E.164 before this call (D-16)
}
message LookupEntityByPhoneResponse {
  MatchedEntity matched_entity = 1;  // entity_type='none' on miss (never nil)
}

// ==================== Phase 14 — IVR Config + Business Hours ====================

message TelephonyIVRConfigEntry {
  string                      id                 = 1;
  string                      organization_id    = 2;
  string                      pipeline_id        = 3;
  string                      dtmf_key           = 4;  // '0'-'9', 't' (timeout), 'i' (invalid)
  string                      target_pipeline_id = 5;
  int32                       sort_order         = 6;
  google.protobuf.Timestamp   created_at         = 7;
  google.protobuf.Timestamp   updated_at         = 8;
}

message ListTelephonyIVRConfigRequest {
  string organization_id = 1;
  string pipeline_id     = 2;
}
message ListTelephonyIVRConfigResponse {
  repeated TelephonyIVRConfigEntry configs = 1;
}

// SaveTelephonyIVRConfig: bulk-replace pattern — receives full list of DTMF keys
// for a pipeline, deletes old rows, inserts new (atomic replace in a transaction).
message SaveTelephonyIVRConfigRequest {
  string                              organization_id = 1;
  string                              pipeline_id     = 2;
  repeated TelephonyIVRConfigEntry    configs         = 3;
}
message SaveTelephonyIVRConfigResponse {
  repeated TelephonyIVRConfigEntry configs = 1;
}

message TelephonyBusinessHoursEntry {
  string                      id              = 1;
  string                      organization_id = 2;
  string                      pipeline_id     = 3;
  int32                       day_of_week     = 4;  // 0=mon, 6=sun
  bool                        enabled         = 5;
  string                      start_time      = 6;  // "HH:MM"
  string                      end_time        = 7;  // "HH:MM"
  google.protobuf.Timestamp   created_at      = 8;
  google.protobuf.Timestamp   updated_at      = 9;
}

message GetTelephonyBusinessHoursRequest {
  string organization_id = 1;
  string pipeline_id     = 2;
}
message GetTelephonyBusinessHoursResponse {
  repeated TelephonyBusinessHoursEntry entries = 1;
}

// SaveTelephonyBusinessHours: receives 7 weekday entries, upserts all.
message SaveTelephonyBusinessHoursRequest {
  string                                   organization_id = 1;
  string                                   pipeline_id     = 2;
  repeated TelephonyBusinessHoursEntry     entries         = 3;
}
message SaveTelephonyBusinessHoursResponse {
  repeated TelephonyBusinessHoursEntry entries = 1;
}

message TelephonyIVRGreeting {
  string                      id              = 1;
  string                      organization_id = 2;
  string                      pipeline_id     = 3;
  string                      filename        = 4;
  bool                        deployed        = 5;
  google.protobuf.Timestamp   created_at      = 6;
  google.protobuf.Timestamp   updated_at      = 7;
}

message GetTelephonyIVRGreetingRequest {
  string organization_id = 1;
  string pipeline_id     = 2;
}
message GetTelephonyIVRGreetingResponse {
  TelephonyIVRGreeting greeting = 1;  // nil if no greeting uploaded
}

message UpsertTelephonyIVRGreetingRequest {
  TelephonyIVRGreeting greeting = 1;
}
message UpsertTelephonyIVRGreetingResponse {
  TelephonyIVRGreeting greeting = 1;
}

// GetTelephonyDialplanData aggregates all IVR+BH config for an org.
// Used by cg-bff dialplan renderer for bulk fetch.
message GetTelephonyDialplanDataRequest {
  string organization_id = 1;
}
message GetTelephonyDialplanDataResponse {
  repeated TelephonyPipelineDID         pipeline_dids    = 1;
  repeated TelephonyIVRConfigEntry      ivr_configs      = 2;
  repeated TelephonyBusinessHoursEntry  business_hours   = 3;
  repeated TelephonyIVRGreeting         ivr_greetings    = 4;
  repeated TelephonyUserExtension       user_extensions  = 5;
}

// ── Phase 16: Recording pipeline ────────────────────────────────────

message TelephonyRecording {
  string id              = 1;
  string organization_id = 2;
  string call_id         = 3;
  string storage_path    = 4;
  int32  duration_sec    = 5;
  int64  size_bytes      = 6;
  string created_at      = 7;

  // Transcription fields — populated by the cg-ai transcriber worker.
  // transcript_status: pending | processing | done | failed
  string transcript_status    = 8;
  string transcript_text      = 9;
  string transcript_language  = 10;  // auto-detected: ru | kk | mixed
  string transcription_engine = 11;  // e.g. "openai-whisper-1"
  string transcribed_at       = 12;
  string transcript_error     = 13;  // populated when transcript_status == "failed"
}

message CreateTelephonyRecordingRequest {
  string organization_id = 1;
  string call_id         = 2;
  string storage_path    = 3;
  int32  duration_sec    = 4;
  int64  size_bytes      = 5;
}

message CreateTelephonyRecordingResponse {
  TelephonyRecording recording = 1;
}

message GetTelephonyCallRecordingRequest {
  string organization_id = 1;
  string call_id         = 2;
}

message GetTelephonyCallRecordingResponse {
  TelephonyRecording recording = 1;
}

// Transcriber worker writes the transcript back here when it's done (or marks
// the recording as failed on unrecoverable errors). Caller must be the
// transcriber — enforce via service-mesh auth at deploy time.
message UpdateTelephonyRecordingTranscriptRequest {
  string organization_id      = 1;
  string recording_id         = 2;
  string transcript_status    = 3;  // done | failed
  string transcript_text      = 4;  // present when status == done
  string transcript_language  = 5;
  string transcription_engine = 6;
  string transcript_error     = 7;  // present when status == failed
}

message UpdateTelephonyRecordingTranscriptResponse {
  TelephonyRecording recording = 1;
}
