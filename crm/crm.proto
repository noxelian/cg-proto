  string name            = 3;
  string field_key       = 4;
  string field_type      = 5;
  repeated FieldOptionProto options = 6;
  bool   is_required     = 7;
  int32  position        = 8;
  // Optional stage scope (empty = org-wide). Changing this effectively
  // re-scopes the field — use with care on definitions that already
  // have values recorded on deals.
  string stage_id        = 9;
}

message UpdateCustomFieldDefinitionResponse {
  CustomFieldDefinitionProto definition = 1;
}

