  string updated_at      = 7; // RFC3339
}

message CreateWebhookSubscriptionRequest {
  string organization_id = 1;
  string url             = 2;
  repeated string event_types = 3;
  string secret          = 4; // optional -- auto-generated if empty
}

message CreateWebhookSubscriptionResponse {
  WebhookSubscriptionProto subscription = 1;
}

message ListWebhookSubscriptionsRequest {
  string organization_id = 1;
}

message ListWebhookSubscriptionsResponse {
  repeated WebhookSubscriptionProto subscriptions = 1;
}

message UpdateWebhookSubscriptionRequest {
  string organization_id = 1;
  string id              = 2;
  string url             = 3;
  repeated string event_types = 4;
  string secret          = 5; // optional -- if empty, existing secret is kept
  bool   is_active       = 6;
}

message UpdateWebhookSubscriptionResponse {
  WebhookSubscriptionProto subscription = 1;
}

message DeleteWebhookSubscriptionRequest {
  string organization_id = 1;
  string id              = 2;
}

message DeleteWebhookSubscriptionResponse {}

// ==================== Analytics Messages (Phase 8) ====================

message GetFunnelConversionRequest {
  string organization_id = 1;
  string pipeline_id     = 2;
  google.protobuf.Timestamp date_from = 3;
  google.protobuf.Timestamp date_to   = 4;
}

message FunnelStageProto {
  string stage_id         = 1;
  string stage_name       = 2;
  int32  position         = 3;
  int64  total_deals      = 4;
  int64  converted_deals  = 5;
  double conversion_rate  = 6;
}

message GetFunnelConversionResponse {
  repeated FunnelStageProto stages = 1;
}

message GetManagerStatsRequest {
  string organization_id           = 1;
  google.protobuf.Timestamp date_from = 2;
  google.protobuf.Timestamp date_to   = 3;
  // When non-empty, scopes the aggregation to a single pipeline and returns
  // a row for every member of that pipeline (pipeline_members) — even those
  // with zero deals in the period, so the table surfaces idle managers.
  string pipeline_id               = 4;
}

message ManagerStatProto {
  int64  user_id     = 1;
  int64  deal_count  = 2;
  double total_value = 3;
  int64  won_count   = 4;
  int64  lost_count  = 5;
  double win_rate    = 6;
}

message GetManagerStatsResponse {
  repeated ManagerStatProto managers = 1;
}

message GetDealVolumeRequest {
  string organization_id           = 1;
  google.protobuf.Timestamp date_from = 2;
  google.protobuf.Timestamp date_to   = 3;
  // When set (>0), restricts the aggregation to deals assigned to this user,
  // overriding the default scope-based filter. Required when an admin/owner
  // wants to see their own personal stats (the dashboard use case), since
  // scope=all would otherwise return org-wide numbers. Managers may only
  // request their own id; any other value returns PermissionDenied.
  int64  user_id                   = 4;
  // When non-empty, restricts aggregation to deals belonging to a single
  // pipeline. Empty = aggregate across all pipelines in the organisation
  // (legacy behaviour). Used by the dashboard pipeline picker so the
  // metrics match the kanban view of the same pipeline.
  string pipeline_id               = 5;
}

message GetDealVolumeResponse {
  int64  open_count  = 1;
  double open_value  = 2;
  int64  won_count   = 3;
  double won_value   = 4;
  int64  lost_count  = 5;
  double lost_value  = 6;
  int64  total_count = 7;
  double total_value = 8;
}

message GetStageStatsRequest {
  string organization_id = 1;
  string pipeline_id     = 2;
}

message StageStatProto {
  string stage_id                   = 1;
  int64  total_deals                = 2;
  int64  deals_without_active_tasks = 3;
}

message GetStageStatsResponse {
  repeated StageStatProto stats = 1;
}

// GetActivityStats — dashboard aggregates for per-user activity within a
// date range. Calls are resolved to the user via the sipuni_user_extensions
// mapping (sipnumber ↔ user_id); notes and tasks are filtered directly by
// created_by / assigned_to.
message GetActivityStatsRequest {
  string organization_id = 1;
  google.protobuf.Timestamp date_from = 2;
  google.protobuf.Timestamp date_to   = 3;
  int64  user_id         = 4; // when >0, filter to this user; otherwise org-wide
  // When non-empty, scopes calls/notes/tasks to a single pipeline via
  // deal_id → pipeline_id (for notes/tasks) and telephony_calls.pipeline_id
  // or matched deal (for calls). Empty = org-wide (legacy).
  string pipeline_id     = 5;
}

message GetActivityStatsResponse {
  int64 calls_inbound    = 1;
  int64 calls_outbound   = 2;
  int64 calls_answered   = 3;
  int64 calls_missed     = 4;
  int64 notes_count      = 5;
  int64 tasks_created    = 6;
  int64 tasks_completed  = 7;
  int64 tasks_overdue    = 8; // pending && due_at < now — NOT bounded by date range
}

// GetDealSourcesBreakdown — distribution of deals by their source field
// (manual, lead, whatsapp, landing, etc.) within a date range, scoped to
// the caller or an explicit user_id.
message GetDealSourcesBreakdownRequest {
  string organization_id = 1;
  google.protobuf.Timestamp date_from = 2;
  google.protobuf.Timestamp date_to   = 3;
  int64  user_id         = 4;
  // When non-empty, restricts the source breakdown to a single pipeline.
  // Mirrors GetDealVolumeRequest.pipeline_id — used by the dashboard
  // pipeline picker.
  string pipeline_id     = 5;
}

message DealSourceBreakdownItem {
  string source = 1;
  int64  count  = 2;
  double value  = 3;
}

message GetDealSourcesBreakdownResponse {
  repeated DealSourceBreakdownItem items = 1;
}

// GetCloseReasonsBreakdown — distribution of CLOSED deals (won/lost)
// grouped by close_reason within a date range. Powers the dashboard
// "Причины закрытия" block — admins can see what's killing pipelines.
message GetCloseReasonsBreakdownRequest {
  string organization_id = 1;
  google.protobuf.Timestamp date_from = 2;
  google.protobuf.Timestamp date_to   = 3;
  int64  user_id         = 4;
  string pipeline_id     = 5;
  // Optional. "won" or "lost" to restrict to one outcome; empty = both.
  string status          = 6;
}

message CloseReasonBreakdownItem {
  string reason = 1;
  string status = 2; // "won" | "lost"
  int64  count  = 3;
  double value  = 4; // sum of deal.amount across this bucket
}

message GetCloseReasonsBreakdownResponse {
  repeated CloseReasonBreakdownItem items = 1;
}

// ==================== Notes ====================

message NoteProto {
  string id              = 1;
  string organization_id = 2;
  string deal_id         = 3;
  string body            = 4;
  int64  author_id       = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp updated_at = 7;
  // external_id is a stable cross-system identifier used to deduplicate notes
  // imported from external CRMs (e.g. "amocrm:165243317"). NULL for native notes.
  string external_id     = 8;
}

message CreateNoteRequest {
  string organization_id = 1;
  string deal_id         = 2;
  string body            = 3;
  // external_id, when set, makes CreateNote idempotent: a second call with the
  // same (deal_id, external_id) returns the existing note instead of inserting
  // a duplicate. Used by the amocrm-sync parser to dedupe at the DB layer.
  string external_id     = 4;
}

message CreateNoteResponse {
  NoteProto note = 1;
}

message UpdateNoteRequest {
  string organization_id = 1;
  string note_id         = 2;
  string body            = 3;
}

message UpdateNoteResponse {
  NoteProto note = 1;
}

// ==================== WhatsApp Messages ====================

message WAMessageProto {
  string id           = 1;
  string phone        = 2;
  string direction    = 3;  // "inbound" / "outbound"
  string content_type = 4;  // "text" / "image" / "document" / "video" / "audio" / "template"
  string body         = 5;
  string media_url    = 6;
  string status       = 7;  // "sent" / "delivered" / "read" / "failed" / "received"
  string deal_id      = 8;
  string wa_message_id = 9;
  google.protobuf.Timestamp created_at = 10;
  // Populated only for failed messages. Meta's numeric error code (e.g.
  // 131047 = 24h re-engagement window closed) plus the human-readable
  // message/title/details. Zero / empty string when no error.
  int32  error_code    = 11;
  string error_message = 12;
  // cg-users user_id whose phone book contains `phone` (any of their up
  // to 5 numbers matches). 0 when nobody in the phone book owns the
  // number — same sentinel convention as WAConversationProto.contact_user_id.
  int64  matched_user_id = 13;
}

message SendWhatsAppMessageRequest {
  string organization_id = 1;
  string deal_id         = 2;  // optional
  string phone           = 3;
  string text            = 4;
  string media_url       = 5;  // optional — URL of uploaded media file
  string content_type    = 6;  // optional — "image", "video", "audio", "document"
}

message SendWhatsAppMessageResponse {
  WAMessageProto message = 1;
}

message ListWhatsAppMessagesRequest {
  string organization_id = 1;
  string deal_id         = 2;  // filter by deal
  string phone           = 3;  // or filter by phone
  int32  limit           = 4;
  int32  offset          = 5;
  // Optional WhatsApp channel filter — wa_messages.phone_number_id. When
  // set, narrows results to chats received by / sent from that WABA number.
  // Used by the sidebar's per-channel tab. Empty = no filter (legacy).
  string phone_number_id = 6;
}

message ListWhatsAppMessagesResponse {
  repeated WAMessageProto messages = 1;
}

message WAConversationProto {
  string phone                = 1;
  string contact_name         = 2;  // resolved via matched deal/contact; empty when unknown
  string last_body            = 3;
  string last_content_type    = 4;  // text / image / document / …
  string last_direction       = 5;  // inbound / outbound
  google.protobuf.Timestamp last_created_at = 6;
  string last_deal_id         = 7;  // deal linked to the most recent message (optional)
  int64  unread_count         = 8;  // sum of deal.unread_wa_count across deals linked to this phone
  int64  contact_user_id      = 9;  // cg-users user.id resolved by phone (0 when unknown), powers /contacts/:id deep-linking
}

message ListWhatsAppConversationsRequest {
  string organization_id = 1;
  int32  limit           = 2;
  int32  offset          = 3;
  // Optional case-insensitive filter. Digit-only tokens match the
  // counterpart phone (formatting-tolerant); free text matches the most
  // recent wa_messages.body. Empty / whitespace is ignored.
  string search          = 4;
  // Optional WhatsApp channel filter — wa_messages.phone_number_id. Empty
  // returns the global inbox; non-empty narrows to one WABA number.
  string phone_number_id = 5;
}

message ListWhatsAppConversationsResponse {
  repeated WAConversationProto conversations = 1;
  int64 total = 2; // total distinct phones, for pagination
}

message MarkWhatsAppChatReadRequest {
  string organization_id = 1;
  string phone           = 2;
}

message MarkWhatsAppChatReadResponse {}

// WhatsAppChannelProto exposes one whatsapp_channels row to the frontend.
// allowed_pipeline_ids drives "this user sees this tab if any of these
// pipelines is in their pipeline_members" on the sidebar.
message WhatsAppChannelProto {
  string phone_number_id           = 1;  // Meta WABA phone_number_id (key)
  string display_phone             = 2;  // raw digits, frontend formats last 4 as label
  string organization_id           = 3;
  string default_pipeline_id       = 4;
  repeated string allowed_pipeline_ids = 5;
}

message ListWhatsAppChannelsRequest {
  string organization_id = 1;
}

message ListWhatsAppChannelsResponse {
  repeated WhatsAppChannelProto channels = 1;
}

// SendWhatsAppTemplate — send a pre-approved template message.
message SendWhatsAppTemplateRequest {
  string organization_id = 1;
  string deal_id         = 2;
  string phone           = 3;
  string template_name   = 4;
  string lang_code       = 5;
  repeated string params = 6;
}

message SendWhatsAppTemplateResponse {
  WAMessageProto message = 1;
}

// WhatsAppWebhookRequest wraps the raw Meta webhook JSON payload.
// BFF forwards the raw body so cg-crm can parse and process it.
message WhatsAppWebhookRequest {
  bytes raw_body = 1;
}

message WhatsAppWebhookResponse {
  bool ok = 1;
}

// ListWhatsAppTemplates — fetch approved templates from Meta WABA.
// When deal_id or phone_number_id is set, the response is narrowed to
// the WABA bound to that channel; otherwise it is the merged set across
// every configured WABA (primary + secondary). deal_id wins over
// phone_number_id when both are passed.
message ListWhatsAppTemplatesRequest {
  string organization_id = 1;
  // Resolves to the channel bound to deals.pipeline_id via
  // whatsapp_channels.default_pipeline_id, then to that channel's WABA.
  string deal_id         = 2;
  // Direct WABA channel filter — wa_messages.phone_number_id. Use this
  // from inbox views where the active conversation already exposes the
  // PNID (deals don't carry it directly).
  string phone_number_id = 3;
}

message ListWhatsAppTemplatesResponse {
  repeated WhatsAppTemplate templates = 1;
}

message WhatsAppTemplate {
  string name     = 1;
  string language = 2;  // e.g. "ru", "en_US"
  string status   = 3;  // "APPROVED", "PENDING", etc.
  string category = 4;  // "MARKETING", "UTILITY", "AUTHENTICATION"
  string body     = 5;  // body text with {{1}} placeholders
  repeated WhatsAppTemplateParam params = 6;
  // Meta phone_number_id of the WABA this template belongs to. Empty
  // for templates fetched without channel filtering or when only one
  // WABA is configured. Lets the UI group/badge templates per number.
  string phone_number_id = 7;
}

message WhatsAppTemplateParam {
  int32  index = 1;  // 1-based index matching {{1}}, {{2}}, etc.
  string example = 2;  // example value from Meta
}

// ==================== Wazzup24 Messages ====================

message WazzupMessageProto {
  string id            = 1;
  string chat_id       = 2;  // counterpart phone (digits only)
  string chat_type     = 3;  // whatsapp / instagram / ...
  string direction     = 4;  // inbound / outbound
  string content_type  = 5;
  string body          = 6;
  string media_url     = 7;
  string status        = 8;
  string author_name   = 9;
  string external_id   = 10; // Wazzup messageId
  string channel_id    = 11; // Wazzup channelId
  google.protobuf.Timestamp created_at = 12;
  // cg-users user_id whose phone book contains chat_id. 0 when no
  // user in the phone book owns the number.
  int64  matched_user_id = 13;
}

message SendWazzupMessageRequest {
  string organization_id = 1;
  string chat_id         = 2;  // destination phone (with or without '+')
  string text            = 3;
}

message SendWazzupMessageResponse {
  WazzupMessageProto message = 1;
}

message ListWazzupMessagesRequest {
  string organization_id = 1;
  string chat_id         = 2;
  int32  limit           = 3;
  int32  offset          = 4;
}

message ListWazzupMessagesResponse {
  repeated WazzupMessageProto messages = 1;
}

message WazzupConversationProto {
  string chat_id           = 1;
  string chat_type         = 2;
  string display_name      = 3;  // from wazzup_contacts when known
  string last_body         = 4;
  string last_content_type = 5;
  string last_direction    = 6;
  google.protobuf.Timestamp last_created_at = 7;
  // cg-users user_id whose phone book contains chat_id. 0 when
  // unknown. Lets the inbox prompt "attach chat to user X".
  int64  matched_user_id   = 8;
  // Mirrors WAConversationProto.contact_user_id for inbox rendering.
  // Populated from user_phones via the same lookup used on ingest.
  int64  contact_user_id   = 9;
  // Number of unread inbound messages in this chat. 0 means fully read.
  // Populated via COUNT(*) FILTER (WHERE is_read = false AND direction = 'inbound').
  int64  unread_count       = 10;
}

message ListWazzupConversationsRequest {
  string organization_id = 1;
  int32  limit           = 2;
  int32  offset          = 3;
  string search          = 4;
}

message ListWazzupConversationsResponse {
  repeated WazzupConversationProto conversations = 1;
  int64 total = 2;
}

// Raw Wazzup webhook body forwarded by BFF to cg-crm.
message WazzupWebhookRequest {
  bytes raw_body = 1;
}

message WazzupWebhookResponse {
  bool ok = 1;
}

// ==================== Telephony (Phase 8 — provider-agnostic) ====================
//
// Provider-agnostic telephony contract. Sipuni-specific messages were removed
// in Phase 8 (CTOgram v2.0 self-hosted telephony milestone). Backing providers:
//   TELEPHONY_PROVIDER_ASTERISK — Asterisk 22 on pbx.ctogram.net (active)
//   TELEPHONY_PROVIDER_SIPUNI   — reserved enum value, not used in Go code (D-12)

enum TelephonyProvider {
  TELEPHONY_PROVIDER_UNSPECIFIED = 0;
  TELEPHONY_PROVIDER_SIPUNI      = 1;  // reserved, not used (D-12)
  TELEPHONY_PROVIDER_ASTERISK    = 2;
}

enum TelephonyDirection {
  TELEPHONY_DIRECTION_UNSPECIFIED = 0;
  TELEPHONY_DIRECTION_INBOUND     = 1;
  TELEPHONY_DIRECTION_OUTBOUND    = 2;
}

enum TelephonyStatus {
  TELEPHONY_STATUS_UNSPECIFIED = 0;
  TELEPHONY_STATUS_RINGING     = 1;
  TELEPHONY_STATUS_ANSWERED    = 2;
  TELEPHONY_STATUS_MISSED      = 3;
  TELEPHONY_STATUS_BUSY        = 4;
  TELEPHONY_STATUS_CANCELLED   = 5;
  TELEPHONY_STATUS_ENDED       = 6;
}

// MatchedEntity represents a contact or lead matched by caller phone lookup.
// Phase 9 D-10, D-14. All fields optional — empty when no match.
message MatchedEntity {
  // entity_type: "contact" | "lead" | "none"
  string entity_type  = 1;
  // entity_id: UUID of the matched contact or lead (empty if none)
  string entity_id    = 2;
  // entity_name: trim(concat_ws(' ', first_name, last_name)) — built server-side
  string entity_name  = 3;
  // pipeline_id: UUID of pipeline owning the matched entity's active deal (contact) or the lead's pipeline
  string pipeline_id  = 4;
  // deal_id: UUID of the active deal associated with the contact (empty for leads or no-match)
  string deal_id      = 5;
  // assigned_to: user_id of the manager assigned to the deal (for priority routing)
  int64  assigned_to  = 6;
}

message TelephonyCall {
  string                      id                 = 1;
  TelephonyProvider           provider           = 2;
  string                      external_id        = 3;
  string                      organization_id    = 4;
  optional string             pipeline_id        = 5;
  optional string             deal_id            = 6;
  string                      src_num            = 7;
  string                      dst_num            = 8;
  TelephonyDirection          direction          = 9;
  TelephonyStatus             status             = 10;
  int32                       duration           = 11;
  optional string             record_url         = 12;
  google.protobuf.Timestamp   answered_at        = 13;
  google.protobuf.Timestamp   ended_at           = 14;
  google.protobuf.Timestamp   created_at         = 15;
  google.protobuf.Struct      provider_metadata  = 16;

  // --- Phase 9 additions (D-10, D-13) ---
  MatchedEntity               matched_entity           = 17;  // populated at StasisStart via LookupEntityByPhone
  string                      state                    = 18;  // 'ringing'|'answered'|'ended'|'failed' (lifecycle, distinct from deprecated `status`)
  string                      hangup_cause             = 19;  // ARI hangup cause code OR 'reconciled'
  google.protobuf.Timestamp   janitor_reconciled_at    = 20;  // D-24 SC#3 — set when janitor sweep marks call as reconciled

  // Extension that answered the call. For inbound: set from queue claim. For
  // outbound: same as src_num (the initiating manager's extension). Used for
  // per-manager call-history filtering.
  string                      answered_by_extension    = 21;
}

message TelephonyOriginateRequest {
  string          organization_id = 1;
  string          pipeline_id     = 2;
  string          user_id         = 3;  // initiator
  string          to_number       = 4;
  optional string contact_id      = 5;
  optional string deal_id         = 6;
  optional string lead_id         = 7;
}

message TelephonyOriginateResponse {
  TelephonyCall call = 1;
}

message TelephonyGetCallRequest {
  string call_id = 1;
}

message TelephonyGetCallResponse {
  TelephonyCall call = 1;
}

message TelephonyListCallsRequest {
  string          organization_id = 1;
  optional string deal_id         = 2;
  optional string phone           = 3;
  int32           limit           = 4;
  string          cursor          = 5;
}

message TelephonyListCallsResponse {
  repeated TelephonyCall calls       = 1;
  string                 next_cursor = 2;
}

// SIP + WebRTC ephemeral credentials for softphone clients
message IceServer {
  repeated string urls       = 1;
  string          username   = 2;
  string          credential = 3;
}

message SipCredentials {
  string                      extension   = 1;
  string                      password    = 2;  // ephemeral
  string                      wss_url     = 3;  // wss://pbx.ctogram.net:8089/ws
  repeated IceServer          ice_servers = 4;  // STUN/TURN (HMAC ephemeral for TURN)
  google.protobuf.Timestamp   expires_at  = 5;
}

message TelephonyGetCredentialsRequest {
  string user_id = 1;
}

message TelephonyGetCredentialsResponse {
  SipCredentials credentials = 1;
}

// ---------- telephony_pipeline_dids ----------
message TelephonyPipelineDID {
  string                      id                = 1;
  string                      organization_id   = 2;
  string                      pipeline_id       = 3;
  TelephonyProvider           provider          = 4;
  string                      did               = 5;
  google.protobuf.Timestamp   created_at        = 6;
  // Only one row per (provider, did) may have is_inbound_owner=TRUE.
  // That row determines which pipeline an inbound call to this DID lands in.
  // Other rows with is_inbound_owner=FALSE allow the same DID to be used
  // as outbound CallerID from additional pipelines.
  bool                        is_inbound_owner  = 7;
}

message UpsertTelephonyPipelineDIDRequest  { TelephonyPipelineDID did = 1; }
message UpsertTelephonyPipelineDIDResponse { TelephonyPipelineDID did = 1; }

message ListTelephonyPipelineDIDsRequest {
  string          organization_id = 1;
  optional string pipeline_id     = 2;
}
message ListTelephonyPipelineDIDsResponse {
  repeated TelephonyPipelineDID dids = 1;
}

message DeleteTelephonyPipelineDIDRequest {
  string id              = 1;
  string organization_id = 2;
}
message DeleteTelephonyPipelineDIDResponse {}

// ---------- telephony_user_extensions ----------
message TelephonyUserExtension {
  string                      id              = 1;
  string                      organization_id = 2;
  string                      user_id         = 3;
  TelephonyProvider           provider        = 4;
  string                      extension       = 5;
  google.protobuf.Timestamp   created_at      = 6;
  bool                        dnd             = 7;
}

message UpsertTelephonyUserExtensionRequest  { TelephonyUserExtension extension = 1; }
message UpsertTelephonyUserExtensionResponse { TelephonyUserExtension extension = 1; }

message GetTelephonyUserExtensionRequest {
  string            organization_id = 1;
  string            user_id         = 2;
  TelephonyProvider provider        = 3;
}
message GetTelephonyUserExtensionResponse {
  TelephonyUserExtension extension = 1;
}

// Phase 11: Admin CRUD for user extensions
message ListTelephonyUserExtensionsRequest {
  string organization_id = 1;
}
message ListTelephonyUserExtensionsResponse {
  repeated TelephonyUserExtension extensions = 1;
}

// Phase 20 D-06: LookupExtensionByNumber resolves an extension string to its
// owning organization_id+user_id. Used by cg-bff handleStasisStart when the
// manager leg enters Stasis with args[0]=="outbound" and we need to identify
// which org/user owns PJSIP/{extension}. Internal RPC — never exposed to
// end-user HTTP (see threat model T-20-01-04).
message LookupExtensionByNumberRequest {
  string            extension = 1;  // e.g. "1002"
  TelephonyProvider provider  = 2;  // PROVIDER_ASTERISK
}
message LookupExtensionByNumberResponse {
  string organization_id = 1;
  string user_id         = 2;
  string extension       = 3;
  bool   found           = 4;  // false => no row; org/user/ext will be empty
}

message DeleteTelephonyUserExtensionRequest {
  string id              = 1;
  string organization_id = 2;
}
message DeleteTelephonyUserExtensionResponse {}

message UpdateTelephonyUserExtensionDNDRequest {
  string organization_id = 1;
  string user_id         = 2;
  bool   dnd             = 3;
}
message UpdateTelephonyUserExtensionDNDResponse {
  TelephonyUserExtension extension = 1;
}

// ---------- telephony_provider_config ----------
message TelephonyProviderConfig {
  string                      id              = 1;
  string                      organization_id = 2;
  TelephonyProvider           active_provider = 3;
  google.protobuf.Struct      config          = 4;
  google.protobuf.Timestamp   last_updated    = 5;
  optional string             updated_by      = 6;
}

message GetTelephonyProviderConfigRequest {
  string organization_id = 1;
}
message GetTelephonyProviderConfigResponse {
  TelephonyProviderConfig config = 1;
}

message UpdateTelephonyProviderConfigRequest {
  TelephonyProviderConfig config = 1;
}
message UpdateTelephonyProviderConfigResponse {
  TelephonyProviderConfig config = 1;
}

// ==================== Phase 9 — Stasis event persistence + CallerID lookup ====================

message CreateTelephonyCallRequest {
  TelephonyCall  call           = 1;  // caller fills provider, external_id, org_id, pipeline_id, src_num, dst_num, direction, status, provider_metadata, state
  MatchedEntity  matched_entity = 2;  // optional — cg-bff pre-computes via LookupEntityByPhone
}
message CreateTelephonyCallResponse {
  TelephonyCall call    = 1;
  bool          created = 2;  // false if ON CONFLICT DO NOTHING hit (idempotent retry, D-08)
}

message UpdateTelephonyCallStateRequest {
  string                      organization_id       = 1;  // T-09-03 tenancy enforcement
  string                      call_id               = 2;  // server-side UUID (not external_id)
  string                      expected_state        = 3;  // optimistic lock (D-08) — empty string skips check
  string                      new_state             = 4;  // 'ringing'|'answered'|'ended'|'failed'
  string                      hangup_cause          = 5;  // optional
  google.protobuf.Timestamp   answered_at           = 6;  // optional
  google.protobuf.Timestamp   ended_at              = 7;  // optional
  google.protobuf.Timestamp   janitor_reconciled_at = 8;  // optional, set by janitor sweep
  string                      answered_by_extension = 9;  // optional — set when transitioning to 'answered' for per-manager filtering
}
message UpdateTelephonyCallStateResponse {
  TelephonyCall call    = 1;
  bool          updated = 2;  // false if WHERE state=expected_state matched 0 rows (Pitfall 3 — not an error)
}

// UpdateTelephonyCallMatchedEntity persists a matched_entity onto an
// existing call row, identified by id. Used by cg-bff after
// LookupEntityByPhone resolves the caller, on both inbound and outbound
// flows. The previous "re-issue CreateTelephonyCall" trick relied on
// idempotency that doesn't exist when the row already has a primary
// key — pkey conflicts left matched_entity NULL and the popup / call
// history showed only the raw phone number.
message UpdateTelephonyCallMatchedEntityRequest {
  string        organization_id = 1;
  string        call_id         = 2;
  MatchedEntity matched_entity  = 3; // entity_type='none' clears the row
}
message UpdateTelephonyCallMatchedEntityResponse {
  bool updated = 1; // false when no row matched the (org_id, call_id) pair
}

message ListTelephonyCallsByOrgRequest {
  string          organization_id  = 1;
  int32           limit            = 2;
  int32           offset           = 3;
  repeated string state_filter     = 4;  // optional: e.g. ['ringing','answered']
  // extension_filter restricts results to calls owned by a specific manager:
  //   - outbound where src_num = extension_filter
  //   - inbound  where answered_by_extension = extension_filter
  // Empty = no restriction. Missed inbound calls (state=ended & duration=0)
  // are always returned when include_missed=true regardless of this filter.
  string          extension_filter = 5;
  bool            include_missed   = 6;  // when extension_filter is set, also include unanswered inbound calls
  // pipeline_ids narrows the include_missed branch to calls whose
  // pipeline_id is in this set. Used to scope missed-call visibility
  // to a manager's pipeline_members membership. Empty = no narrowing
  // (current behaviour preserved). Has no effect on the
  // extension-ownership branch.
  repeated string pipeline_ids     = 7;
}
message ListTelephonyCallsByOrgResponse {
  repeated TelephonyCall calls = 1;
  int32                  total = 2;
}

message ListOrphanedTelephonyCallsRequest {
  // No org filter — janitor scans cross-org.
  google.protobuf.Timestamp older_than = 1;  // e.g. now - 2h (D-24)
  int32                     limit      = 2;  // safety cap, e.g. 1000
}
message ListOrphanedTelephonyCallsResponse {
  repeated TelephonyCall calls = 1;
}

message LookupEntityByPhoneRequest {
  string organization_id = 1;  // T-09-03 tenancy enforcement
  string phone           = 2;  // caller normalizes to E.164 before this call (D-16)
}
message LookupEntityByPhoneResponse {
  MatchedEntity matched_entity = 1;  // entity_type='none' on miss (never nil)
}

// ==================== Phase 14 — IVR Config + Business Hours ====================

message TelephonyIVRConfigEntry {
  string                      id                 = 1;
  string                      organization_id    = 2;
  string                      pipeline_id        = 3;
  string                      dtmf_key           = 4;  // '0'-'9', 't' (timeout), 'i' (invalid)
  string                      target_pipeline_id = 5;
  int32                       sort_order         = 6;
  google.protobuf.Timestamp   created_at         = 7;
  google.protobuf.Timestamp   updated_at         = 8;
}

message ListTelephonyIVRConfigRequest {
  string organization_id = 1;
  string pipeline_id     = 2;
}
message ListTelephonyIVRConfigResponse {
  repeated TelephonyIVRConfigEntry configs = 1;
}

// SaveTelephonyIVRConfig: bulk-replace pattern — receives full list of DTMF keys
// for a pipeline, deletes old rows, inserts new (atomic replace in a transaction).
message SaveTelephonyIVRConfigRequest {
  string                              organization_id = 1;
  string                              pipeline_id     = 2;
  repeated TelephonyIVRConfigEntry    configs         = 3;
}
message SaveTelephonyIVRConfigResponse {
  repeated TelephonyIVRConfigEntry configs = 1;
}

message TelephonyBusinessHoursEntry {
  string                      id              = 1;
  string                      organization_id = 2;
  string                      pipeline_id     = 3;
  int32                       day_of_week     = 4;  // 0=mon, 6=sun
  bool                        enabled         = 5;
  string                      start_time      = 6;  // "HH:MM"
  string                      end_time        = 7;  // "HH:MM"
  google.protobuf.Timestamp   created_at      = 8;
  google.protobuf.Timestamp   updated_at      = 9;
}

message GetTelephonyBusinessHoursRequest {
  string organization_id = 1;
  string pipeline_id     = 2;
}
message GetTelephonyBusinessHoursResponse {
  repeated TelephonyBusinessHoursEntry entries = 1;
}

// SaveTelephonyBusinessHours: receives 7 weekday entries, upserts all.
message SaveTelephonyBusinessHoursRequest {
  string                                   organization_id = 1;
  string                                   pipeline_id     = 2;
  repeated TelephonyBusinessHoursEntry     entries         = 3;
}
message SaveTelephonyBusinessHoursResponse {
  repeated TelephonyBusinessHoursEntry entries = 1;
}

message TelephonyIVRGreeting {
  string                      id              = 1;
  string                      organization_id = 2;
  string                      pipeline_id     = 3;
  string                      filename        = 4;
  bool                        deployed        = 5;
  google.protobuf.Timestamp   created_at      = 6;
  google.protobuf.Timestamp   updated_at      = 7;
}

message GetTelephonyIVRGreetingRequest {
  string organization_id = 1;
  string pipeline_id     = 2;
}
message GetTelephonyIVRGreetingResponse {
  TelephonyIVRGreeting greeting = 1;  // nil if no greeting uploaded
}

message UpsertTelephonyIVRGreetingRequest {
  TelephonyIVRGreeting greeting = 1;
}
message UpsertTelephonyIVRGreetingResponse {
  TelephonyIVRGreeting greeting = 1;
}

// GetTelephonyDialplanData aggregates all IVR+BH config for an org.
// Used by cg-bff dialplan renderer for bulk fetch.
message GetTelephonyDialplanDataRequest {
  string organization_id = 1;
}
message GetTelephonyDialplanDataResponse {
  repeated TelephonyPipelineDID         pipeline_dids    = 1;
  repeated TelephonyIVRConfigEntry      ivr_configs      = 2;
  repeated TelephonyBusinessHoursEntry  business_hours   = 3;
  repeated TelephonyIVRGreeting         ivr_greetings    = 4;
  repeated TelephonyUserExtension       user_extensions  = 5;
}

// ── Phase 16: Recording pipeline ────────────────────────────────────

message TelephonyRecording {
  string id              = 1;
  string organization_id = 2;
  string call_id         = 3;
  string storage_path    = 4;
  int32  duration_sec    = 5;
  int64  size_bytes      = 6;
  string created_at      = 7;

  // Transcription fields — populated by the cg-ai transcriber worker.
  // transcript_status: pending | processing | done | failed
  string transcript_status    = 8;
  string transcript_text      = 9;
  string transcript_language  = 10;  // auto-detected: ru | kk | mixed
  string transcription_engine = 11;  // e.g. "openai-whisper-1"
  string transcribed_at       = 12;
  string transcript_error     = 13;  // populated when transcript_status == "failed"
}

message CreateTelephonyRecordingRequest {
  string organization_id = 1;
  string call_id         = 2;
  string storage_path    = 3;
  int32  duration_sec    = 4;
  int64  size_bytes      = 5;
}

message CreateTelephonyRecordingResponse {
  TelephonyRecording recording = 1;
}

message GetTelephonyCallRecordingRequest {
  string organization_id = 1;
  string call_id         = 2;
}

message GetTelephonyCallRecordingResponse {
  TelephonyRecording recording = 1;
}

// Transcriber worker writes the transcript back here when it's done (or marks
// the recording as failed on unrecoverable errors). Caller must be the
// transcriber — enforce via service-mesh auth at deploy time.
message UpdateTelephonyRecordingTranscriptRequest {
  string organization_id      = 1;
  string recording_id         = 2;
  string transcript_status    = 3;  // done | failed
  string transcript_text      = 4;  // present when status == done
  string transcript_language  = 5;
  string transcription_engine = 6;
  string transcript_error     = 7;  // present when status == failed
}

message UpdateTelephonyRecordingTranscriptResponse {
  TelephonyRecording recording = 1;
}
